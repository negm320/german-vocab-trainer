<style>
:root{
  --bg:#0b0e12; --card:#12161d; --text:#e9eef5; --muted:#9aacbf; --border:#243041;
  --accent:#6aa6ff; --good:#22c55e; --bad:#ef4444; --btn:#1a2230; --btn2:#1e2a3c; --hole:#0f141c;
}
*{box-sizing:border-box}
button,input,textarea,select{font-family:inherit;}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 'Lora',Georgia,serif;}
.wrap{max-width:720px;margin:0 auto;padding:14px 14px 60px}

/* tabs */
.tabBar{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabBar::-webkit-scrollbar{display:none;}
.tabItem{padding:8px 20px;font-size:14px;color:var(--muted);text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;white-space:nowrap;flex-shrink:0;}
.tabItem.active{color:var(--text);border-bottom-color:var(--accent);}
.tabItem:hover:not(.active){color:var(--text);}

/* page head */
.pageHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.pageTitle{font-size:20px;font-weight:600;margin:0;}

/* card */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 16px;box-shadow:0 6px 20px rgba(0,0,0,.25);position:relative;overflow:hidden;}

/* divider */
.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}

/* states */
.hidden{display:none!important}
.muted{color:var(--muted)}
.small{font-size:12px}
.good{color:var(--good)} .bad{color:var(--bad)}

/* generic button */
button{background:var(--btn);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);cursor:pointer;font-size:15px;}
button:hover{background:var(--btn2);}
.ghostBtn{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:13px;padding:6px 14px;border-radius:999px;}
.ghostBtn:hover{color:var(--text);border-color:var(--muted);}

/* footer controls */
.footerRow{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap;}

/* API key setup screen */
#apiKeyScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:16px;z-index:10000;}
#apiKeyScreen.hidden{display:none!important}
.setupBox{width:min(480px,100%);background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 12px 40px rgba(0,0,0,.45);}
.setupBox input{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--hole);color:var(--text);font-size:16px;}

/* loading */
@keyframes loadPulse{0%,100%{border-color:var(--border)}50%{border-color:rgba(106,166,255,0.5)}}
.card.loading{animation:loadPulse 1s ease infinite;}
#topicLoading,#gradingText{color:var(--muted);font-size:14px;padding:16px 0;text-align:center;}

/* topic */
.topicRow{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.topicLabel{letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.topicText{font-size:18px;line-height:1.6;}

/* compose area */
.composeArea{position:relative;margin-top:14px;}
#ausdruckInput{
  width:100%;min-height:170px;padding:14px 90px 14px 14px;
  border:1px solid var(--border);border-radius:14px;
  background:var(--hole);color:var(--text);font-size:16px;
  line-height:1.55;outline:none;resize:vertical;
}
#ausdruckInput::placeholder{color:var(--muted);}
#ausdruckInput.interim{color:rgba(154,172,191,.55);font-style:italic;}

/* mic (verbatim from chat.html, repositioned for a multi-line textarea) */
#micBtn{
  position:absolute;right:6px;bottom:6px;
  width:64px;height:64px;border-radius:50%;
  background:var(--btn);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:2;
  transition:background .2s,border-color .2s;
}
#micBtn svg{width:22px;height:22px;fill:var(--accent);flex-shrink:0;transition:fill .2s;}
#micBtn.listening{background:#2c0a0a;border-color:var(--bad);}
#micBtn.listening svg{fill:var(--bad);}
.ripple{
  position:absolute;inset:-10px;border-radius:50%;
  border:2px solid var(--bad);opacity:0;pointer-events:none;
}
#micBtn.listening .ripple:nth-child(1){animation:rippleOut 1.6s ease-out infinite;}
#micBtn.listening .ripple:nth-child(2){animation:rippleOut 1.6s ease-out .53s infinite;}
#micBtn.listening .ripple:nth-child(3){animation:rippleOut 1.6s ease-out 1.06s infinite;}
@keyframes rippleOut{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.65);opacity:0}}

.countRow{margin-top:8px;text-align:right;}

.primaryBtn{width:100%;margin-top:14px;padding:13px;background:var(--accent);border:1px solid var(--accent);color:#0b0e12;font-weight:600;font-size:16px;border-radius:12px;}
.primaryBtn:hover{filter:brightness(1.08);}
.primaryBtn:disabled{opacity:.4;cursor:default;filter:none;background:var(--btn);border-color:var(--border);color:var(--muted);}

/* scores */
.scoreBlock{display:flex;flex-direction:column;align-items:center;}
.naturalnessScore{text-align:center;margin-bottom:16px;}
.naturalnessScore .scoreValue{font-size:52px;font-weight:600;color:var(--accent);line-height:1;}
.naturalnessScore .scoreLabel{margin-top:4px;}
.subScores{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;text-align:center;}
.subScore{display:flex;flex-direction:column;gap:2px;}
.subScore .scoreValue{font-size:20px;font-weight:600;}

/* highlighted text */
.gradedText{font-size:16px;line-height:1.85;margin:6px 0;}
.errSpan{cursor:pointer;padding-bottom:1px;}

/* error tooltip */
#errTooltip{position:fixed;max-width:260px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:5000;display:none;}
#errTooltip.show{display:block;}
#errTooltip .corrLine{font-weight:600;margin-bottom:4px;}

/* corrected toggle */
.toggleRow{margin:14px 0 4px;}
#correctedBlock{line-height:1.7;}

/* stretch block */
.stretchBlock{margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
.stretchOrig{color:var(--muted);text-decoration:line-through;margin-bottom:4px;}
.stretchBetter{color:var(--good);font-weight:600;margin-bottom:4px;}

/* history */
.historyItem{padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.historyItem:last-child{border-bottom:none;}
.historyDate{font-size:12px;color:var(--muted);}
.historyTopic{font-size:15px;margin-top:2px;}
</style>

<script>
const GEMINI_KEY_LS='top5k_gemini_key';
const SUPABASE_URL_KEY='top5k_supabase_url';
const SUPABASE_KEY_KEY='top5k_supabase_key';
const ENTRIES_KEY='ausdruck_entries_v1';
const ENTRIES_SAVED_AT_KEY='ausdruck_saved_at_v1';
const ENTRIES_CAP=200;

/* ── Entries storage ── */
function loadEntries(){
  try{
    const raw=localStorage.getItem(ENTRIES_KEY);
    if(raw){
      const s=JSON.parse(raw);
      if(s&&s.v===1&&Array.isArray(s.entries)) return s;
    }
  }catch(e){}
  return {v:1,entries:[]};
}
let store=loadEntries();

function saveEntries(){
  try{
    localStorage.setItem(ENTRIES_KEY,JSON.stringify(store));
    localStorage.setItem(ENTRIES_SAVED_AT_KEY,String(Date.now()));
  }catch(e){}
}

function addEntry(entry){
  store.entries.push(entry);
  if(store.entries.length>ENTRIES_CAP) store.entries.splice(0,store.entries.length-ENTRIES_CAP);
  saveEntries();
  pushAusdruckNow();
}

/* ── Cloud sync (Supabase) — mirror only, app works fully offline without it ── */
function supabaseConf(){
  const url=(localStorage.getItem(SUPABASE_URL_KEY)||'').trim().replace(/\/+$/,'');
  const key=(localStorage.getItem(SUPABASE_KEY_KEY)||'').trim();
  if(!url||!key) return null;
  return {url,key};
}

async function supabaseUpsert(key,value){
  const conf=supabaseConf();
  if(!conf) return null;
  const res=await fetch(`${conf.url}/rest/v1/kv_state`,{
    method:'POST',
    headers:{
      'apikey':conf.key,
      'Content-Type':'application/json',
      'Prefer':'resolution=merge-duplicates,return=representation'
    },
    body:JSON.stringify([{key,value,updated_at:new Date().toISOString()}])
  });
  if(!res.ok) throw new Error(`Supabase upsert ${key} failed: HTTP ${res.status}`);
  const rows=await res.json().catch(()=>null);
  return (rows&&rows[0])||null;
}

async function supabaseGetRow(key){
  const conf=supabaseConf();
  if(!conf) return null;
  const res=await fetch(`${conf.url}/rest/v1/kv_state?key=eq.${encodeURIComponent(key)}&select=value,updated_at`,{
    headers:{'apikey':conf.key}
  });
  if(!res.ok) throw new Error(`Supabase get ${key} failed: HTTP ${res.status}`);
  const rows=await res.json();
  return (rows&&rows[0])||null;
}

let ausdruckPushInFlight=false;
let ausdruckPushQueued=false;

function runAusdruckPush(){
  if(!supabaseConf()) return;
  if(ausdruckPushInFlight){ ausdruckPushQueued=true; return; }
  ausdruckPushInFlight=true;
  supabaseUpsert(ENTRIES_KEY,store)
    .then(row=>{
      // Pin our local "saved at" to the row's own timestamp, not Date.now(),
      // so a same-device reload never sees remoteUpdatedAt > localSavedAt
      // from clock/rounding drift and fires a spurious "cloud is newer" prompt.
      const ts=row&&row.updated_at?new Date(row.updated_at).getTime():null;
      if(ts) try{ localStorage.setItem(ENTRIES_SAVED_AT_KEY,String(ts)); }catch(e){}
    })
    .catch(e=>console.error('Cloud push failed:',e))
    .finally(()=>{
      ausdruckPushInFlight=false;
      if(ausdruckPushQueued){ ausdruckPushQueued=false; runAusdruckPush(); }
    });
}
function pushAusdruckNow(){
  if(!supabaseConf()) return;
  runAusdruckPush();
}
document.addEventListener('visibilitychange',()=>{ if(document.hidden) pushAusdruckNow(); });

function fmtWhen(ts){ if(!ts) return 'never'; try{ return new Date(ts).toLocaleString(); }catch{ return 'never'; } }

// Returns true if the cloud copy was applied.
async function tryCloudPullOnLoad(){
  if(!supabaseConf()) return false;
  try{
    const row=await supabaseGetRow(ENTRIES_KEY);
    if(!row||!row.value||typeof row.value!=='object'||!Array.isArray(row.value.entries)) return false;
    const remoteUpdatedAt=new Date(row.updated_at).getTime();
    const localSavedAt=parseInt(localStorage.getItem(ENTRIES_SAVED_AT_KEY)||'0',10);
    const localEmpty=store.entries.length===0;
    if(!(remoteUpdatedAt>localSavedAt||localEmpty)) return false;
    if(confirm(`Cloud copy from ${fmtWhen(remoteUpdatedAt)} is newer than this device. Restore it?`)){
      store={v:1,entries:row.value.entries};
      saveEntries();
      return true;
    }
    return false;
  }catch(e){
    console.error('Cloud pull failed:',e);
    return false;
  }
}

/* ── Topic generation ── */
let currentTopic=null;
let sessionSkippedTopics=[];

async function fetchTopic(){
  const key=localStorage.getItem(GEMINI_KEY_LS);
  if(!key) throw new Error('no key');

  const last15=store.entries.slice(-15).map(e=>e.topic).filter(Boolean);
  const recentList=last15.concat(sessionSkippedTopics);
  const recentTopics=recentList.length?recentList.join(' | '):'noch keine';

  const prompt=`Give one short German writing prompt for a B1–B2 learner to speak about for ~10 sentences. Rotate register across: a past experience, an opinion, a plan, describing a scene, a hypothetical everyday situation. Vary the domain across work, travel, health, bureaucracy, relationships, money, technology, city life, food, childhood.
Do NOT reuse or paraphrase any of these recent topics: ${recentTopics}
Output the topic in German only, one or two sentences, no preamble, no quotation marks.`;

  const body=JSON.stringify({
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{temperature:0.95,maxOutputTokens:200}
  });
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

  const retryDelays=[800,1600,3200];
  let lastErr=new Error('unknown error');
  for(let attempt=0;attempt<3;attempt++){
    if(attempt>0) await new Promise(r=>setTimeout(r,retryDelays[attempt-1]));
    let shouldRetry=false;
    try{
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body});
      if(res.status===429||res.status>=500){
        lastErr=new Error(`API ${res.status}`);
        shouldRetry=true;
      }else if(!res.ok){
        const errBody=await res.text().catch(()=>'');
        throw new Error(`API ${res.status}: ${errBody.slice(0,200)}`);
      }else{
        const data=await res.json();
        const raw=(data?.candidates?.[0]?.content?.parts?.[0]?.text||'').trim();
        const topic=raw.replace(/^["“”']+|["“”']+$/g,'').trim();
        if(!topic) throw new Error('empty topic');
        return topic;
      }
    }catch(e){
      lastErr=e;
      if(e instanceof TypeError) shouldRetry=true;
    }
    if(!shouldRetry) break;
  }
  throw lastErr;
}

async function generateTopic(){
  const topicLoading=document.getElementById('topicLoading');
  const topicBlock=document.getElementById('topicBlock');
  const topicTextEl=document.getElementById('topicText');

  currentTopic=null;
  updateCounts();
  topicLoading.textContent='Thema wird generiert…';
  topicLoading.style.cursor='';
  topicLoading.onclick=null;
  topicLoading.classList.remove('hidden');
  topicBlock.classList.add('hidden');

  try{
    const topic=await fetchTopic();
    currentTopic=topic;
    topicTextEl.textContent=topic;
    topicLoading.classList.add('hidden');
    topicBlock.classList.remove('hidden');
  }catch(e){
    console.error('[ausdruck topic]',e);
    topicLoading.textContent=`Fehler: ${e.message} — zum Wiederholen tippen.`;
    topicLoading.style.wordBreak='break-word';
    topicLoading.style.cursor='pointer';
    topicLoading.onclick=()=>{ topicLoading.onclick=null; generateTopic(); };
  }
  updateCounts();
}

function skipTopic(){
  if(currentTopic) sessionSkippedTopics.push(currentTopic);
  generateTopic();
}

/* ── Grading ── */
async function fetchGrade(topic,text){
  const key=localStorage.getItem(GEMINI_KEY_LS);
  if(!key) throw new Error('no key');

  const prompt=`Grade a B1–B2 learner's short German text on this topic: ${topic}

The text was DICTATED via speech recognition. Ignore capitalization and punctuation completely — they are artifacts of dictation, not the learner's German. Never report them as errors.

Output JSON only, no markdown:
{"scores":{"naturalness":0-5,"task":0-5,"range":0-5,"accuracy":0-5,"coherence":0-5},
 "errors":[{"original": exact substring copied verbatim from the learner's text, "correction": fixed version, "category": one of case|gender|word_order|verb|preposition|word_choice|spelling, "note": short reason in English}],
 "corrected": the full text corrected into natural German,
 "stretch": {"original": one sentence from the text, "better": how a native would more naturally say it, "note": one-line English explanation}}

Naturalness is the HEADLINE score — reward text that sounds like a real person, not merely error-free text.
Casual German norms: past events use Perfekt, EXCEPT sein/haben/modals which take Präteritum (war, hatte, konnte — never ist gewesen, hat gehabt). Never "correct" a correct war/hatte into Perfekt.
Judge only the German actually written; never invent errors. Each "original" must be an exact substring of the learner's text so the app can highlight it. Keep notes short and encouraging.

Learner's text:
"""${text}"""`;

  const body=JSON.stringify({
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{temperature:0.4,maxOutputTokens:4096,responseMimeType:"application/json"}
  });
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

  const retryDelays=[800,1600,3200];
  let lastErr=new Error('unknown error');
  for(let attempt=0;attempt<3;attempt++){
    if(attempt>0) await new Promise(r=>setTimeout(r,retryDelays[attempt-1]));
    let shouldRetry=false;
    try{
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body});
      if(res.status===429||res.status>=500){
        lastErr=new Error(`API ${res.status}`);
        shouldRetry=true;
      }else if(!res.ok){
        const errBody=await res.text().catch(()=>'');
        throw new Error(`API ${res.status}: ${errBody.slice(0,200)}`);
      }else{
        const data=await res.json();
        const raw=(data?.candidates?.[0]?.content?.parts?.[0]?.text||'').trim();
        const s=raw.indexOf('{'), e=raw.lastIndexOf('}');
        if(s===-1||e<=s) throw new Error(`no JSON object — raw: ${raw.slice(0,120)}`);
        const grade=JSON.parse(raw.slice(s,e+1));
        if(!grade.scores||typeof grade.scores!=='object'||!Array.isArray(grade.errors)||typeof grade.corrected!=='string'){
          throw new Error(`bad shape — raw: ${raw.slice(0,120)}`);
        }
        return grade;
      }
    }catch(e){
      lastErr=e;
      if(e instanceof TypeError) shouldRetry=true;
    }
    if(!shouldRetry) break;
  }
  throw lastErr;
}

let grading=false;

async function handleSubmit(){
  if(grading) return;
  const text=ausdruckInput.value.trim();
  if(!text||!currentTopic) return;
  stopMic();
  grading=true;

  const composeScreen=document.getElementById('composeScreen');
  const gradingScreen=document.getElementById('gradingScreen');
  const gradingText=document.getElementById('gradingText');
  const gradingActions=document.getElementById('gradingActions');

  composeScreen.classList.add('hidden');
  gradingActions.classList.add('hidden');
  gradingText.textContent='Wird bewertet…';
  gradingText.style.cursor='';
  gradingText.onclick=null;
  gradingScreen.classList.remove('hidden');

  try{
    const grade=await fetchGrade(currentTopic,text);
    const entry={
      date:new Date().toISOString(),
      topic:currentTopic,
      text,
      scores:grade.scores||{},
      errors:Array.isArray(grade.errors)?grade.errors:[],
      corrected:grade.corrected||'',
      stretch:grade.stretch||null
    };
    addEntry(entry);
    grading=false;
    gradingScreen.classList.add('hidden');
    showFeedback(entry,'compose');
  }catch(e){
    console.error('[ausdruck grade]',e);
    grading=false;
    gradingText.textContent=`Fehler: ${e.message} — zum Wiederholen tippen.`;
    gradingText.style.wordBreak='break-word';
    gradingText.style.cursor='pointer';
    gradingText.onclick=()=>{ gradingText.onclick=null; handleSubmit(); };
    gradingActions.classList.remove('hidden');
  }
}

/* ── Highlighting & rendering ── */
const CATEGORY_COLORS={
  case:'#f97316', gender:'#a78bfa', word_order:'#38bdf8', verb:'#ef4444',
  preposition:'#eab308', word_choice:'#22c55e', spelling:'#9aacbf'
};
const CATEGORY_LABELS={
  case:'Fall', gender:'Genus', word_order:'Wortstellung', verb:'Verb',
  preposition:'Präposition', word_choice:'Wortwahl', spelling:'Rechtschreibung'
};

function escapeHTML(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderHighlightedText(text,errors){
  text=text||'';
  const matches=[];
  (errors||[]).forEach((err,i)=>{
    if(!err||!err.original) return;
    const idx=text.indexOf(err.original);
    if(idx===-1) return;
    matches.push({start:idx,end:idx+err.original.length,i});
  });
  matches.sort((a,b)=>a.start-b.start);
  const clean=[];
  let lastEnd=0;
  matches.forEach(m=>{
    if(m.start>=lastEnd){ clean.push(m); lastEnd=m.end; }
  });
  let html='', pos=0;
  clean.forEach(m=>{
    html+=escapeHTML(text.slice(pos,m.start));
    const err=errors[m.i];
    const color=CATEGORY_COLORS[err.category]||'var(--accent)';
    html+=`<span class="errSpan" style="border-bottom:2px solid ${color};" data-idx="${m.i}">${escapeHTML(text.slice(m.start,m.end))}</span>`;
    pos=m.end;
  });
  html+=escapeHTML(text.slice(pos));
  return html;
}

function showErrTooltip(span,err){
  const tip=document.getElementById('errTooltip');
  const color=CATEGORY_COLORS[err.category]||'var(--accent)';
  const label=CATEGORY_LABELS[err.category]||err.category||'';
  tip.style.borderColor=color;
  tip.innerHTML=`<div class="corrLine" style="color:${color}">${escapeHTML(label)}: ${escapeHTML(err.correction||'')}</div><div class="muted">${escapeHTML(err.note||'')}</div>`;
  const rect=span.getBoundingClientRect();
  tip.classList.add('show');
  const tipWidth=tip.offsetWidth||260;
  tip.style.left=Math.max(8,Math.min(window.innerWidth-tipWidth-8,rect.left))+'px';
  tip.style.top=(rect.bottom+8)+'px';
}

function wireErrorSpans(container,errors){
  container.querySelectorAll('.errSpan').forEach(span=>{
    span.addEventListener('click',e=>{
      e.stopPropagation();
      const idx=parseInt(span.dataset.idx,10);
      const err=errors[idx];
      if(!err) return;
      showErrTooltip(span,err);
    });
  });
}

document.addEventListener('click',e=>{
  const tip=document.getElementById('errTooltip');
  if(tip&&tip.classList.contains('show')&&!tip.contains(e.target)&&!e.target.classList.contains('errSpan')){
    tip.classList.remove('show');
  }
});

function fmtScore(v){
  const n=Number(v);
  return Number.isFinite(n)?n:'–';
}

let feedbackReturnTo='compose';

function showFeedback(entry,returnTo){
  feedbackReturnTo=returnTo||'compose';
  document.getElementById('composeScreen').classList.add('hidden');
  document.getElementById('gradingScreen').classList.add('hidden');
  document.getElementById('historyScreen').classList.add('hidden');
  document.getElementById('feedbackScreen').classList.remove('hidden');
  renderFeedback(entry);

  const newBtn=document.getElementById('btnNewFromFeedback');
  const backBtn=document.getElementById('btnBackFromFeedback');
  if(feedbackReturnTo==='history'){
    newBtn.classList.add('hidden');
    backBtn.classList.remove('hidden');
  }else{
    newBtn.classList.remove('hidden');
    backBtn.classList.add('hidden');
  }
}

function renderFeedback(entry){
  const scores=entry.scores||{};
  document.getElementById('feedbackTopic').textContent=entry.topic||'';
  document.getElementById('scoreNaturalness').textContent=fmtScore(scores.naturalness);
  document.getElementById('scoreTask').textContent=fmtScore(scores.task);
  document.getElementById('scoreRange').textContent=fmtScore(scores.range);
  document.getElementById('scoreAccuracy').textContent=fmtScore(scores.accuracy);
  document.getElementById('scoreCoherence').textContent=fmtScore(scores.coherence);

  const gradedTextEl=document.getElementById('gradedText');
  const errors=entry.errors||[];
  gradedTextEl.innerHTML=renderHighlightedText(entry.text,errors);
  wireErrorSpans(gradedTextEl,errors);

  const correctedBlock=document.getElementById('correctedBlock');
  correctedBlock.textContent=entry.corrected||'';
  correctedBlock.classList.add('hidden');
  document.getElementById('btnToggleCorrected').textContent='Korrigierte Version zeigen';

  const stretchBlock=document.getElementById('stretchBlock');
  if(entry.stretch&&entry.stretch.original){
    stretchBlock.classList.remove('hidden');
    document.getElementById('stretchOrig').textContent=entry.stretch.original;
    document.getElementById('stretchBetter').textContent=entry.stretch.better||'';
    document.getElementById('stretchNote').textContent=entry.stretch.note||'';
  }else{
    stretchBlock.classList.add('hidden');
  }
}

/* ── History ── */
function fmtDate(iso){
  try{ return new Date(iso).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(e){ return iso; }
}

function renderHistoryList(){
  const list=document.getElementById('historyList');
  list.innerHTML='';
  if(!store.entries.length){
    list.innerHTML='<div class="muted small">Noch keine Einträge.</div>';
    return;
  }
  [...store.entries].reverse().forEach(entry=>{
    const item=document.createElement('div');
    item.className='historyItem';
    item.innerHTML=`<div class="historyDate">${escapeHTML(fmtDate(entry.date))}</div><div class="historyTopic">${escapeHTML(entry.topic||'')}</div>`;
    let lock=0;
    item.addEventListener('pointerdown',e=>{
      e.preventDefault();
      const now=Date.now(); if(now-lock<400) return; lock=now;
      showFeedback(entry,'history');
    },{passive:false});
    item.addEventListener('mousedown',e=>e.preventDefault());
    list.appendChild(item);
  });
}

function showHistory(){
  document.getElementById('composeScreen').classList.add('hidden');
  document.getElementById('feedbackScreen').classList.add('hidden');
  document.getElementById('gradingScreen').classList.add('hidden');
  document.getElementById('historyScreen').classList.remove('hidden');

}

function showCompose(){
  document.getElementById('historyScreen').classList.add('hidden');

/* ── Word/sentence count ── */
function updateCounts(){
  const text=ausdruckInput.value.trim();
  const words=text?text.split(/\s+/).filter(Boolean).length:0;
  const sentMatches=text.match(/[^.!?…]+[.!?…]+/g);
  const sents=sentMatches?sentMatches.length:(text?1:0);
  document.getElementById('wordCount').textContent=`${words} ${words===1?'Wort':'Wörter'}`;
  document.getElementById('sentCount').textContent=`${sents} ${sents===1?'Satz':'Sätze'}`;
  document.getElementById('btnSubmit').disabled=words<3||!currentTopic;
}

/* ── DOM refs ── */
const ausdruckInput=document.getElementById('ausdruckInput');
const micBtn=document.getElementById('micBtn');

/* ── Speech synthesis unlock (kept for parity with chat.html's mic gesture pattern) ── */
document.addEventListener('pointerdown',()=>unlockSynth(),{once:true});
let synthUnlocked=false;
function unlockSynth(){
  if(synthUnlocked||!window.speechSynthesis) return;
  synthUnlocked=true;
  const u=new SpeechSynthesisUtterance('okay');
  u.volume=0;
  u.rate=10;
  window.speechSynthesis.speak(u);
}

/* ── Speech recognition ── */
let recognition=null;
let micActive=false;
let micBase='';

{
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    recognition=new SR();
    recognition.lang='de-DE';
    recognition.continuous=true;
    recognition.interimResults=true;
    recognition.maxAlternatives=1;

    recognition.onstart=()=>{
      micBase=ausdruckInput.value.trimEnd();
    };

    recognition.onresult=e=>{
      let interim='', final='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) final+=e.results[i][0].transcript;
        else interim+=e.results[i][0].transcript;
      }
      const sep=w=>w&&!w.endsWith(' ')?' ':'';
      if(final){
        micBase=(micBase+sep(micBase)+final).trimStart();
        ausdruckInput.value=micBase;
        ausdruckInput.classList.remove('interim');
      }else if(interim){
        ausdruckInput.value=micBase+sep(micBase)+interim;
        ausdruckInput.classList.add('interim');
      }
      updateCounts();
    };

    recognition.onerror=e=>{ if(e.error!=='aborted') console.warn('[mic]',e.error); };

    recognition.onend=()=>{
      micBtn.classList.remove('listening');
      micActive=false;
      ausdruckInput.classList.remove('interim');
    };
  }else{
    micBtn.classList.add('hidden');
  }
}

function stopMic(){
  if(!micActive||!recognition) return;
  try{ recognition.stop(); }catch(e){}
  micBtn.classList.remove('listening');
  micActive=false;
  ausdruckInput.classList.remove('interim');
}

/* ── Button wiring helper (pointerdown+mousedown, 400ms throttle) ── */
function wireButton(id,handler){
  const el=document.getElementById(id);
  if(!el) return;
  let lock=0;
  el.addEventListener('pointerdown',e=>{
    e.preventDefault();
    const now=Date.now(); if(now-lock<400) return; lock=now;
    handler();
  },{passive:false});
  el.addEventListener('mousedown',e=>e.preventDefault());
}

micBtn.addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(!recognition) return;
  const now=Date.now();
  if(micBtn._lock&&now-micBtn._lock<400) return;
  micBtn._lock=now;
  unlockSynth();
  if(micActive){
    stopMic();
  }else{
    micActive=true;
    micBtn.classList.add('listening');
    try{ recognition.start(); }catch(e){}
  }
},{passive:false});
micBtn.addEventListener('mousedown',e=>e.preventDefault());

ausdruckInput.addEventListener('input',updateCounts);

wireButton('btnSubmit',handleSubmit);
wireButton('btnSkipTopic',skipTopic);
wireButton('btnHistory',showHistory);
wireButton('btnBackFromHistory',showCompose);
wireButton('btnNewFromFeedback',startNewTopic);
wireButton('btnBackFromFeedback',showHistory);
wireButton('btnGradingBack',()=>{
  document.getElementById('gradingScreen').classList.add('hidden');
  showCompose();
});
wireButton('btnToggleCorrected',()=>{
  const block=document.getElementById('correctedBlock');
  const btn=document.getElementById('btnToggleCorrected');
  block.classList.toggle('hidden');
  btn.textContent=block.classList.contains('hidden')?'Korrigierte Version zeigen':'Korrigierte Version verbergen';

  }
  tryCloudPullOnLoad();
