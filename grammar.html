<style>
*{box-sizing:border-box}
button,input,textarea,select{font-family:inherit;}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 'Lora',Georgia,serif;}
.wrap{max-width:720px;margin:0 auto;padding:14px 14px calc(96px + env(safe-area-inset-bottom,0px));}

/* header (large title) */
.bar{font-family:var(--font-chrome);font-size:28px;font-weight:700;color:var(--text);margin:2px 0 16px;}

/* card */
.card{padding:16px;position:relative;border-radius:var(--r-card);}

/* ── drill entrance (new card) ── */
@keyframes drillSlideIn{from{transform:translateX(18px);opacity:0}to{transform:translateX(0);opacity:1}}
.card.drill-enter #drillContent{animation:drillSlideIn .25s cubic-bezier(.25,.46,.45,.94) both;}

/* ── word chips stagger in ── */
@keyframes pieceIn{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}
.card.drill-enter .piece{animation:pieceIn .3s ease both;}
.card.drill-enter .piece:nth-child(1){animation-delay:.02s}
.card.drill-enter .piece:nth-child(2){animation-delay:.05s}
.card.drill-enter .piece:nth-child(3){animation-delay:.08s}
.card.drill-enter .piece:nth-child(4){animation-delay:.11s}
.card.drill-enter .piece:nth-child(5){animation-delay:.14s}
.card.drill-enter .piece:nth-child(6){animation-delay:.17s}
.card.drill-enter .piece:nth-child(7){animation-delay:.20s}
.card.drill-enter .piece:nth-child(8){animation-delay:.23s}
.card.drill-enter .piece:nth-child(9){animation-delay:.26s}
.card.drill-enter .piece:nth-child(10){animation-delay:.29s}
.card.drill-enter .piece:nth-child(n+11){animation-delay:.32s}

/* ── feedback line reveal ── */
@keyframes feedbackIn{from{transform:translateY(-4px);opacity:0}to{transform:translateY(0);opacity:1}}
#feedback:not(.hidden){animation:feedbackIn .25s ease both;}

/* divider */
.divider{border:none;border-top:1px solid var(--divider);margin:14px 0;}

/* inputs */
input,textarea{width:100%;padding:10px;border-radius:10px;font-size:16px;color:var(--text);}
.good-field{border-color:var(--good)!important;box-shadow:0 0 0 1px rgba(50,215,75,.45);}
.bad-field{border-color:var(--bad)!important;box-shadow:0 0 0 1px rgba(255,69,58,.45);}

/* action row */
.actionRow{display:flex;gap:6px;margin-top:10px;}
.actionRow button{flex:1;padding:10px 8px;font-size:14px;font-family:var(--font-chrome);}

/* states */
.hidden{display:none!important}
.muted{color:var(--muted)}
.small{font-size:12px}
.good{color:var(--good)} .bad{color:var(--bad)}

/* flash overlay */
.flash-overlay{position:absolute;inset:0;border-radius:var(--r-card);pointer-events:none;opacity:0;}
@keyframes flashAnim{0%{opacity:0}15%{opacity:1}100%{opacity:0}}
.flash-good{background:var(--good-bg);border:1.5px solid rgba(50,215,75,.5);border-radius:var(--r-card);animation:flashAnim .65s ease both;}
.flash-bad{background:var(--bad-bg);border:1.5px solid rgba(255,69,58,.45);border-radius:var(--r-card);animation:flashAnim .65s ease both;}

/* shake */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.input-shake{animation:shake .35s ease both;}

/* word pieces */
.piecesWrap{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0;}
.piece{padding:7px 13px;border-radius:10px;background:var(--btn);border:1.5px solid var(--border);font-size:15px;font-family:'Lora',Georgia,serif;color:var(--text);cursor:pointer;user-select:none;transition:opacity .2s ease,background .15s,transform .15s;}
.piece:active{transform:scale(.96);}
.piece.connector{background:rgba(10,132,255,0.12);border-color:rgba(10,132,255,0.4);color:var(--accent);}
.piece.used{opacity:0.3;text-decoration:line-through;}
@media (hover:hover){
  .piece:hover{background:var(--btn2);}
  .piece.connector:hover{background:rgba(10,132,255,0.2);}
}

/* loading */
@keyframes loadPulse{0%,100%{border-color:var(--border)}50%{border-color:rgba(10,132,255,0.5)}}
.card.loading{animation:loadPulse 1s ease infinite;}
#loadingText{color:var(--muted);font-size:14px;padding:16px 0;text-align:center;font-family:var(--font-chrome);}

/* undo-word: slides open under the textarea when there's something to undo */
.undoWrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .22s ease;}
.undoWrap.show{grid-template-rows:1fr;}
.undoWrap>div{overflow:hidden;}
.undoWrap button{
  margin-top:8px;background:transparent;border:1px solid var(--border-soft);
  color:var(--muted);font-size:13px;padding:7px 14px;border-radius:999px;
  font-family:var(--font-chrome);
}
.undoWrap button:active{background:rgba(255,255,255,.06);}

/* mic states (chat.html mic, verbatim) */
#micBtn svg{width:26px;height:26px;fill:var(--accent);flex-shrink:0;transition:fill .2s;}
#micBtn.listening{background:#2c0a0a;border-color:var(--bad);}
#micBtn.listening svg{fill:var(--bad);}
.ripple{position:absolute;inset:-12px;border-radius:50%;border:2px solid var(--bad);opacity:0;pointer-events:none;}
#micBtn.listening .ripple:nth-child(1){animation:rippleOut 1.6s ease-out infinite;}
#micBtn.listening .ripple:nth-child(2){animation:rippleOut 1.6s ease-out .53s infinite;}
#micBtn.listening .ripple:nth-child(3){animation:rippleOut 1.6s ease-out 1.06s infinite;}
@keyframes rippleOut{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.65);opacity:0}}
#micStatus{font-size:12px;color:var(--muted);margin-top:6px;min-height:1.2em;font-family:var(--font-chrome);}
.input-interim{color:var(--muted)!important;}

/* Check/Next/mic control bar — flows below the card, NOT fixed (the floating
   dock is the only fixed bottom element now); renamed from .pill/.pillHalf
   to avoid colliding with ios-theme.css's badge-pill component. */
.bottomBar{display:flex;justify-content:center;margin-top:18px;}
.checkPill{position:relative;display:flex;align-items:center;width:100%;max-width:370px;height:54px;background:var(--card);border:1px solid var(--border);border-radius:27px;}
.checkPillHalf{flex:1;background:transparent;border:none;color:var(--text);font-size:15px;font-family:var(--font-chrome);cursor:pointer;height:100%;transition:background .15s;}
.checkPillHalf:first-child{border-radius:27px 0 0 27px;}
.checkPillHalf:last-child{border-radius:0 27px 27px 0;}
.checkPillHalf:active{background:rgba(255,255,255,.1);}
.micCircle{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;background:var(--btn);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .15s,border-color .15s,transform .15s;}
.micCircle:active{transform:translate(-50%,-50%) scale(.95);}
@media (hover:hover){
  .checkPillHalf:hover{background:rgba(255,255,255,.06);}
}

/* word class borders (literal hues, not tied to theme tokens) */
.piece.acc-dat{border-color:#b8860b;}
.piece.personal-pronoun{border-color:#facc15;}
.piece.preposition{border-color:#c026d3;}
.piece.time-word{border-color:#22c55e;}
.piece.verb{background:var(--btn);border-color:var(--bad);color:#fff;}
</style>

function getWordClass(word,role){
  const w=word.toLowerCase();
  if(role==='verb'||role==='sep-prefix') return 'verb';
  if(CONNECTORS.has(w)) return 'connector';
  if(ACC_DAT_PRONOUNS.has(w)) return 'acc-dat';
  if(PERSONAL_PRONOUNS.has(w)) return 'personal-pronoun';
  if(NAMES.has(w)) return 'personal-pronoun';
  if(PREPOSITIONS.has(w)) return 'preposition';
  if(TIME_WORDS.has(w)) return 'time-word';
  return '';
}

const FRONTABLE_CONNECTORS=['weil','obwohl','wenn','als','nachdem',

const SUBJECTS=['er','sie','wir','du','ihr','man','ich','Anna','Tom','Maria','Lukas'];
let lastTopicIndex=-1;
let lastInjectedIds=[];

/* ── Vocabulary injection (top5k profile) ── */
function pickInjectionWord(profile,excludeIds){
  const r=Math.random();
  const primary=r<0.50?'weak':(r<0.85?'training':'random');
  const order=[primary,...['weak','training','random'].filter(b=>b!==primary)];
  for(const bucket of order){
    const pool=profile.words.filter(w=>w&&w.id!=null&&w.bucket===bucket&&!excludeIds.has(w.id));
    if(pool.length) return pool[Math.floor(Math.random()*pool.length)];
  }
  return null;
}

/* ── German phonetic matching (Kölner Phonetik) ── */
function kolnerPhonetik(word){
  let w=(word||'').toUpperCase();
  w=w.replace(/Ä/g,'A').replace(/Ö/g,'O').replace(/Ü/g,'U').replace(/[^A-Z]/g,'');
  const codes=[];
  for(let i=0;i<w.length;i++){
    const c=w[i], prev=w[i-1], next=w[i+1];
    let code=null;
    if('AEIOUJY'.includes(c)) code='0';
    else if(c==='H') code=null;
    else if(c==='B') code='1';
    else if(c==='P') code=(next==='H')?'3':'1';
    else if(c==='D'||c==='T') code=(next==='C'||next==='S'||next==='Z')?'8':'2';
    else if(c==='F'||c==='V'||c==='W') code='3';
    else if(c==='G'||c==='K'||c==='Q') code='4';
    else if(c==='X'){
      if(prev==='C'||prev==='K'||prev==='Q') code='8';
      else{ codes.push('4'); code='8'; }
    }
    else if(c==='L') code='5';
    else if(c==='M'||c==='N') code='6';
    else if(c==='R') code='7';
    else if(c==='S'||c==='Z') code='8';
    else if(c==='C'){
      if(i===0) code=(next&&'AHKLOQRUX'.includes(next))?'4':'8';
      else if(prev==='S'||prev==='Z') code='8';
      else code=(next&&'AHKOQUX'.includes(next))?'4':'8';
    }
    if(code!=null) codes.push(code);
  }
  const collapsed=[];
  for(const c of codes){ if(collapsed.length===0||collapsed[collapsed.length-1]!==c) collapsed.push(c); }
  return collapsed.filter((c,i)=>i===0||c!=='0').join('');
}

/* ── Snap-to-target: map recognized tokens onto the closed drill word set ── */
function nearestWord(token,candidates){
  const raw=token.replace(/[.,!?;:"""„"–—]/g,'');
  if(!raw||!candidates.length) return {word:token,snapped:false};
  const lower=raw.toLowerCase();
  for(const c of candidates) if(c.toLowerCase()===lower) return {word:c,snapped:false};
  const normTok=normWord(raw);
  for(const c of candidates) if(normWord(c)===normTok) return {word:c,snapped:true};
  const phonTok=kolnerPhonetik(raw);
  if(phonTok){
    for(const c of candidates) if(kolnerPhonetik(c)===phonTok) return {word:c,snapped:true};
  }
  let best=null,bestDist=Infinity;
  for(const c of candidates){
    const d=levenshtein(normTok,normWord(c));
    if(d<bestDist){ bestDist=d; best=c; }
  }
  if(best!==null&&bestDist<=3) return {word:best,snapped:true};
  return {word:token,snapped:false};
}

function snapTokens(text,candidates){
  const tokens=text.trim().split(/\s+/).filter(Boolean);
  const snapped=[];
  const words=tokens.map((tok,i)=>{
    const r=nearestWord(tok,candidates);
    if(r.snapped) snapped.push(i);
    return r.word;
  });
  return {text:words.join(' '),snapped};
}

/* ── Speech recognition ── */
function pickBestAlternative(result,candidates){
  const n=Math.min(result.length,4);
  let best=result[0].transcript,bestScore=-1;
  for(let k=0;k<n;k++){
    const transcript=result[k].transcript;
    const tokens=transcript.trim().split(/\s+/).filter(Boolean);
    let score=0;
    for(const tok of tokens){
      const clean=tok.replace(/[.,!?;:"""„"–—]/g,'').toLowerCase();
      if(candidates.some(c=>c.toLowerCase()===clean)) score+=2;
      else if(candidates.some(c=>normWord(c)===normWord(clean))) score+=1;
    }
    if(score>bestScore){ bestScore=score; best=transcript; }
  }
  return best;
}

{
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    recognition=new SR();
    recognition.lang='de-DE';
    recognition.continuous=true;
    recognition.interimResults=true;
    recognition.maxAlternatives=4;

    recognition.onstart=()=>{
      micBase=document.getElementById('answerInput')?.value||'';
      snapFlags=[];
      setMicState('listening');
    };

    recognition.onresult=(e)=>{
      const candidates=currentDrill?._candidates||[];
      let interim='', final='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        const transcript=pickBestAlternative(e.results[i],candidates);
        if(e.results[i].isFinal) final+=transcript;
        else interim+=transcript;
      }
      if(final) setInputFinal(final);
      else if(interim) setInputInterim(interim);
    };

    recognition.onerror=(e)=>{
      setMicState('idle');
      if(e.error!=='aborted') showMicMsg("Didn't catch that — try again");
    };

    recognition.onend=()=>{
      const inp=document.getElementById('answerInput');
      if(inp?.classList.contains('input-interim')){
        inp.classList.remove('input-interim');
      }
      setMicState('idle');
    };
  }else{
    document.getElementById('micBtn')?.classList.add('hidden');
  }
}

function setMicState(s){
  micActive=(s==='listening');
  const btn=document.getElementById('micBtn');
  const status=document.getElementById('micStatus');
  if(s==='listening'){
    btn?.classList.add('listening');
    if(status){ status.textContent='Listening…'; status.classList.remove('hidden'); }
  }else{
    btn?.classList.remove('listening');
    if(status) status.classList.add('hidden');
  }
}

function updateSnapPreview(){
  const status=document.getElementById('micStatus');
  const inp=document.getElementById('answerInput');
  if(!status||!inp||!micActive) return;
  if(!snapFlags.length){ status.textContent='Listening…'; return; }
  const tokens=inp.value.trim().split(/\s+/).filter(Boolean);
  const set=new Set(snapFlags);
  const html=tokens.map((t,i)=>
    set.has(i)
      ? `<u style="text-decoration-color:var(--accent);text-underline-offset:3px;">${escapeHTML(t)}</u>`
      : escapeHTML(t)
  ).join(' ');
  status.innerHTML=`<span class="muted" style="font-size:11px;">corrected: </span>${html}`;
  status.classList.remove('hidden');
}

function setInputInterim(text){
  const inp=document.getElementById('answerInput');
  if(!inp) return;
  const {text:snappedText}=snapTokens(text,currentDrill?._candidates||[]);
  inp.value=micBase+(micBase&&!micBase.endsWith(' ')?' ':'')+snappedText;
  inp.classList.add('input-interim');
  inp.style.height='0px';
  inp.style.height=inp.scrollHeight+'px';
  updatePieceStates();
}

function setInputFinal(text){
  const inp=document.getElementById('answerInput');
  if(!inp) return;
  const baseWordCount=micBase.trim()?micBase.trim().split(/\s+/).filter(Boolean).length:0;
  const {text:snappedText,snapped}=snapTokens(text,currentDrill?._candidates||[]);
  inp.value=micBase+(micBase&&!micBase.endsWith(' ')?' ':'')+snappedText;
  micBase=inp.value;
  snapFlags.push(...snapped.map(i=>baseWordCount+i));
  inp.classList.remove('input-interim');
  inp.style.height='0px';
  inp.style.height=inp.scrollHeight+'px';
  updatePieceStates();
  updateSnapPreview();
}

/* ── Prefetch queue ── */
const QUEUE_DEPTH=2;
let drillQueue=[];
let fetchesInFlight=0;

async function fetchDrill(){
  const key=localStorage.getItem(GEMINI_KEY_LS);
  if(!key) throw new Error('no key');

  let profile=null;
  try{
    const raw=localStorage.getItem('top5k_profile_v1');
    if(raw){
      const p=JSON.parse(raw);
      if(p&&p.v===1&&Array.isArray(p.words)&&p.words.length>0) profile=p;
    }
  }catch(e){}

  let word1=null, word2=null;
  if(profile){
    const roll=Math.random();
    const injectCount=roll<0.70?1:(roll<0.85?2:0);
    if(injectCount>=1){
      word1=pickInjectionWord(profile,new Set(lastInjectedIds));
    }
    if(injectCount===2&&word1){
      const excl2=new Set(lastInjectedIds); excl2.add(word1.id);
      word2=pickInjectionWord(profile,excl2);
    }
  }
  lastInjectedIds=[word1?.id,word2?.id].filter(Boolean);

  let vocabLines='';
  if(word1){
    vocabLines+=`\n- Vocabulary word: "${word1.german}" (English: "${word1.english}"). Include it in the sentence, inflected or conjugated however the sentence requires — any tense, case, or plural form; the dictionary form is not required. First try to fit it naturally within the topic above. If the combination would feel forced or artificial, DROP THE TOPIC ENTIRELY and build the sentence around the word instead, in any everyday scenario where the word is genuinely common. Naturalness always wins; when topic and word conflict, the word stays and the topic goes.`;
  }
  if(word2){
    vocabLines+=`\n- Second vocabulary word: "${word2.german}" (English: "${word2.english}"). Same rules; it may live in the other clause. Include it ONLY if both words can share one scenario a real person would plausibly describe. If they can't, silently drop this second word — a natural sentence with one vocabulary word always beats a forced sentence with two.`;
  }

  const selfCheckBase=`(1) would a real person say this exact German sentence casually? (2) is every ordinary past-tense verb in Perfekt, with Präteritum only on sein/haben/modals? (3) does each English clause read as natural English, not word-for-word German? (4) if a subordinate clause comes first, does the main clause start with its finite verb?`;
  const selfCheckText=word1
    ? `${selfCheckBase} (5) does the vocabulary word appear, correctly inflected and used the way a native speaker actually uses it? Revise until all five hold.`
    : `${selfCheckBase} Revise until all four hold.`;

  let injectLine;
  if(word1&&word2) injectLine=`inject: ${word1.german} + ${word2.german}`;
  else if(word1) injectLine=`inject: ${word1.german} (${word1.bucket})`;
  else injectLine='inject: none';

  let topicIdx;
  do{ topicIdx=Math.floor(Math.random()*TOPICS.length); }while(topicIdx===lastTopicIndex&&TOPICS.length>1);
  lastTopicIndex=topicIdx;
  const topic=TOPICS[topicIdx];
  const connector=B2_CONNECTORS[Math.floor(Math.random()*B2_CONNECTORS.length)];
  const subject=SUBJECTS[Math.floor(Math.random()*SUBJECTS.length)];
  const clauseOrder=FRONTABLE_CONNECTORS.includes(connector)&&Math.random()<0.5?'subordinate clause first':'main clause first';

  const prompt=`Generate one German sentence for a B2 word-order drill. Return JSON only — no markdown, no code fences.

Schema: {"english":"...","words":[{"w":"...","r":"..."},...]}

english — Write the German sentence first, then translate it into fluent, natural English. The English must keep the German's CLAUSE structure: the same number of clauses, in the same order, joined by the same kind of connector (a "weil"-clause → a "because"-clause; a "dass"-clause → a "that"-clause), and the same meaning — same polarity and negation, same quantifiers, same modality, nothing added, dropped, or weakened. But INSIDE each clause, use ordinary English word order (subject–verb–object). NEVER carry German verb-final or verb-second order into the English.
  Right: "dass sie die falsche Medizin genommen hatte" → "that she had taken the wrong medicine"
  Wrong: "that she the wrong medicine taken had"

words — An array of {w,r} objects, one per word of the German sentence, in order. "w" is the exact surface form, with any trailing punctuation attached to the word it follows (e.g. "glaube,"). "r" is exactly one of: "verb" (any finite verb, infinitive, or participle), "sep-prefix" (a separated verb prefix, e.g. "an" in "Ich rufe an"), or "other". Everything that is not a verb or separated prefix is "other". Emit exactly one object per word; never drop, merge, or invent a word.

Rules:
- Topic: ${topic}.${vocabLines}
- Required subordinating connector: "${connector}" — it must appear, used with its correct meaning.
- Main-clause subject: ${subject} — but if this subject genuinely clashes with the vocabulary word, silently choose another everyday subject instead.
- Clause order: ${clauseOrder}. If "subordinate clause first", the main clause MUST then begin with its finite verb (the inversion): "Weil es regnet, BLEIBE ich zu Hause" — never "Weil es regnet, ich bleibe zu Hause".
- Length: 7–25 words, more than one clause, the way a real person would actually say it.
- Tense: present and past are both fine — mix them naturally, do not force either. BUT when you use the past, use the Perfekt (haben/sein + participle) for ordinary verbs: "hat geschwitzt", "hat gekauft", "ist gekommen" — never the written Präteritum "schwitzte", "kaufte", "kam". Präteritum is allowed ONLY for sein ("war"), haben ("hatte"), and modal verbs ("konnte", "wollte", "musste", "sollte", "durfte", "mochte").
- Register: casual spoken German — what friends, colleagues, or text messages actually sound like. No Konjunktiv, no Futur with "werden", no literary or bookish constructions, no clever idioms.
- Full written forms only: "habe" not "hab'", "gehe" not "geh'", "geht es" not "geht's", "eine" not "'ne".
- Word count is never a goal; never drop or compress words to save space. A complete, natural sentence always beats a terse one.

Examples of the exact quality and format wanted — note the natural English and the Perfekt past:
{"english":"I think that he missed the bus.","words":[{"w":"Ich","r":"other"},{"w":"glaube,","r":"verb"},{"w":"dass","r":"other"},{"w":"er","r":"other"},{"w":"den","r":"other"},{"w":"Bus","r":"other"},{"w":"verpasst","r":"verb"},{"w":"hat.","r":"verb"}]}
{"english":"Because it rained heavily, we stayed home.","words":[{"w":"Weil","r":"other"},{"w":"es","r":"other"},{"w":"stark","r":"other"},{"w":"geregnet","r":"verb"},{"w":"hat,","r":"verb"},{"w":"sind","r":"verb"},{"w":"wir","r":"other"},{"w":"zu","r":"other"},{"w":"Hause","r":"other"},{"w":"geblieben.","r":"verb"}]}
{"english":"I'll call you as soon as I've arrived.","words":[{"w":"Ich","r":"other"},{"w":"rufe","r":"verb"},{"w":"dich","r":"other"},{"w":"an,","r":"sep-prefix"},{"w":"sobald","r":"other"},{"w":"ich","r":"other"},{"w":"angekommen","r":"verb"},{"w":"bin.","r":"verb"}]}

Before returning, check: ${selfCheckText}`;

  const body=JSON.stringify({
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{temperature:0.7,maxOutputTokens:4096,responseMimeType:"application/json"}
  });
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

  const retryDelays=[800,1600,3200];
  let lastErr=new Error('unknown error');
  for(let attempt=0;attempt<3;attempt++){
    if(attempt>0) await new Promise(r=>setTimeout(r,retryDelays[attempt-1]));
    let shouldRetry=false;
    try{
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body});
      if(res.status===429||res.status>=500){
        lastErr=new Error(`API ${res.status}`);
        shouldRetry=true;
      }else if(!res.ok){
        const errBody=await res.text().catch(()=>'');
        throw new Error(`API ${res.status}: ${errBody.slice(0,200)}`);
      }else{
        const data=await res.json();
        const raw=(data?.candidates?.[0]?.content?.parts?.[0]?.text||'').trim();
        const s=raw.indexOf('{'), e=raw.lastIndexOf('}');
        if(s===-1||e<=s) throw new Error(`no JSON object — raw: ${raw.slice(0,120)}`);
        const drill=JSON.parse(raw.slice(s,e+1));
        if(!drill.english) throw new Error(`bad shape — raw: ${raw.slice(0,100)}`);
        const hasWords=Array.isArray(drill.words)&&drill.words.length>0&&drill.words.every(x=>x&&typeof x.w==='string');
        let pairs;
        if(hasWords){
          const cleaned=drill.words
            .map(({w,r})=>{const t=(w||'').trim();return{w:t.endsWith("'")?t.slice(0,-1)+'e':t,r};})
            .filter(x=>x.w);
          drill.correct=cleaned.map(x=>x.w).join(' ');
          pairs=cleaned.map(({w,r})=>({word:w,role:r}));
        }else if(drill.correct){
          drill.correct=drill.correct.split(' ').map(t=>t.endsWith("'")?t.slice(0,-1)+'e':t).join(' ');
          pairs=drill.correct.split(' ').map(word=>({word,role:null}));
        }else{
          throw new Error(`bad shape — raw: ${raw.slice(0,100)}`);
        }
        for(let i=pairs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pairs[i],pairs[j]]=[pairs[j],pairs[i]];}
        drill.pieces=pairs;
        drill._hasWords=hasWords;
        drill._injectLine=injectLine;
        return drill;
      }
    }catch(e){
      lastErr=e;
      if(e instanceof TypeError) shouldRetry=true;
    }
    if(!shouldRetry) break;
  }
  throw lastErr;
}

function refillQueue(){
  while(drillQueue.length+fetchesInFlight<QUEUE_DEPTH){
    fetchesInFlight++;
    fetchDrill()
      .then(drill=>{drillQueue.push(drill);fetchesInFlight--;})
      .catch(err=>{console.error('[grammar prefetch]',err);fetchesInFlight--;});
  }
}

function presentDrill(drill){
  if(micActive&&recognition) recognition.stop();
  drill._candidates=drill.pieces.map(p=>p.word.replace(/[.,!?;:"""„"–—]/g,'')).filter(Boolean);
  currentDrill=drill;
  appendDebugEntry(drill,drill.pieces,drill._hasWords);
  renderDrill(drill);
  refillQueue();
}

/* ── Generate drill (public) ── */
async function generateDrill(){
  const key=localStorage.getItem(GEMINI_KEY_LS);
  if(!key) return;

  if(drillQueue.length>0){
    presentDrill(drillQueue.shift());
    return;
  }

  const card=document.getElementById('drillCard');
  const loadingText=document.getElementById('loadingText');
  const drillContent=document.getElementById('drillContent');
  const feedback=document.getElementById('feedback');

  card.classList.add('loading');
  loadingText.textContent='Generating drill…';
  loadingText.classList.remove('hidden');

    loadingText.style.wordBreak='break-word';

}

/* ── Helpers ── */
function escapeHTML(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function triggerFlash(type){
  const el=document.getElementById('flashOverlay');

/* ── Local sentence evaluator ── */
function stripPunct(s){
  return (s||'').replace(/[.,!?;:"""„"()[\]{}–—]/g,'').replace(/\s+/g,' ').trim();
}
function normWord(w){
  return w.toLowerCase()
    .replace(/['']/g,"'")
    .replaceAll('ue','ü').replaceAll('oe','ö').replaceAll('ae','ä').replaceAll('ss','ß');
}
function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i?j?0:i:j));
  for(let i=1;i<=m;i++)
    for(let j=1;j<=n;j++)
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function wordsMatch(u,c){
  const un=normWord(u),cn=normWord(c);
  if(un===cn) return {match:true,typo:false};
  const pu=kolnerPhonetik(un),pc=kolnerPhonetik(cn);
  if(pu&&pu===pc) return {match:true,typo:true};
  if(levenshtein(un,cn)<=2) return {match:true,typo:true};
  return {match:false,typo:false};
}
/* Order-preserving alignment (edit-distance DP) between user words (uw) and
   correct words (cw): finds the best-scoring set of matched pairs while
   allowing correct words to be dropped and user words to be extra. */
function alignWords(uw,cw){
  const m=uw.length,n=cw.length;
  const score=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      const diag=score[i-1][j-1]+(wordsMatch(uw[i-1],cw[j-1]).match?1:0);
      score[i][j]=Math.max(diag,score[i-1][j],score[i][j-1]);
    }
  }
  let i=m,j=n,extraCount=0;
  const cwMatched=new Array(n).fill(false);
  const cwTypo=new Array(n).fill(false);
  while(i>0&&j>0){
    const wm=wordsMatch(uw[i-1],cw[j-1]);
    if(wm.match&&score[i][j]===score[i-1][j-1]+1){
      cwMatched[j-1]=true; cwTypo[j-1]=wm.typo;
      i--; j--;
    }else if(score[i][j]===score[i-1][j]){
      extraCount++; i--;
    }else{
      j--;
    }
  }
  extraCount+=i;
  const droppedIdx=[],typoIdx=[];
  for(let k=0;k<n;k++){
    if(!cwMatched[k]) droppedIdx.push(k);
    else if(cwTypo[k]) typoIdx.push(k);
  }
  return {droppedIdx,typoIdx,extraCount};
}
function evaluateAnswer(userRaw,correctRaw){
  const user=stripPunct(userRaw).toLowerCase();
  const correct=stripPunct(correctRaw).toLowerCase();
  if(user===correct) return {verdict:'CORRECT',typoIndices:[]};
  const uw=user.split(/\s+/).filter(Boolean);
  const cw=correct.split(/\s+/).filter(Boolean);
  const {droppedIdx,typoIdx,extraCount}=alignWords(uw,cw);
  if(extraCount>0) return {verdict:'WRONG',typoIndices:[]};
  if(!droppedIdx.length&&!typoIdx.length) return {verdict:'CORRECT',typoIndices:[]};
  const droppedOk=droppedIdx.length<=1&&droppedIdx.every(idx=>cw[idx].length<=3);
  if(droppedOk) return {verdict:'TYPO',typoIndices:[...typoIdx,...droppedIdx]};
  return {verdict:'WRONG',typoIndices:[]};
}
function buildCorrectHTML(correctRaw,typoIndices){
  const typoSet=new Set(typoIndices);
  return correctRaw.split(/\s+/).map((token,i)=>
    typoSet.has(i)
      ? `<u style="text-decoration-color:var(--accent);text-underline-offset:3px;">${escapeHTML(token)}</u>`
      : escapeHTML(token)
  ).join(' ');
}

/* ── Sync piece used-state with textarea content ── */
function updatePieceStates(){
  const inp=document.getElementById('answerInput');
  const piecesWrap=document.getElementById('piecesWrap');
  if(!inp||!piecesWrap||!currentDrill) return;

  const typedWords=inp.value.trim().split(/\s+/).filter(Boolean)
    .map(w=>w.replace(/[.,!?;:"""„"–—]/g,'').toLowerCase());
  const remaining={};
  typedWords.forEach(w=>{remaining[w]=(remaining[w]||0)+1;});

  const consumed={};
  piecesWrap.querySelectorAll('.piece').forEach(btn=>{
    const word=btn.textContent.trim().toLowerCase();
    consumed[word]=consumed[word]||0;
    if(consumed[word]<(remaining[word]||0)){
      btn.classList.add('used');
      consumed[word]++;
    }else{
      btn.classList.remove('used');
    }
  });
  const undoWrap=document.getElementById('undoWrap');
  if(undoWrap) undoWrap.classList.toggle('show',!!inp.value.trim());
}

/* ── Check answer ── */
function checkAnswer(){
  if(!currentDrill) return;
  const inp=document.getElementById('answerInput');
  const feedback=document.getElementById('feedback');

  inp.classList.remove('good-field','bad-field');
  document.getElementById('undoWrap')?.classList.remove('show');

  const {verdict,typoIndices}=evaluateAnswer(inp.value,currentDrill.correct);

  if(verdict==='CORRECT'){
    inp.classList.add('good-field');
    triggerFlash('good');
    feedback.classList.add('hidden');
    setTimeout(()=>generateDrill(),800);
  }else if(verdict==='TYPO'){
    inp.classList.add('good-field');
    triggerFlash('good');
    feedback.innerHTML=`<span style="color:var(--muted);font-size:13px;">Typo — close enough:</span><br><strong>${buildCorrectHTML(currentDrill.correct,typoIndices)}</strong>`;
    feedback.classList.remove('hidden');
    setTimeout(()=>generateDrill(),2000);
  }else{
    inp.classList.add('bad-field');
    triggerFlash('bad');
    inp.classList.remove('input-shake');
    void inp.offsetWidth;
    inp.classList.add('input-shake');
    setTimeout(()=>inp.classList.remove('input-shake'),400);
    feedback.innerHTML=`<span class="muted">Correct: </span><strong>${escapeHTML(currentDrill.correct)}</strong>`;
    feedback.classList.remove('hidden');
  }
}

/* ── Boot ── */
function boot(){
  if(!localStorage.getItem(GEMINI_KEY_LS)){
    document.getElementById('apiKeyScreen').classList.remove('hidden');
    return;
  }
  generateDrill();
}

/* ── Wire buttons ── */
{
  let lockCheck=0;
  document.getElementById('btnCheck')?.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    const now=Date.now(); if(now-lockCheck<400) return; lockCheck=now;
    checkAnswer();
  },{passive:false});
  document.getElementById('btnCheck')?.addEventListener('mousedown',(e)=>e.preventDefault());

  const answerEl=document.getElementById('answerInput');
  function autoResize(){
    answerEl.style.height='0px';
    answerEl.style.height=answerEl.scrollHeight+'px';
    updatePieceStates();
  }
  answerEl?.addEventListener('input',autoResize);
  answerEl?.addEventListener('keydown',(e)=>{
    if(e.key==='Enter'){ e.preventDefault(); checkAnswer(); }
  });

  let debugTapCount=0,debugTapTimer=null;
  document.getElementById('englishText')?.addEventListener('pointerdown',()=>{
    debugTapCount++;
    clearTimeout(debugTapTimer);
    debugTapTimer=setTimeout(()=>{ debugTapCount=0; },1500);
    if(debugTapCount>=5){
      debugTapCount=0;
      clearTimeout(debugTapTimer);
      debugVisible=!debugVisible;
      const panel=document.getElementById('debugPanel');
      if(panel) panel.style.display=debugVisible?'block':'none';
    }
  });

  let lockUndo=0;
  document.getElementById('btnUndo')?.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    const now=Date.now(); if(now-lockUndo<150) return; lockUndo=now;
    if(!answerEl||!answerEl.value.trim()) return;
    const trimmed=answerEl.value.trimEnd();
    const lastSpace=trimmed.lastIndexOf(' ');
    answerEl.value=lastSpace>=0?trimmed.slice(0,lastSpace+1):'';
    autoResize();
  },{passive:false});
  document.getElementById('btnUndo')?.addEventListener('mousedown',(e)=>e.preventDefault());

  let lockNext=0;
  document.getElementById('btnNext')?.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    const now=Date.now(); if(now-lockNext<400) return; lockNext=now;
    generateDrill();
  },{passive:false});
  document.getElementById('btnNext')?.addEventListener('mousedown',(e)=>e.preventDefault());

  let lockMic=0;
  document.getElementById('micBtn')?.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    const now=Date.now(); if(now-lockMic<400) return; lockMic=now;
    if(micActive){ recognition.stop(); }
    else{ try{ recognition.start(); }catch(err){ setMicState('idle'); } }
  },{passive:false});
  document.getElementById('micBtn')?.addEventListener('mousedown',(e)=>e.preventDefault());

  // Tab persistence: save on navigate
  document.querySelectorAll('.tabItem').forEach(a=>{

        href==='grammar.html'?'grammar':href==='chat.html'?'chat':href==='preps.html'?'preps':href==='ausdruck.html'?'ausdruck':'vocab');
    });
  });

  let lockSave=0;
  document.getElementById('apiKeySave')?.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    const now=Date.now(); if(now-lockSave<400) return; lockSave=now;
    const val=(document.getElementById('apiKeyInput')?.value||'').trim();
    const hint=document.getElementById('apiKeyHint');
    if(!val){
      if(hint){ hint.textContent='Please enter your API key.'; hint.classList.remove('hidden'); }
      return;
    }
    localStorage.setItem(GEMINI_KEY_LS,val);
    location.reload();
  },{passive:false});
  document.getElementById('apiKeySave')?.addEventListener('mousedown',(e)=>e.preventDefault());
  document.getElementById('apiKeyInput')?.addEventListener('keydown',(e)=>{
    if(e.key==='Enter') document.getElementById('apiKeySave')?.dispatchEvent(new PointerEvent('pointerdown',{bubbles:true}));
  });
}
