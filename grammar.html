<style>
:root{
  --bg:#0b0e12; --card:#12161d; --text:#e9eef5; --muted:#9aacbf; --border:#243041;
  --accent:#6aa6ff; --good:#22c55e; --bad:#ef4444; --btn:#1a2230; --btn2:#1e2a3c; --hole:#0f141c;
}
*{box-sizing:border-box}
button,input,textarea,select{font-family:inherit;}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 'Lora',Georgia,serif;}
.wrap{max-width:720px;margin:0 auto;padding:14px 14px 110px}

/* tabs */
.tabBar{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;}
.tabItem{padding:8px 20px;font-size:14px;color:var(--muted);text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;}
.tabItem.active{color:var(--text);border-bottom-color:var(--accent);}
.tabItem:hover:not(.active){color:var(--text);}

/* card */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 6px 20px rgba(0,0,0,.25);position:relative;overflow:hidden;}

/* divider */
.divider{border:none;border-top:1px solid var(--border);margin:12px 0;}

/* inputs */
input,textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--hole);color:var(--text);font-size:16px;}
.good-field{border-color:var(--good)!important;box-shadow:0 0 0 1px rgba(34,197,94,.45);}
.bad-field{border-color:var(--bad)!important;box-shadow:0 0 0 1px rgba(239,68,68,.45);}

/* action row */
.actionRow{display:flex;gap:6px;margin-top:10px;}
.actionRow button{flex:1;background:var(--btn);border:1px solid var(--border);border-radius:10px;padding:10px 8px;color:var(--text);cursor:pointer;font-size:14px;}
.actionRow button:hover{background:var(--btn2);}

/* generic button */
button{background:var(--btn);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);cursor:pointer;}
button:hover{background:var(--btn2);}

/* states */
.hidden{display:none!important}
.muted{color:var(--muted)}
.small{font-size:12px}
.good{color:var(--good)} .bad{color:var(--bad)}

/* API key setup screen */
#apiKeyScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:16px;z-index:10000;}
#apiKeyScreen.hidden{display:none!important}
.setupBox{width:min(480px,100%);background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 12px 40px rgba(0,0,0,.45);}

/* flash overlay */
.flash-overlay{position:absolute;inset:0;border-radius:14px;pointer-events:none;opacity:0;}
@keyframes flashAnim{0%{opacity:0}15%{opacity:1}100%{opacity:0}}
.flash-good{background:rgba(34,197,94,.12);border:1.5px solid rgba(34,197,94,.5);border-radius:14px;animation:flashAnim .65s ease both;}
.flash-bad{background:rgba(239,68,68,.10);border:1.5px solid rgba(239,68,68,.45);border-radius:14px;animation:flashAnim .65s ease both;}

/* shake */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.input-shake{animation:shake .35s ease both;}

/* word pieces */
.piecesWrap{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0;}
.piece{padding:7px 13px;border-radius:10px;background:var(--btn);border:1px solid var(--border);font-size:15px;cursor:pointer;user-select:none;}
.piece:hover{background:var(--btn2);}
.piece:active{transform:scale(.96);}
.piece.connector{background:rgba(106,166,255,0.1);border-color:rgba(106,166,255,0.4);color:var(--accent);}
.piece.connector:hover{background:rgba(106,166,255,0.2);}
.piece.used{opacity:0.3;text-decoration:line-through;}

/* loading */
@keyframes loadPulse{0%,100%{border-color:var(--border)}50%{border-color:rgba(106,166,255,0.5)}}
.card.loading{animation:loadPulse 1s ease infinite;}
#loadingText{color:var(--muted);font-size:14px;padding:16px 0;text-align:center;}

/* mic states */
.mic-listening{background:#ef4444!important;border-color:#ef4444!important;}
#micStatus{font-size:12px;color:var(--muted);margin-top:6px;min-height:1.2em;}
.input-interim{color:var(--muted)!important;}

/* bottom bar */
.bottomBar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;padding:0 16px calc(20px + env(safe-area-inset-bottom));}
.pill{position:relative;display:flex;align-items:center;width:min(440px,100%);height:54px;background:var(--btn);border:1px solid var(--border);border-radius:27px;}
.pillHalf{flex:1;background:transparent;border:none;color:var(--text);font-size:15px;cursor:pointer;height:100%;transition:background .15s;}
.pillHalf:first-child{border-radius:27px 0 0 27px;}
.pillHalf:last-child{border-radius:0 27px 27px 0;}
.pillHalf:hover{background:rgba(255,255,255,.06);}
.micCircle{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;background:var(--btn);border:1px solid var(--border);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .15s,border-color .15s;}

/* word class borders */
.piece.acc-dat{border-color:#b8860b;}
.piece.personal-pronoun{border-color:#facc15;}
.piece.preposition{border-color:#c026d3;}
.piece.time-word{border-color:#22c55e;}
.piece.verb{border-color:#ef4444;}
</style>

<script>

const PREPOSITIONS=new Set(['an','auf','aus','außer','bei','bis','durch','entlang','für','gegen','gegenüber','hinter','in','innerhalb','mit','nach','neben','ohne','seit','statt','anstatt','trotz','über','um','unter','vor','wegen','während','zu','zwischen','ab','außerhalb','dank','gemäß','laut','mithilfe','seitens','unweit','zufolge','zugunsten','kraft','mittels','infolge','aufgrund','anhand','angesichts','bezüglich','hinsichtlich','ungeachtet','entgegen','entsprechend','mitsamt','nebst','samt']);
const NAMES=new Set(['anna','tom','maria','lukas','felix','emma','lena','max','sophie','paul','laura','jan','lisa','tim','julia','david','sarah','michael','nina','stefan','peter','claudia','markus','andrea','thomas','sabine','hans','monika','kevin','tobias']);
const PERSONAL_PRONOUNS=new Set(['ich','du','er','sie','es','wir','ihr','man']);
const ACC_DAT_PRONOUNS=new Set(['mich','dich','ihn','uns','euch','mir','dir','ihm','ihnen']);

function getWordClass(word,role){
  const w=word.toLowerCase();
  if(role==='verb'||role==='sep-prefix') return 'verb';
  if(CONNECTORS.has(w)) return 'connector';
  if(ACC_DAT_PRONOUNS.has(w)) return 'acc-dat';
  if(PERSONAL_PRONOUNS.has(w)) return 'personal-pronoun';
  if(NAMES.has(w)) return 'personal-pronoun';
  if(PREPOSITIONS.has(w)) return 'preposition';
  if(TIME_WORDS.has(w)) return 'time-word';
  return '';
}

let currentDrill=null;
let recognition=null;
let micActive=false;
let micBase='';

const TOPICS=[

  'a local sports team winning the championship',
  // miscellaneous life moments

  'a lost wallet','bad weather plans','buying a new phone',

  'dropping your phone in water','getting a haircut you hate',

  'a sleepless night before an important day'

const ADVERBIAL_CONNECTORS=['weil','obwohl','wenn','als','damit','nachdem',
  'bevor','während','bis','seit','sobald','falls','sodass'];
const COMPLEMENT_CONNECTORS=['dass','ob'];
const B2_CONNECTORS=[...ADVERBIAL_CONNECTORS,...COMPLEMENT_CONNECTORS];
const SUBJECTS=['er','sie','wir','du','ihr','man','Anna','Tom','Maria','Lukas'];
let lastTopicIndex=-1;

/* ── Speech recognition ── */
{
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    recognition=new SR();
    recognition.lang='de-DE';
    recognition.continuous=true;
    recognition.interimResults=true;
    recognition.maxAlternatives=1;

    recognition.onstart=()=>{
      micBase=document.getElementById('answerInput')?.value||'';
      setMicState('listening');
    };

    recognition.onresult=(e)=>{
      let interim='', final='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) final+=e.results[i][0].transcript;
        else interim+=e.results[i][0].transcript;
      }
      if(final) setInputFinal(final);
      else if(interim) setInputInterim(interim);
    };

    recognition.onerror=(e)=>{
      setMicState('idle');
      if(e.error!=='aborted') showMicMsg("Didn't catch that — try again");
    };

    recognition.onend=()=>{
      const inp=document.getElementById('answerInput');
      if(inp?.classList.contains('input-interim')){
        inp.classList.remove('input-interim');
      }
      setMicState('idle');
    };
  }else{
    document.getElementById('btnMic')?.classList.add('hidden');
  }
}

function setMicState(s){
  micActive=(s==='listening');
  const btn=document.getElementById('btnMic');
  const status=document.getElementById('micStatus');
  if(s==='listening'){
    btn?.classList.add('mic-listening');
    if(status){ status.textContent='Listening…'; status.classList.remove('hidden'); }
  }else{
    btn?.classList.remove('mic-listening');
    if(status) status.classList.add('hidden');
  }
}

function setInputInterim(text){
  const inp=document.getElementById('answerInput');
  if(!inp) return;
  inp.value=micBase+(micBase&&!micBase.endsWith(' ')?' ':'')+text;
  inp.classList.add('input-interim');
  inp.style.height='0px';
  inp.style.height=inp.scrollHeight+'px';
  updatePieceStates();
}

function setInputFinal(text){
  const inp=document.getElementById('answerInput');
  if(!inp) return;
  inp.value=micBase+(micBase&&!micBase.endsWith(' ')?' ':'')+text;
  micBase=inp.value;
  inp.classList.remove('input-interim');
  inp.style.height='0px';
  inp.style.height=inp.scrollHeight+'px';
  updatePieceStates();
}

/* ── Debug panel ── */
let debugVisible=false;
function appendDebugEntry(drill,pairs,hasWords){
  const flag=hasWords?'✓':'✗';
  const lines=[
    `${flag} words=${pairs.length}  [${new Date().toLocaleTimeString()}]`,
    `english: ${drill.english}`,
    `correct: ${drill.correct}`,
    `mapping:`
  ];
  pairs.forEach(({word,role},i)=>{
    const clean=word.replace(/[.,!?;:"""„"–—]/g,'');
    const cls=getWordClass(clean,role)||'(none)';
    lines.push(`  ${String(i).padStart(2)}  ${clean.padEnd(18)}role=${String(role).padEnd(12)}→ ${cls}`);
  });
  const entry=lines.join('\n');
  console.log('[grammar debug]\n'+entry);
  const panel=document.getElementById('debugPanel');
  if(!panel) return;
  const entries=panel.textContent?panel.textContent.split('\n\n'):[];
  entries.unshift(entry);
  if(entries.length>10) entries.length=10;
  panel.textContent=entries.join('\n\n');
}

function showMicMsg(msg){
  const status=document.getElementById('micStatus');
  if(!status) return;
  status.textContent=msg;
  status.classList.remove('hidden');
  setTimeout(()=>status.classList.add('hidden'),3000);
}

/* ── Prefetch queue ── */
const QUEUE_DEPTH=2;
let drillQueue=[];
let fetchesInFlight=0;

async function fetchDrill(){
  const key=localStorage.getItem(GEMINI_KEY_LS);
  if(!key) throw new Error('no key');

  let topicIdx;
  do{ topicIdx=Math.floor(Math.random()*TOPICS.length); }while(topicIdx===lastTopicIndex&&TOPICS.length>1);
  lastTopicIndex=topicIdx;
  const topic=TOPICS[topicIdx];
  const connector=B2_CONNECTORS[Math.floor(Math.random()*B2_CONNECTORS.length)];
  const subject=SUBJECTS[Math.floor(Math.random()*SUBJECTS.length)];
  const isAdverbial=ADVERBIAL_CONNECTORS.includes(connector);
  const clauseOrder=isAdverbial&&Math.random()<0.5?'subordinate clause first':'main clause first';

  const prompt=`Generate a German sentence for a B2 word-order drill. Return JSON only — no markdown, no code fences.

Schema: {"english":"...","words":[{"w":"...","r":"..."},...]}
- english: compose the German sentence first, then gloss it back into English. The English must mirror the German's structure exactly — same number of clauses, same clause order, same connectors and coordination/subordination — and match the meaning exactly: same polarity/negation, quantifiers, and modality; nothing added, dropped, or weakened. Only the wording inside each clause should be made natural English; do not restructure, merge, or reorder clauses. (Example of what NOT to do: German uses coordinate clauses "ein Vogel kam hereingeflogen und…" but English says "the bird that flew in" — that changes the structure and is wrong.)
- words: array of {w,r} objects — one per word in sentence order. w is the surface form including any attached punctuation. r must be exactly "verb" (finite verbs, infinitives, participles), "sep-prefix" (separated verb prefix, e.g. "an" in "Ich rufe an"), or "other". Emit exactly one object per word, in order, never drop or merge a word.

Rules:
- Topic: ${topic}.
- Required subordinating connector: "${connector}" — it must appear in the sentence.
- Main clause subject: ${subject}.
- Clause order: ${clauseOrder}.
- Sentence length: 7–13 words.
- Register: natural casual spoken German (friends / colleagues / text messages). No Konjunktiv I or II, no Futur I with werden, no formal or literary constructions.
- Full written forms only — no apostrophe elisions and no dropped 1sg -e. Write habe not hab', gehe not geh', geht es not geht's, eine not 'ne. Every word must be a complete standard written form.
- Naturalness: write the sentence a real person would actually say in casual conversation — texting a friend, talking over coffee. Avoid bookish idioms and clever constructions. A complete, natural sentence is always better than a terse or clever one; word count is never a goal, and never drop or compress words to save space.
Before answering, check three things: would a real person say this exact sentence casually; does the English mirror the German's clause order and structure; and does the English match the German's meaning exactly — same polarity, negation, quantifiers, and modality, nothing added, dropped, or weakened? Revise if not.`;

  const body=JSON.stringify({
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{temperature:0.7,maxOutputTokens:2048},
    thinkingConfig:{thinkingBudget:0}
  });
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

  const retryDelays=[800,1600,3200];
  let lastErr=new Error('unknown error');
  for(let attempt=0;attempt<3;attempt++){
    if(attempt>0) await new Promise(r=>setTimeout(r,retryDelays[attempt-1]));
    let shouldRetry=false;
    try{
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body});
      if(res.status===429||res.status>=500){
        lastErr=new Error(`API ${res.status}`);
        shouldRetry=true;
      }else if(!res.ok){
        const errBody=await res.text().catch(()=>'');
        throw new Error(`API ${res.status}: ${errBody.slice(0,200)}`);
      }else{
        const data=await res.json();
        const raw=(data?.candidates?.[0]?.content?.parts?.[0]?.text||'').trim();
        const s=raw.indexOf('{'), e=raw.lastIndexOf('}');
        if(s===-1||e<=s) throw new Error(`no JSON object — raw: ${raw.slice(0,120)}`);
        const drill=JSON.parse(raw.slice(s,e+1));
        if(!drill.english) throw new Error(`bad shape — raw: ${raw.slice(0,100)}`);
        const hasWords=Array.isArray(drill.words)&&drill.words.length>0&&drill.words.every(x=>x&&typeof x.w==='string');
        let pairs;
        if(hasWords){
          const cleaned=drill.words
            .map(({w,r})=>{const t=(w||'').trim();return{w:t.endsWith("'")?t.slice(0,-1)+'e':t,r};})
            .filter(x=>x.w);
          drill.correct=cleaned.map(x=>x.w).join(' ');
          pairs=cleaned.map(({w,r})=>({word:w,role:r}));
        }else if(drill.correct){
          drill.correct=drill.correct.split(' ').map(t=>t.endsWith("'")?t.slice(0,-1)+'e':t).join(' ');
          pairs=drill.correct.split(' ').map(word=>({word,role:null}));
        }else{
          throw new Error(`bad shape — raw: ${raw.slice(0,100)}`);
        }
        for(let i=pairs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pairs[i],pairs[j]]=[pairs[j],pairs[i]];}
        drill.pieces=pairs;
        drill._hasWords=hasWords;
        return drill;
      }
    }catch(e){
      lastErr=e;
      if(e instanceof TypeError) shouldRetry=true;
    }
    if(!shouldRetry) break;
  }
  throw lastErr;
}

function refillQueue(){
  while(drillQueue.length+fetchesInFlight<QUEUE_DEPTH){
    fetchesInFlight++;
    fetchDrill()
      .then(drill=>{drillQueue.push(drill);fetchesInFlight--;})
      .catch(err=>{console.error('[grammar prefetch]',err);fetchesInFlight--;});
  }
}

function presentDrill(drill){
  currentDrill=drill;
  appendDebugEntry(drill,drill.pieces,drill._hasWords);
  renderDrill(drill);
  refillQueue();
}

/* ── Generate drill (public) ── */
async function generateDrill(){
  const key=localStorage.getItem(GEMINI_KEY_LS);
  if(!key) return;

  if(drillQueue.length>0){
    presentDrill(drillQueue.shift());
    return;
  }

  const card=document.getElementById('drillCard');
  const loadingText=document.getElementById('loadingText');
  const drillContent=document.getElementById('drillContent');
  const feedback=document.getElementById('feedback');

  card.classList.add('loading');
  loadingText.textContent='Generating drill…';
  loadingText.classList.remove('hidden');
  drillContent.classList.add('hidden');
  feedback?.classList.add('hidden');

  try{
    const drill=await fetchDrill();
    presentDrill(drill);
  }catch(e){
    console.error('[grammar drill]',e);
    loadingText.textContent=`Failed: ${e.message} — tap Next to retry.`;
    loadingText.style.wordBreak='break-word';
    card.classList.remove('loading');
  }
}

/* ── Render drill ── */
function renderDrill(drill){
  const card=document.getElementById('drillCard');
  const loadingText=document.getElementById('loadingText');
  const drillContent=document.getElementById('drillContent');
  const inp=document.getElementById('answerInput');
  const feedback=document.getElementById('feedback');
  const piecesWrap=document.getElementById('piecesWrap');
  const englishText=document.getElementById('englishText');

  card.classList.remove('loading');
  loadingText.classList.add('hidden');
  drillContent.classList.remove('hidden');

  englishText.textContent=drill.english;
  inp.value='';
  micBase='';
  inp.style.height='0px';
  inp.style.height=inp.scrollHeight+'px';
  inp.classList.remove('good-field','bad-field','input-shake');
  feedback.classList.add('hidden');
  feedback.innerHTML='';

  document.getElementById('btnUndo')?.classList.add('hidden');
  piecesWrap.innerHTML='';
  drill.pieces.forEach(({word,role})=>{
    const btn=document.createElement('button');
    const clean=word.replace(/[.,!?;:"""„"–—]/g,'');
    const wc=getWordClass(clean,role);
    btn.className='piece'+(wc?' '+wc:'');
    btn.textContent=clean;
    let lock=0;
    btn.addEventListener('pointerdown',(e)=>{
      e.preventDefault();
      const now=Date.now(); if(now-lock<400) return; lock=now;
      const cur=inp.value;
      inp.value=cur+(cur&&!cur.endsWith(' ')?' ':'')+clean;
      inp.style.height='0px';
      inp.style.height=inp.scrollHeight+'px';
      updatePieceStates();
    },{passive:false});
    btn.addEventListener('mousedown',(e)=>e.preventDefault());
    piecesWrap.appendChild(btn);
  });

  setTimeout(()=>inp.focus(),0);
}

/* ── Helpers ── */
function escapeHTML(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function triggerFlash(type){
  const el=document.getElementById('flashOverlay');
  if(!el) return;
  el.className='flash-overlay';
  void el.offsetWidth;
  el.className='flash-overlay flash-'+type;
  setTimeout(()=>{ el.className='flash-overlay'; },700);
}

/* ── Local sentence evaluator ── */
function stripPunct(s){
  return (s||'').replace(/[.,!?;:"""„"()[\]{}–—]/g,'').replace(/\s+/g,' ').trim();
}
function normWord(w){
  return w.toLowerCase()
    .replace(/['']/g,"'")
    .replaceAll('ue','ü').replaceAll('oe','ö').replaceAll('ae','ä').replaceAll('ss','ß');
}
function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i?j?0:i:j));
  for(let i=1;i<=m;i++)
    for(let j=1;j<=n;j++)
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function evaluateAnswer(userRaw,correctRaw){
  const user=stripPunct(userRaw).toLowerCase();
  const correct=stripPunct(correctRaw).toLowerCase();
  if(user===correct) return {verdict:'CORRECT',typoIndices:[]};
  const uw=user.split(/\s+/).filter(Boolean);
  const cw=correct.split(/\s+/).filter(Boolean);
  if(uw.length!==cw.length) return {verdict:'WRONG',typoIndices:[]};
  const typoIndices=[];
  for(let i=0;i<cw.length;i++){
    const un=normWord(uw[i]),cn=normWord(cw[i]);
    if(un===cn) continue;
    if(levenshtein(un,cn)<=2) typoIndices.push(i);
    else return {verdict:'WRONG',typoIndices:[]};
  }
  return {verdict:'TYPO',typoIndices};
}
function buildCorrectHTML(correctRaw,typoIndices){
  const typoSet=new Set(typoIndices);
  return correctRaw.split(/\s+/).map((token,i)=>
    typoSet.has(i)
      ? `<u style="text-decoration-color:var(--accent);text-underline-offset:3px;">${escapeHTML(token)}</u>`
      : escapeHTML(token)
  ).join(' ');
}

/* ── Sync piece used-state with textarea content ── */
function updatePieceStates(){
  const inp=document.getElementById('answerInput');
  const piecesWrap=document.getElementById('piecesWrap');
  if(!inp||!piecesWrap||!currentDrill) return;

  const typedWords=inp.value.trim().split(/\s+/).filter(Boolean)
    .map(w=>w.replace(/[.,!?;:"""„"–—]/g,'').toLowerCase());
  const remaining={};
  typedWords.forEach(w=>{remaining[w]=(remaining[w]||0)+1;});

  const consumed={};
  piecesWrap.querySelectorAll('.piece').forEach(btn=>{
    const word=btn.textContent.trim().toLowerCase();
    consumed[word]=consumed[word]||0;
    if(consumed[word]<(remaining[word]||0)){
      btn.classList.add('used');
      consumed[word]++;
    }else{
      btn.classList.remove('used');
    }
  });
  const btnUndo=document.getElementById('btnUndo');
  if(btnUndo) btnUndo.classList.toggle('hidden',!inp.value.trim());
}

/* ── Check answer ── */
function checkAnswer(){
  if(!currentDrill) return;
  const inp=document.getElementById('answerInput');
  const feedback=document.getElementById('feedback');

  inp.classList.remove('good-field','bad-field');

  const {verdict,typoIndices}=evaluateAnswer(inp.value,currentDrill.correct);

  if(verdict==='CORRECT'){
    inp.classList.add('good-field');
    triggerFlash('good');
    feedback.classList.add('hidden');
    setTimeout(()=>generateDrill(),800);
  }else if(verdict==='TYPO'){
    inp.classList.add('good-field');
    triggerFlash('good');
    feedback.innerHTML=`<span style="color:var(--muted);font-size:13px;">Typo — close enough:</span><br><strong>${buildCorrectHTML(currentDrill.correct,typoIndices)}</strong>`;
    feedback.classList.remove('hidden');
    setTimeout(()=>generateDrill(),2000);
  }else{
    inp.classList.add('bad-field');
    triggerFlash('bad');
    inp.classList.remove('input-shake');
    void inp.offsetWidth;
    inp.classList.add('input-shake');
    setTimeout(()=>inp.classList.remove('input-shake'),400);
    feedback.innerHTML=`<span class="muted">Correct: </span><strong>${escapeHTML(currentDrill.correct)}</strong>`;
    feedback.classList.remove('hidden');
  }
}

/* ── Boot ── */
function boot(){
  if(!localStorage.getItem(GEMINI_KEY_LS)){
    document.getElementById('apiKeyScreen').classList.remove('hidden');
    return;
  }
  generateDrill();
}

/* ── Wire buttons ── */
{

  document.getElementById('btnCheck')?.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    const now=Date.now(); if(now-lockCheck<400) return; lockCheck=now;
    checkAnswer();
  },{passive:false});

  });

  let debugTapCount=0,debugTapTimer=null;
  document.getElementById('englishText')?.addEventListener('pointerdown',()=>{
    debugTapCount++;

    if(debugTapCount>=5){
      debugTapCount=0;
      clearTimeout(debugTapTimer);
      debugVisible=!debugVisible;
      const panel=document.getElementById('debugPanel');
      if(panel) panel.style.display=debugVisible?'block':'none';
    }
  });

  let lockUndo=0;
  document.getElementById('btnUndo')?.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    const now=Date.now(); if(now-lockUndo<150) return; lockUndo=now;
    if(!answerEl||!answerEl.value.trim()) return;
    const trimmed=answerEl.value.trimEnd();

  },{passive:false});
  document.getElementById('btnUndo')?.addEventListener('mousedown',(e)=>e.preventDefault());

  let lockNext=0;
  document.getElementById('btnNext')?.addEventListener('pointerdown',(e)=>{

  },{passive:false});
  document.getElementById('btnNext')?.addEventListener('mousedown',(e)=>e.preventDefault());

  let lockMic=0;
  document.getElementById('btnMic')?.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    const now=Date.now(); if(now-lockMic<400) return; lockMic=now;

    else{ try{ recognition.start(); }catch(err){ setMicState('idle'); } }
  },{passive:false});
  document.getElementById('btnMic')?.addEventListener('mousedown',(e)=>e.preventDefault());

  // Tab persistence: save on navigate
  document.querySelectorAll('.tabItem').forEach(a=>{
    a.addEventListener('click',()=>{
      const href=a.getAttribute('href');
      localStorage.setItem('top5k_active_tab',
        href==='grammar.html'?'grammar':href==='chat.html'?'chat':'vocab');
    });
  });

  let lockSave=0;
  document.getElementById('apiKeySave')?.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    const now=Date.now(); if(now-lockSave<400) return; lockSave=now;
    const val=(document.getElementById('apiKeyInput')?.value||'').trim();
    const hint=document.getElementById('apiKeyHint');
    if(!val){
      if(hint){ hint.textContent='Please enter your API key.'; hint.classList.remove('hidden'); }
      return;
    }
    localStorage.setItem(GEMINI_KEY_LS,val);
    location.reload();
  },{passive:false});
  document.getElementById('apiKeySave')?.addEventListener('mousedown',(e)=>e.preventDefault());
  document.getElementById('apiKeyInput')?.addEventListener('keydown',(e)=>{
    if(e.key==='Enter') document.getElementById('apiKeySave')?.dispatchEvent(new PointerEvent('pointerdown',{bubbles:true}));
  });
}
