<style>
*{box-sizing:border-box}
button,input,textarea,select{font-family:inherit;}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 'Lora',Georgia,serif;}
.wrap{max-width:720px;margin:0 auto;padding:14px 14px calc(96px + env(safe-area-inset-bottom,0px));}

/* header (large title) */
.bar{font-family:var(--font-chrome);font-size:28px;font-weight:700;color:var(--text);margin:2px 0 16px;}

/* card */
.card{padding:20px 16px;position:relative;border-radius:var(--r-card);}

/* ── drill entrance (new card) ── */
@keyframes drillSlideIn{from{transform:translateX(18px);opacity:0}to{transform:translateX(0);opacity:1}}
.card.drill-enter #drillContent{animation:drillSlideIn .25s cubic-bezier(.25,.46,.45,.94) both;}
@keyframes optIn{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}
.card.drill-enter .prepOption{animation:optIn .3s ease both;}
.card.drill-enter .prepOption:nth-child(1){animation-delay:.04s}
.card.drill-enter .prepOption:nth-child(2){animation-delay:.08s}
.card.drill-enter .prepOption:nth-child(3){animation-delay:.12s}
.card.drill-enter .prepOption:nth-child(4){animation-delay:.16s}

/* divider */
.divider{border:none;border-top:1px solid var(--divider);margin:14px 0;}

/* states */
.hidden{display:none!important}
.muted{color:var(--muted)}
.small{font-size:12px}
.good{color:var(--good)} .bad{color:var(--bad)}

/* flash overlay */
.flash-overlay{position:absolute;inset:0;border-radius:var(--r-card);pointer-events:none;opacity:0;}
@keyframes flashAnim{0%{opacity:0}15%{opacity:1}100%{opacity:0}}
.flash-good{background:var(--good-bg);border:1.5px solid rgba(50,215,75,.5);border-radius:var(--r-card);animation:flashAnim .65s ease both;}
.flash-bad{background:var(--bad-bg);border:1.5px solid rgba(255,69,58,.45);border-radius:var(--r-card);animation:flashAnim .65s ease both;}

/* loading — .loadingSpinner itself lives in ios-theme.css */
#loadingText{color:var(--muted);font-size:14px;padding:4px 0 16px;text-align:center;font-family:var(--font-chrome);}

/* drill content */
#sentenceText{font-size:19px;line-height:1.7;}
@keyframes blankPulse{0%{background:rgba(10,132,255,0.08)}50%{background:rgba(10,132,255,0.26)}100%{background:rgba(10,132,255,0.08)}}
#sentenceText .blank{
  display:inline-block;border-bottom:2px solid var(--accent);min-width:58px;height:14px;
  margin:0 2px;vertical-align:bottom;background:rgba(10,132,255,0.08);border-radius:3px 3px 0 0;
  color:transparent;font-size:0;animation:blankPulse 1.6s ease-in-out 1;
}
#sentenceText .govHighlight{color:var(--accent);font-weight:600;}
#glossText{margin-top:10px;padding-left:12px;border-left:2px solid var(--border-soft);font-size:14px;color:var(--muted);line-height:1.6;font-style:italic;}

/* options grid */
.prepGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
.prepOption{padding:15px 10px;font-size:16px;font-family:var(--font-body);border-radius:12px;background:var(--btn);border:1px solid var(--border);color:var(--text);cursor:pointer;transition:background .15s,border-color .15s,color .15s,transform .12s,box-shadow .15s;}
.prepOption:active:not(:disabled){transform:translateY(0);box-shadow:none;background:var(--btn2);}
.prepOption:disabled{cursor:default;opacity:.85;}
.prepOption.correct{background:var(--good-bg);border-color:var(--good);color:var(--good);}
.prepOption.correct::before{content:'✓  ';}
.prepOption.wrong{background:var(--bad-bg);border-color:var(--bad);color:var(--bad);}
.prepOption.wrong::before{content:'✗  ';}
@media (hover:hover){
  .prepOption:hover:not(:disabled){background:var(--btn2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.25);}
}

@media (prefers-reduced-motion: reduce){
  #sentenceText .blank{animation:none;}
  .prepOption{transition:background .15s,border-color .15s,color .15s;}
  .prepOption:hover:not(:disabled){transform:none;box-shadow:none;}
  .card.drill-enter #drillContent,.card.drill-enter .prepOption{animation:none;}
}

/* footer controls */
.footerRow{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap;}
#btnFlag.flag-confirm{background:var(--bad-bg);border-color:rgba(255,69,58,.6);}
#btnFlag.flag-confirm svg{stroke:var(--bad);}
</style>

<script>
const GEMINI_KEY_LS='top5k_gemini_key';
const SUPABASE_URL_KEY='top5k_supabase_url';
const SUPABASE_KEY_KEY='top5k_supabase_key';
const STATS_KEY='preps_stats_v1';
const STATS_SAVED_AT_KEY='preps_saved_at_v1';
const LOG_CAP=5000;

/* ── Gemini API helpers ── */
const GEMINI_MODEL='gemini-3.5-flash-lite';
// Gemini 3.x thinking is on by default (thinkingLevel, not the old
// thinkingBudget) and those hidden reasoning tokens count against
// maxOutputTokens — "minimal" keeps that budget for the actual answer
// instead of letting it get silently eaten by reasoning.
const GEMINI_THINKING_CONFIG={thinkingLevel:'minimal'};

function extractGeminiText(data){
  const parts=data?.candidates?.[0]?.content?.parts||[];
  return parts.filter(p=>!p.thought).map(p=>p.text||'').join('').trim();
}

// Parses only the first complete top-level JSON object starting at the
// first "{", ignoring any trailing content after it — some Gemini 3
// responses append stray extra data after a well-formed object, which
// breaks a naive indexOf('{')/lastIndexOf('}') slice.
function parseFirstJSON(raw){
  const start=raw.indexOf('{');
  if(start===-1) throw new Error(`no JSON object — raw: ${raw.slice(0,120)}`);
  let depth=0,inStr=false,esc=false;
  for(let i=start;i<raw.length;i++){
    const c=raw[i];
    if(inStr){
      if(esc) esc=false;
      else if(c==='\\') esc=true;
      else if(c==='"') inStr=false;
    }else{
      if(c==='"') inStr=true;
      else if(c==='{') depth++;
      else if(c==='}'){
        depth--;
        if(depth===0) return JSON.parse(raw.slice(start,i+1));
      }
    }
  }
  throw new Error(`unterminated JSON — raw: ${raw.slice(0,120)}`);
}

/* ── Stats storage ── */
// Old records used a "verb" field on log entries; fold it into "gov" so
// pre-rotation history isn't orphaned when the field was renamed.
function migrateStats(s){
  if(!s||!Array.isArray(s.log)) return s;
  s.log.forEach(e=>{
    if(e&&Object.prototype.hasOwnProperty.call(e,'verb')&&!('gov' in e)){
      e.gov=e.verb;
      delete e.verb;
    }
  });
  return s;
}

function loadStats(){
  try{
    const raw=localStorage.getItem(STATS_KEY);
    if(raw){
      const s=JSON.parse(raw);
      if(s&&s.v===1&&s.aggregate&&typeof s.aggregate==='object'&&Array.isArray(s.log)) return migrateStats(s);
    }
  }catch(e){}
  return {v:1,aggregate:{},log:[]};
}
let stats=loadStats();

function saveStats(){
  try{
    localStorage.setItem(STATS_KEY,JSON.stringify(stats));
    localStorage.setItem(STATS_SAVED_AT_KEY,String(Date.now()));
  }catch(e){}
}

function pushLog(entry){
  stats.log.push(entry);
  if(stats.log.length>LOG_CAP) stats.log.splice(0,stats.log.length-LOG_CAP);
}

function recordAnswer(drill,picked,correct){
  const key=`${(drill.gov||'').toLowerCase()}|${(drill.prep||'').toLowerCase()}`;
  const agg=stats.aggregate[key]||{attempts:0,misses:0,lastSeen:0};
  agg.attempts++;
  if(!correct) agg.misses++;
  agg.lastSeen=Date.now();
  stats.aggregate[key]=agg;
  pushLog({ts:Date.now(),gov:drill.gov,prep:drill.prep,correct,picked});
  saveStats();
  pushPrepsNow();
}

function recordFlag(drill){
  pushLog({ts:Date.now(),gov:drill.gov,prep:drill.prep,correct:false,picked:'FLAG'});
  saveStats();
  pushPrepsNow();
}

/* ── Cloud sync (Supabase) — mirror only, app works fully offline without it ── */
function supabaseConf(){
  const url=(localStorage.getItem(SUPABASE_URL_KEY)||'').trim().replace(/\/+$/,'');
  const key=(localStorage.getItem(SUPABASE_KEY_KEY)||'').trim();
  if(!url||!key) return null;
  return {url,key};
}

async function supabaseUpsert(key,value){
  const conf=supabaseConf();
  if(!conf) return null;
  const res=await fetch(`${conf.url}/rest/v1/kv_state`,{
    method:'POST',
    headers:{
      'apikey':conf.key,
      'Content-Type':'application/json',
      'Prefer':'resolution=merge-duplicates,return=representation'
    },
    body:JSON.stringify([{key,value,updated_at:new Date().toISOString()}])
  });
  if(!res.ok) throw new Error(`Supabase upsert ${key} failed: HTTP ${res.status}`);
  const rows=await res.json().catch(()=>null);
  return (rows&&rows[0])||null;
}

async function supabaseGetRow(key){
  const conf=supabaseConf();
  if(!conf) return null;
  const res=await fetch(`${conf.url}/rest/v1/kv_state?key=eq.${encodeURIComponent(key)}&select=value,updated_at`,{
    headers:{'apikey':conf.key}
  });
  if(!res.ok) throw new Error(`Supabase get ${key} failed: HTTP ${res.status}`);
  const rows=await res.json();
  return (rows&&rows[0])||null;
}

let prepsPushInFlight=false;
let prepsPushQueued=false;

function runPrepsPush(){
  if(!supabaseConf()) return;
  if(prepsPushInFlight){ prepsPushQueued=true; return; }
  prepsPushInFlight=true;
  supabaseUpsert(STATS_KEY,stats)
    .then(row=>{
      // Pin our local "saved at" to the row's own timestamp, not Date.now(),
      // so a same-device reload never sees remoteUpdatedAt > localSavedAt
      // from clock/rounding drift and fires a spurious "cloud is newer" prompt.
      const ts=row&&row.updated_at?new Date(row.updated_at).getTime():null;
      if(ts) try{ localStorage.setItem(STATS_SAVED_AT_KEY,String(ts)); }catch(e){}
    })
    .catch(e=>console.error('Cloud push failed:',e))
    .finally(()=>{
      prepsPushInFlight=false;
      if(prepsPushQueued){ prepsPushQueued=false; runPrepsPush(); }
    });
}
function pushPrepsNow(){
  if(!supabaseConf()) return;
  runPrepsPush();
}
document.addEventListener('visibilitychange',()=>{ if(document.hidden) pushPrepsNow(); });

function fmtWhen(ts){ if(!ts) return 'never'; try{ return new Date(ts).toLocaleString(); }catch{ return 'never'; } }

// Returns true if the cloud copy was applied.
async function tryCloudPullOnLoad(){
  if(!supabaseConf()) return false;
  try{
    const row=await supabaseGetRow(STATS_KEY);
    if(!row||!row.value||typeof row.value!=='object'||!Array.isArray(row.value.log)) return false;
    const remoteUpdatedAt=new Date(row.updated_at).getTime();
    const localSavedAt=parseInt(localStorage.getItem(STATS_SAVED_AT_KEY)||'0',10);
    const localEmpty=Object.keys(stats.aggregate).length===0&&stats.log.length===0;
    if(!(remoteUpdatedAt>localSavedAt||localEmpty)) return false;
    window.IOSSheet?.confirm(`Cloud copy from ${fmtWhen(remoteUpdatedAt)} is newer than this device. Restore it?`,{
      title:'Cloud Sync',
      confirmLabel:'Restore',
      cancelLabel:'Keep this device',
      onConfirm:()=>{ stats=migrateStats(row.value); saveStats(); }
    });
    return false;
  }catch(e){
    console.error('Cloud pull failed:',e);
    return false;
  }
}

/* ── Prefetch queue ── */
const QUEUE_DEPTH=2;
let drillQueue=[];
let fetchesInFlight=0;
let currentDrill=null;
let answering=false;

// Rolling no-repeat list: last ~25 gov|prep pairs generated, fed back into
// each prompt so the model doesn't keep landing on the same handful of
// collocations (warten auf, denken an, ...).
const RECENT_PAIRS_CAP=25;
let recentPairs=[];

function pushRecentPair(gov,prep){
  const key=`${(gov||'').toLowerCase()}|${(prep||'').toLowerCase()}`;
  recentPairs.push(key);
  if(recentPairs.length>RECENT_PAIRS_CAP) recentPairs.shift();
}

function formatRecentPairs(){
  if(!recentPairs.length) return 'none yet';
  return recentPairs.map(p=>{
    const [g,pr]=p.split('|');
    return `${g} + ${pr}`;
  }).join(', ');
}

async function fetchDrill(){
  const key=localStorage.getItem(GEMINI_KEY_LS);
  if(!key) throw new Error('no key');

  const prompt=`Generate one German preposition drill. Output JSON only, no markdown:
{"sentence": German sentence with the target preposition replaced by ___,
 "gov": the governing word (verb, adjective, or noun) in its base form,
 "govInSent": the exact surface form of the governing word as it appears in the sentence (conjugated, inflected, or separated exactly as written),
 "prep": the correct preposition,
 "gloss": concise English translation of the full intended sentence,
 "options": array of 4 prepositions including the correct one, shuffled, all plausible}

Rotate the governing word across these types, don't always pick a verb:
- verb + preposition (e.g. sich verlassen auf, sich beschweren über)
- adjective + preposition (e.g. stolz auf, zufrieden mit, gespannt auf)
- noun + preposition (e.g. die Angst vor, der Grund für)
- fixed prepositional phrase (e.g. aus Versehen, unter Umständen)

Vary the topic across work, travel, health, bureaucracy, emotions, money, technology, daily life. Prefer less common but still natural collocations over the most obvious ones.
Do NOT use any of these recently-used pairs: ${formatRecentPairs()}
The English gloss must make exactly ONE preposition correct. Casual natural German, one clause. Past events use Perfekt, EXCEPT sein/haben/modals which take Präteritum (war, hatte, konnte — never ist gewesen, hat gehabt).`;

  const body=JSON.stringify({
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{temperature:0.8,maxOutputTokens:4096,responseMimeType:"application/json",thinkingConfig:GEMINI_THINKING_CONFIG}
  });
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;

  const retryDelays=[800,1600,3200];
  let lastErr=new Error('unknown error');
  for(let attempt=0;attempt<3;attempt++){
    if(attempt>0) await new Promise(r=>setTimeout(r,retryDelays[attempt-1]));
    let shouldRetry=false;
    try{
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body});
      if(res.status===429||res.status>=500){
        lastErr=new Error(`API ${res.status}`);
        shouldRetry=true;
      }else if(!res.ok){
        const errBody=await res.text().catch(()=>'');
        throw new Error(`API ${res.status}: ${errBody.slice(0,200)}`);
      }else{
        const data=await res.json();
        const raw=extractGeminiText(data);
        const drill=parseFirstJSON(raw);
        if(!drill.sentence||!drill.prep||!Array.isArray(drill.options)||drill.options.length<2){
          throw new Error(`bad shape — raw: ${raw.slice(0,120)}`);
        }
        drill.sentence=(drill.sentence||'').trim();
        drill.gov=(drill.gov||'').trim();
        drill.govInSent=(drill.govInSent||'').trim();
        drill.prep=(drill.prep||'').trim();
        drill.gloss=(drill.gloss||'').trim();
        drill.options=drill.options.map(o=>(o||'').trim()).filter(Boolean);
        if(!drill.options.some(o=>o.toLowerCase()===drill.prep.toLowerCase())){
          throw new Error(`correct prep missing from options — raw: ${raw.slice(0,120)}`);
        }
        pushRecentPair(drill.gov,drill.prep);
        return drill;
      }
    }catch(e){
      lastErr=e;
      if(e instanceof TypeError) shouldRetry=true;
    }
    if(!shouldRetry) break;
  }
  throw lastErr;
}

function refillQueue(){
  while(drillQueue.length+fetchesInFlight<QUEUE_DEPTH){
    fetchesInFlight++;
    fetchDrill()
      .then(drill=>{drillQueue.push(drill);fetchesInFlight--;})
      .catch(err=>{console.error('[preps prefetch]',err);fetchesInFlight--;});
  }
}

function presentDrill(drill){
  currentDrill=drill;
  answering=false;
  renderDrill(drill);
  refillQueue();
}

async function generateDrill(){
  const key=localStorage.getItem(GEMINI_KEY_LS);
  if(!key) return;

  if(drillQueue.length>0){
    presentDrill(drillQueue.shift());
    return;
  }

  const card=document.getElementById('drillCard');
  const loadingSpinner=document.getElementById('loadingSpinner');
  const loadingText=document.getElementById('loadingText');
  const drillContent=document.getElementById('drillContent');

  loadingSpinner.classList.remove('hidden');
  loadingText.textContent='Generating drill…';
  loadingText.style.cursor='';
  loadingText.onclick=null;
  loadingText.classList.remove('hidden');
  drillContent.classList.add('hidden');

  try{
    const drill=await fetchDrill();
    presentDrill(drill);
  }catch(e){
    console.error('[preps drill]',e);
    loadingSpinner.classList.add('hidden');
    loadingText.textContent=`Failed: ${e.message} — tap to retry.`;
    loadingText.style.wordBreak='break-word';
    loadingText.style.cursor='pointer';
    loadingText.onclick=()=>{ loadingText.onclick=null; generateDrill(); };
  }
}

/* ── Governing-word highlight toggle ── */
const HIGHLIGHT_GOV_KEY='preps_highlight_gov_v1';
function loadHighlightGov(){
  const raw=localStorage.getItem(HIGHLIGHT_GOV_KEY);
  return raw===null?true:raw==='1';
}
let highlightGovEnabled=loadHighlightGov();

function syncHighlightToggleUI(){
  const btn=document.getElementById('btnHighlightToggle');
  if(!btn) return;
  btn.classList.toggle('active',highlightGovEnabled);
}

/* ── Render drill ── */
function escapeHTML(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderSentenceHTML(drill){
  let html=escapeHTML(drill.sentence);
  if(highlightGovEnabled&&drill.govInSent){
    const escGov=escapeHTML(drill.govInSent);
    const idx=html.indexOf(escGov);
    if(idx!==-1) html=html.slice(0,idx)+'<span class="govHighlight">'+escGov+'</span>'+html.slice(idx+escGov.length);
  }
  return html.replace(/_{2,}/g,'<span class="blank">___</span>');
}

function renderDrill(drill){
  const card=document.getElementById('drillCard');
  const loadingSpinner=document.getElementById('loadingSpinner');
  const loadingText=document.getElementById('loadingText');
  const drillContent=document.getElementById('drillContent');
  const sentenceText=document.getElementById('sentenceText');
  const glossText=document.getElementById('glossText');
  const optionsGrid=document.getElementById('optionsGrid');

  loadingSpinner.classList.add('hidden');
  loadingText.classList.add('hidden');
  drillContent.classList.remove('hidden');

  sentenceText.innerHTML=renderSentenceHTML(drill);
  glossText.textContent=drill.gloss;

  card.classList.remove('drill-enter');
  void card.offsetWidth;
  card.classList.add('drill-enter');
  clearTimeout(renderDrill._enterTimer);
  renderDrill._enterTimer=setTimeout(()=>card.classList.remove('drill-enter'),700);

  optionsGrid.innerHTML='';
  drill.options.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='prepOption';
    btn.textContent=opt;
    let lock=0;
    btn.addEventListener('pointerdown',(e)=>{
      e.preventDefault();
      const now=Date.now(); if(now-lock<400) return; lock=now;
      selectOption(opt,btn);
    },{passive:false});
    btn.addEventListener('mousedown',(e)=>e.preventDefault());
    optionsGrid.appendChild(btn);
  });
}

function triggerFlash(type){
  const el=document.getElementById('flashOverlay');
  if(!el) return;
  el.className='flash-overlay';
  void el.offsetWidth;
  el.className='flash-overlay flash-'+type;
  setTimeout(()=>{ el.className='flash-overlay'; },700);
}

function selectOption(picked,btnEl){
  if(!currentDrill||answering) return;
  answering=true;
  const correct=picked.toLowerCase()===currentDrill.prep.toLowerCase();
  document.querySelectorAll('.prepOption').forEach(b=>{
    b.disabled=true;
    if(b.textContent.toLowerCase()===currentDrill.prep.toLowerCase()) b.classList.add('correct');
    else if(b===btnEl) b.classList.add('wrong');
  });
  triggerFlash(correct?'good':'bad');
  recordAnswer(currentDrill,picked,correct);
  setTimeout(()=>generateDrill(),correct?1100:1900);
}

function handleFlag(){
  if(!currentDrill||answering) return;
  answering=true;
  document.querySelectorAll('.prepOption').forEach(b=>b.disabled=true);
  const flagBtn=document.getElementById('btnFlag');
  flagBtn.classList.add('flag-confirm');
  setTimeout(()=>flagBtn.classList.remove('flag-confirm'),600);
  recordFlag(currentDrill);
  setTimeout(()=>generateDrill(),450);
}

/* ── Boot ── */
function boot(){
  syncHighlightToggleUI();
  if(!localStorage.getItem(GEMINI_KEY_LS)){
    document.getElementById('apiKeyScreen').classList.remove('hidden');
    return;
  }
  tryCloudPullOnLoad();
  generateDrill();
}

/* ── Wire buttons ── */
{
  let lockFlag=0;
  document.getElementById('btnFlag')?.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    const now=Date.now(); if(now-lockFlag<400) return; lockFlag=now;
    handleFlag();
  },{passive:false});
  document.getElementById('btnFlag')?.addEventListener('mousedown',(e)=>e.preventDefault());

  let lockHighlight=0;
  document.getElementById('btnHighlightToggle')?.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    const now=Date.now(); if(now-lockHighlight<400) return; lockHighlight=now;
    highlightGovEnabled=!highlightGovEnabled;
    try{ localStorage.setItem(HIGHLIGHT_GOV_KEY,highlightGovEnabled?'1':'0'); }catch(err){}
    syncHighlightToggleUI();
    if(currentDrill) document.getElementById('sentenceText').innerHTML=renderSentenceHTML(currentDrill);
  },{passive:false});
  document.getElementById('btnHighlightToggle')?.addEventListener('mousedown',(e)=>e.preventDefault());

  // Tab persistence: save on navigate
  document.querySelectorAll('.tabItem').forEach(a=>{
    a.addEventListener('click',()=>{
      const href=a.getAttribute('href');
      localStorage.setItem('top5k_active_tab',
        href==='grammar.html'?'grammar':href==='chat.html'?'chat':href==='preps.html'?'preps':href==='ausdruck.html'?'ausdruck':'vocab');
    });
  });

  let lockSave=0;
  document.getElementById('apiKeySave')?.addEventListener('pointerdown',(e)=>{
    e.preventDefault();
    const now=Date.now(); if(now-lockSave<400) return; lockSave=now;
    const val=(document.getElementById('apiKeyInput')?.value||'').trim();
    const hint=document.getElementById('apiKeyHint');
    if(!val){
      if(hint){ hint.textContent='Please enter your API key.'; hint.classList.remove('hidden'); }
      return;
    }
    localStorage.setItem(GEMINI_KEY_LS,val);
    location.reload();
  },{passive:false});
  document.getElementById('apiKeySave')?.addEventListener('mousedown',(e)=>e.preventDefault());
  document.getElementById('apiKeyInput')?.addEventListener('keydown',(e)=>{
    if(e.key==='Enter') document.getElementById('apiKeySave')?.dispatchEvent(new PointerEvent('pointerdown',{bubbles:true}));
  });
}

document.addEventListener('DOMContentLoaded',boot);
</script>
