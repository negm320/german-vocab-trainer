<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<title>German 5K Trainer</title>
<!-- App icon / PWA -->
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b0e12">
<style>
  :root{
    --bg:#0b0e12; --card:#12161d; --text:#e9eef5; --muted:#9aacbf; --border:#243041; --accent:#6aa6ff;
    --good:#22c55e; --bad:#ef4444; --btn:#1a2230; --btn2:#1e2a3c; --hole:#0f141c;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 system-ui,-apple-system,Segoe UI,Inter,Roboto,Arial,sans-serif;}
  .wrap{max-width:720px;margin:0 auto;padding:14px}
  .bar{display:flex;gap:8px;align-items:center;margin:6px auto 10px;max-width:720px}
  .bar button{background:var(--btn);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer}
  .bar button:hover{background:var(--btn2)}
  .pill{display:inline-block;border:1px solid var(--border);border-radius:999px;padding:3px 8px;font-size:12px;color:var(--muted)}
  /* pill-style buttons (for Edit/Hide/Super) */
.pillbtn{
  border-radius:999px !important;
  padding:8px 12px !important;
  font-size:13px;
}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
  .row{display:grid;grid-template-columns:120px 1fr;gap:10px;align-items:center;margin:8px 0}
  input,textarea{
    width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--hole);color:var(--text);
    font-size:16px;
  }
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .good{color:var(--good)} .bad{color:var(--bad)}
  .good-field{border-color:var(--good)!important; box-shadow:0 0 0 1px rgba(34,197,94,.45);}
  .bad-field{border-color:var(--bad)!important; box-shadow:0 0 0 1px rgba(239,68,68,.45);}
  .actions{display:flex;gap:8px;margin-top:10px;align-items:center}
  .actions button{background:var(--btn);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);cursor:pointer}
  /* Sentence toggle button */
.toggle.active{
  outline:2px solid var(--accent);
  background:#0f1420;
}
  .actions button:hover{background:var(--btn2)}
    /* Make buttons consistent everywhere (header buttons too) */
  button{
    background:var(--btn);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    color:var(--text);
    cursor:pointer;
  }
  button:hover{ background:var(--btn2); }
  .hidden{display:none!important}
  /* Backup reminder banner */
.banner{
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:space-between;
  background:rgba(106,166,255,.10);
  border:1px solid rgba(106,166,255,.35);
  border-radius:12px;
  padding:10px 12px;
  margin:10px 0 12px;
}
.banner .left{display:flex;flex-direction:column;gap:2px}
.banner .title{font-weight:700}
.banner .meta{font-size:12px;color:var(--muted)}
.banner .btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.banner .btns button{padding:8px 10px;border-radius:999px}
  /* Copy Modal (for long JSON on iOS) */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
  z-index:9999;
}
.modal.hidden{display:none!important}
.modalBox{
  width:min(720px, 100%);
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  box-shadow:0 12px 40px rgba(0,0,0,.45);
}
#copyModalText{
  width:100%;
  height:45vh;
  margin-top:10px;
  background:var(--hole);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  color:var(--text);
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  font-size:12px;
}
</style>
</head>
<body>
<div class="wrap">
<div class="bar">
  <strong>5k Trainer (isolated)</strong>
</div>
<!-- Backup reminder (Option 1) -->
<div id="backupBanner" class="banner hidden" aria-live="polite">
  <div class="left">
    <div class="title">Cloud backup overdue</div>
    <div id="backupMeta" class="meta"></div>
  </div>
  <div class="btns">
    <button id="btnBackupNow">Backup now</button>
    <button id="btnBackupDismiss" class="muted">Dismiss</button>
  </div>
</div>
<div style="display:flex;justify-content:flex-end;margin:6px 2px 10px;">
  <div class="pill" id="topLevelPill">Level 1</div>
</div>
  <section class="card">
	<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
	  
	  <div style="flex:1">
		<div class="muted small" id="coreEnLabel">English word</div>
		<strong id="coreEn"></strong>
	  </div>

	  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
		
		<div style="display:flex;gap:8px;align-items:center;">
			<button id="coreEdit" class="muted pillbtn">Edit</button>
			<button id="coreHide" class="muted pillbtn">Hide</button>
			<button id="coreSuper" class="muted toggle pillbtn">Super</button>
		</div>

	  </div>

	</div>

    <div id="coreEnSentence" class="muted small" style="margin-top:4px;"></div>
    <div id="coreMasri" class="muted small" style="margin-top:4px;"></div>

    <div class="row" style="margin-top:10px;">
      <div class="label">German</div>
      <div>
        <input id="coreDe" type="text" autocomplete="off">
        <textarea id="coreDeSent" class="hidden" rows="3" style="margin-top:8px;resize:vertical" placeholder="Write the full German sentence..."></textarea>
      </div>
    </div>

    <div id="coreDiff" class="small" style="margin-top:6px;"></div>
    <div id="coreDeSentence" class="muted small" style="margin-top:4px;"></div>
    <div id="coreFeedback" class="small" style="margin-top:8px;"></div>

	<div class="actions">
	  <button id="coreCheck">Check</button>
	  <button id="coreNext">Next</button>
	  <button id="coreSentenceBtn" class="muted toggle">Sentence</button>
	  <button id="coreReset" class="muted">Reset</button>
	</div>

    <div id="coreProgressWrap" style="margin-top:10px">
      <div style="width:100%;height:6px;background:#1a2230;border-radius:4px;">
        <div id="coreProgBar" style="height:100%;width:0%;background:var(--accent);border-radius:4px;transition:width .3s;"></div>
      </div>
      <div id="coreProgText" class="small muted" style="margin-top:4px;text-align:right"></div>
    </div>

	<details id="toolsBox" style="margin-top:10px;">
	  <summary class="muted small" style="cursor:pointer;user-select:none;">
		Tools
	  </summary>

	  <div class="actions" style="margin-top:10px;justify-content:space-between;flex-wrap:wrap;">
		<button id="btnDump">Dump state</button>
		<button id="btnHardSave">Force save</button>
	  </div>

	  <div class="actions" style="margin-top:6px;flex-wrap:wrap;">
		<button id="btnCheckV1">Check v1 Key</button>
		<button id="btnCopyV1" class="muted">Copy v1 JSON</button>
		<button id="btnRestoreV1" class="muted">Restore v1 → current</button>
		<button id="btnRestoreBackup" class="muted">Restore latest backup</button>
	  </div>
	</details>
	
	<div style="margin-top:16px;display:flex;flex-direction:column;gap:8px;align-items:center;">

  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <label class="muted small" style="display:flex;gap:6px;align-items:center;">
      Level
      <select id="levelSelect" style="padding:8px;border-radius:10px;border:1px solid var(--border);background:var(--hole);color:var(--text);">
        <option value="1">1</option>
      </select>
    </label>

    <button id="btnExport" class="muted">Export</button>
    <button id="btnImport" class="muted">Import</button>
  </div>

  <div id="dbg" class="muted small"></div>

</div>
  </section>
</div>

<script>
/* ========= helpers ========= */
function $(sel){ return document.querySelector(sel); }
function setText(sel,t){ const el=$(sel); if(el) el.textContent=t; }
function setHTML(sel,h){ const el=$(sel); if(el) el.innerHTML=h; }
function norm(s){ return (s||'').trim().toLowerCase(); }
function normDe(s){ return (s||'').trim().toLowerCase()
  .replaceAll('ß','ss').replaceAll('ä','ae').replaceAll('ö','oe').replaceAll('ü','ue'); }
function pick(arr){ return arr && arr.length ? arr[Math.floor(Math.random()*arr.length)] : null; }

/* ========= CSV parser with auto delimiter ========= */
function parseCSV(txt){
  const head = (txt.split(/\r?\n/)[0] || '');
  const commaCount = (head.match(/,/g) || []).length;
  const semiCount  = (head.match(/;/g) || []).length;
  const DELIM = semiCount > commaCount ? ';' : ',';

  const rows = [];
  let row = [];
  let cur = '';
  let q = false;

  for(let i=0;i<txt.length;i++){
    const c = txt[i];
    if(c === '"'){
      if(q && txt[i+1] === '"'){ cur += '"'; i++; }
      else q = !q;
    } else if(c === DELIM && !q){
      row.push(cur); cur='';
    } else if((c === '\n' || c === '\r') && !q){
      if(cur !== '' || row.length){
        row.push(cur); rows.push(row);
        row=[]; cur='';
      }
    } else {
      cur += c;
    }
  }
  if(cur !== '' || row.length){ row.push(cur); rows.push(row); }
  return rows;
}

/* ========= storage ========= */
const LS_KEY = 'top5k_state_v2';
const LS_KEY_OLD = 'top5k_state_v1';
// Backup reminder settings
const LAST_CLOUD_BACKUP_KEY = 'top5k_last_cloud_backup_v1';
const BACKUP_DISMISS_SESSION_KEY = 'top5k_backup_dismissed_v1';
const BACKUP_INTERVAL_MS = 48 * 60 * 60 * 1000; // 48 hours

function fmtWhen(ts){
  if(!ts) return 'never';
  try{ return new Date(ts).toLocaleString(); }catch(e){ return 'never'; }
}

function setLastCloudBackupNow(){
  localStorage.setItem(LAST_CLOUD_BACKUP_KEY, String(Date.now()));
}

function updateBackupBanner(){
  const banner = $('#backupBanner');
  const meta = $('#backupMeta');
  if(!banner || !meta) return;

  // If user dismissed this session, don't nag until reload/new session
  if(sessionStorage.getItem(BACKUP_DISMISS_SESSION_KEY) === '1'){
    banner.classList.add('hidden');
    return;
  }

  const raw = localStorage.getItem(LAST_CLOUD_BACKUP_KEY);
  const last = raw ? parseInt(raw, 10) : 0;

  const age = Date.now() - (Number.isFinite(last) ? last : 0);
  const overdue = !last || age >= BACKUP_INTERVAL_MS;

  if(!overdue){
    banner.classList.add('hidden');
    return;
  }

  meta.textContent = `Last backup: ${fmtWhen(last)} • Recommended every 48h`;
  banner.classList.remove('hidden');
}
function buildStatePayload(){
  return {
    level: state.level,
    streaks: state.streaks || {},
    penalty: state.penalty || {},
    reqSeen: state.reqSeen || {},
    overrides: state.overrides || {},
    sentenceMode: !!state.sentenceMode,
    currentId: state.currentId || null
  };
}
function saveState(){
  const payload = buildStatePayload();

  try{
    // rolling backups (keep last 15)
    const BK = 'top5k_backups_v1';
    const raw = localStorage.getItem(BK);
    const arr = raw ? JSON.parse(raw) : [];
    arr.unshift({ t: Date.now(), data: payload });
    while(arr.length > 15) arr.pop();
    localStorage.setItem(BK, JSON.stringify(arr));

    localStorage.setItem(LS_KEY, JSON.stringify(payload));
  }catch(e){
    alert('Save failed. Please tap Export NOW to back up your progress.');
    console.error('Save failed:', e);
  }
}
function loadState(){

  const rawV2 = localStorage.getItem(LS_KEY);
  const rawV1 = localStorage.getItem(LS_KEY_OLD);

  let obj = null;

  // Prefer v2 if valid and not empty
  if(rawV2){
    try{
      const parsed = JSON.parse(rawV2);
      if(parsed && typeof parsed === 'object' && parsed.level && parsed.level > 1){
        obj = parsed;
      }
    }catch(e){}
  }

  // If v2 is empty or invalid, but v1 exists, use v1
  if(!obj && rawV1){
    try{
      const parsed = JSON.parse(rawV1);
      if(parsed && typeof parsed === 'object'){
        obj = parsed;
        // Migrate v1 → v2 permanently
        localStorage.setItem(LS_KEY, JSON.stringify(parsed));
      }
    }catch(e){}
  }

  if(!obj) return;

  state.level = obj.level || 1;
  state.streaks = obj.streaks || {};
  state.penalty = obj.penalty || {};
  state.reqSeen = obj.reqSeen || {};
  state.overrides = obj.overrides || {};
  state.sentenceMode = !!obj.sentenceMode;
}

/* ========= state ========= */
const APP = { wordsPerLevel: 25 };

const state = {
  data: [],
  level: 1,
  streaks: {},
  penalty: {},
  reqSeen: {},

  // Local per-word overrides (do NOT touch CSV):
  // { [id]: { deleted?, super?, superEvery?, superNext?, german?, english?, deSent?, enSent?, category?, masri? } }
  overrides: {},

  sentenceMode: false,
  currentId: null
};

/* ========= 5k core ========= */
const Core = {
  async load(){
    const res = await fetch('5k.csv', { cache:'no-store' });
    if(!res.ok) throw new Error('Could not fetch 5k.csv');
    const txt = await res.text();

    const rows = parseCSV(txt.trim());
    rows.shift(); // header

    state.data = rows.map((r, idx) => {
      const id = (r[0] || String(idx+1)).toString().trim();

      const base = {
        id,
        german:  r[1] || '',
        english: r[2] || '',
        deSent:  r[3] || '',
        enSent:  r[4] || '',
        category:r[5] || '',
        masri:   r[6] || '',
        lvl: Math.floor(idx / APP.wordsPerLevel) + 1
      };

      const ov = state.overrides?.[id];
      if(ov && ov.deleted) return null;

      if(ov && typeof ov === 'object'){
        return {
          ...base,
          german:  (ov.german  ?? base.german),
          english: (ov.english ?? base.english),
          deSent:  (ov.deSent  ?? base.deSent),
          enSent:  (ov.enSent  ?? base.enSent),
          category:(ov.category?? base.category),
          masri:   (ov.masri   ?? base.masri),
          super: !!ov.super,
          superEvery: ov.superEvery ?? 3,
          superNext: ov.superNext ?? null
        };
      }

      return base;
    }).filter(Boolean);

    UI.buildLevelSelector();
  },

  levelPool(){
    return state.data.slice(0, state.level * APP.wordsPerLevel);
  },

  baseRequiredFor(item){
    const CL = state.level;
    const WL = item.lvl || 1;
    const d = CL - WL;
    if(d <= 1) return 3;   // current + previous
    if(d === 2) return 2;  // two behind
    return 1;              // 3+ behind
  },

  requiredFor(item){
    const base = this.baseRequiredFor(item);
    const pen = state.penalty?.[item.id];

    const req = (pen && state.level <= pen.untilLevel)
      ? Math.max(base, pen.target)
      : base;

    // --- IMPORTANT FIX ---
    // If a word's required streak changes (e.g., 2 -> 1 when you level up),
    // we must NOT let old streak instantly count as mastery.
    // So: when req changes for this word, reset its streak.
    const id = item.id;
    const prev = state.reqSeen?.[id];

    if(prev === undefined){
      // First time we track this word: record req but DON'T wipe existing streak
      // (so imports / existing progress isn't destroyed immediately).
      state.reqSeen[id] = req;
      return req;
    }

    if(prev !== req){
      state.streaks[id] = 0;
      state.reqSeen[id] = req;
    }

    return req;
  },

  sentencePool(){
    return this.levelPool().filter(w => (w.deSent||'').trim() && (w.enSent||'').trim());
  },

  pick(){
    if(state.sentenceMode){
      return pick(this.sentencePool());
    }
    const pool = this.levelPool();
    if(!pool.length) return null;

	const unmastered = pool.filter(it => {
	  const need = this.requiredFor(it);
	  return (state.streaks[it.id] || 0) < need;
	});

	// Due super-review words (even if mastered), only when due
	const dueSuper = pool.filter(it => {
	  const ov = state.overrides?.[it.id];
	  if(!ov || !ov.super) return false;

	  const every = ov.superEvery ?? 3;
	  const nextDue = ov.superNext ?? (state.level + every);

	  // due when we've reached scheduled level
	  return state.level >= nextDue;
	});

	// If there’s due super review, show it sometimes (but don’t block learning)
	if(dueSuper.length && Math.random() < 0.25){
	  return pick(dueSuper);
	}

	return pick(unmastered.length ? unmastered : pool);
  },

  render(x){
    state.currentId = x?.id || null;

    const sentenceMode = !!state.sentenceMode;
    setText('#coreEnLabel', sentenceMode ? 'English sentence' : 'English word');

    if(sentenceMode){
      setText('#coreEn', x.enSent || '');
      setText('#coreEnSentence', x.english ? ('Word: ' + x.english) : '');
    } else {
      setText('#coreEn', x.english || '');
      setText('#coreEnSentence', x.enSent || '');
    }

    setText('#topLevelPill', `Level ${state.level}`);
    setText('#coreMasri', x.masri ? ('Masri: ' + x.masri) : '');

    setText('#coreDeSentence', '');
    setHTML('#coreFeedback', '');
    setHTML('#coreDiff', '');

    const wordInp = $('#coreDe');
    const sentInp = $('#coreDeSent');

    if(wordInp){
      wordInp.value = '';
      wordInp.classList.remove('good-field','bad-field');
      wordInp.classList.toggle('hidden', sentenceMode);
    }
    if(sentInp){
      sentInp.value = '';
      sentInp.classList.remove('good-field','bad-field');
      sentInp.classList.toggle('hidden', !sentenceMode);
    }

    $('#coreProgressWrap')?.classList.toggle('hidden', sentenceMode);

    setTimeout(()=>{ (sentenceMode?sentInp:wordInp)?.focus(); },0);
	
	    // --- Enter behavior: 1st Enter = Check, 2nd Enter = Next ---
    state._enterStage = 0; // reset when a new card renders
    const activeInput = (sentenceMode ? sentInp : wordInp);

    if(activeInput){
      activeInput.onkeydown = (e)=>{
        if(e.key === 'Enter'){
          e.preventDefault();
          if(state._enterStage === 0){
            // First Enter => Check
            $('#coreCheck')?.click();
            state._enterStage = 1;
            // keep focus so keyboard stays up
            setTimeout(()=> activeInput.focus(), 0);
          } else {
            // Second Enter => Next
            $('#coreNext')?.click();
            state._enterStage = 0;
          }
        }
      };
    }

    this.updateProgress();
    this.updateDbg();
  },

  check(x){
    const sentenceMode = !!state.sentenceMode;
    const showCorrectSentence = () => setText('#coreDeSentence', x.deSent || '');

    if(sentenceMode){
      const inp = $('#coreDeSent');
      if(!inp) return;
      const userRaw = inp.value || '';
      const expRaw  = x.deSent || '';

      const userN = normDe(userRaw.replace(/[^\p{L}\p{N}\s]/gu,' ')).replace(/\s+/g,' ').trim();
      const expN  = normDe(expRaw.replace(/[^\p{L}\p{N}\s]/gu,' ')).replace(/\s+/g,' ').trim();

      inp.classList.remove('good-field','bad-field');
      if(userN && userN === expN){
        inp.classList.add('good-field');
        setHTML('#coreFeedback', `<span class="good">Correct!</span>`);
      } else {
        inp.classList.add('bad-field');
        setHTML('#coreFeedback', `<span class="bad">Wrong.</span>`);
      }
      showCorrectSentence();
      saveState();
      this.updateDbg();
      return;
    }

    const inp = $('#coreDe');
    if(!inp) return;

    const guess  = normDe(inp.value);
    const target = normDe(x.german);
    const baseNeed = this.baseRequiredFor(x);
    const need = this.requiredFor(x);

    inp.classList.remove('good-field','bad-field');

	if(guess && guess === target){
	  state.streaks[x.id] = (state.streaks[x.id] || 0) + 1;

	  // If this is a Super word and it’s (already) mastered, treat it as review:
	  const ov = state.overrides?.[x.id];
	  const nowMastered = (state.streaks[x.id] || 0) >= need;

	  if(ov?.super && nowMastered){
		const every = ov.superEvery ?? 3;
		ov.superNext = state.level + every;
		state.overrides[x.id] = ov;
	  }

	  inp.classList.add('good-field');
	  setHTML('#coreFeedback', `<span class="good">Correct!</span> (${state.streaks[x.id]}/${need})`);
	} else {
      state.streaks[x.id] = 0;
	    // If a SUPER word is answered wrong, remove super status and return it to normal rotation
  const ov = state.overrides?.[x.id];
  if(ov?.super){
    ov.super = false;
    delete ov.superNext;     // no longer scheduled as super
    // keep superEvery value stored, so you can re-enable later without losing the preference
    state.overrides[x.id] = ov;
  }

      // penalty bump (based on baseNeed, not already-penalized need)
      const CL = state.level;
      const nextTarget =
        baseNeed >= 3 ? 3 :
        baseNeed === 2 ? 3 :
        2;

      const prev = state.penalty[x.id];
      const finalTarget = Math.max(prev?.target || 0, nextTarget);

      state.penalty[x.id] = { target: finalTarget, untilLevel: CL + 1 };

      inp.value = x.german || '';
      inp.classList.add('bad-field');

      setHTML(
        '#coreFeedback',
        `<span class="bad">Wrong.</span> Correct: <b>${x.german || ''}</b> <span class="muted small">• now ${finalTarget}-streak (until level ${CL+1})</span>`
      );
    }

    showCorrectSentence();

    saveState();

    // IMPORTANT: keep your existing behavior for now:
    // level up only when ALL unlocked words meet requiredFor()
    const pool = this.levelPool();
    const allMastered = pool.length && pool.every(it => {
      const req = this.requiredFor(it);
      return (state.streaks[it.id] || 0) >= req;
    });

    if(allMastered && state.level * APP.wordsPerLevel < state.data.length){
      state.level++;
      // keep streaks or reset? you can decide later.
      // For now we match your current app: reset streaks on level up.
      state.streaks = {};
      saveState();
    }

	this.updateProgress();
	this.updateDbg();
	if(typeof syncWordToolsUI === 'function') syncWordToolsUI();
  },

  updateProgress(){
    const pool = this.levelPool();
    if(!pool.length) return;

    const done = pool.filter(w => {
      const need = this.requiredFor(w);
      return (state.streaks[w.id] || 0) >= need;
    }).length;

    const pct = Math.round(100 * done / pool.length);
    $('#coreProgBar').style.width = pct + '%';
    setText('#coreProgText', `${done} / ${pool.length}`);
  },

  updateDbg(){
    const pool = this.levelPool();
    setText('#dbg', `unlocked=${pool.length} • lvl=${state.level} • current=${state.currentId||'-'}`);
  }
};

/* ========= UI extras (Level selector + Import/Export) ========= */
const UI = {
  maxLevel(){
    return Math.max(1, Math.ceil((state.data?.length || 0) / APP.wordsPerLevel));
  },

  buildLevelSelector(){
    const sel = $('#levelSelect');
    if(!sel) return;

    const maxL = this.maxLevel();
    sel.innerHTML = '';
    for(let i=1;i<=maxL;i++){
      const opt = document.createElement('option');
      opt.value = String(i);
      opt.textContent = String(i);
      sel.appendChild(opt);
    }
    sel.value = String(state.level || 1);

    sel.onchange = ()=>{
      const v = parseInt(sel.value, 10);
      if(!Number.isFinite(v)) return;
      state.level = Math.max(1, Math.min(v, maxL));
      // Optional: clear current card stage
      state._enterStage = 0;
      saveState();
      nextCard();
    };
  },

  exportState(){
    // Export ONLY progress (not the full CSV data)
	const payload = {
	  level: state.level,
	  streaks: state.streaks || {},
	  penalty: state.penalty || {},
	  reqSeen: state.reqSeen || {},
	  overrides: state.overrides || {},
	  sentenceMode: !!state.sentenceMode
	};
	

    const txt = JSON.stringify(payload);
    // show in prompt for easy copy
    openCopyModal(txt, 'Export (current state)');
	setLastCloudBackupNow();
	updateBackupBanner();
  },

  backupToFile(){
    const payload = buildStatePayload();
    const ts = new Date();
    const pad = (n)=> String(n).padStart(2,'0');
    const name = `top5k-backup-L${payload.level}-${ts.getFullYear()}-${pad(ts.getMonth()+1)}-${pad(ts.getDate())}_${pad(ts.getHours())}${pad(ts.getMinutes())}.json`;

    downloadJSONFile(payload, name);

    // Mark as backed up (best-effort; user still needs to save file)
    setLastCloudBackupNow();
    updateBackupBanner();
  },

  importState(){
    const txt = window.prompt('Paste your progress JSON here:');
    if(!txt) return;
    try{
      const obj = JSON.parse(txt);

      if(obj && typeof obj === 'object'){
        if(typeof obj.level === 'number') state.level = obj.level;
        if(obj.streaks && typeof obj.streaks === 'object') state.streaks = obj.streaks;
        if(obj.penalty && typeof obj.penalty === 'object') state.penalty = obj.penalty;
        if(typeof obj.sentenceMode === 'boolean') state.sentenceMode = obj.sentenceMode;
		if(obj.reqSeen && typeof obj.reqSeen === 'object') state.reqSeen = obj.reqSeen;
		if(obj.overrides && typeof obj.overrides === 'object') state.overrides = obj.overrides;

        // clamp level to available
        const maxL = this.maxLevel();
        state.level = Math.max(1, Math.min(state.level || 1, maxL));

		// sync sentence button UI
		if(typeof window.syncSentenceBtnUI === 'function') window.syncSentenceBtnUI();
		if(typeof window.syncWordToolsUI === 'function') window.syncWordToolsUI();

        saveState();
        this.buildLevelSelector();
        nextCard();
        alert('Imported ✅');
      }
    }catch(e){
      alert('Import failed: invalid JSON');
    }
  }
};

function downloadJSONFile(obj, filename){
  const blob = new Blob([JSON.stringify(obj)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=> URL.revokeObjectURL(url), 5000);
}
/* ========= copy modal (iOS-friendly) ========= */
function openCopyModal(text, title='Copy JSON'){
  const modal = $('#copyModal');
  const ta = $('#copyModalText');
  const ttl = $('#copyModalTitle');
  const hint = $('#copyModalHint');
  if(!modal || !ta || !ttl) return;

  ttl.textContent = title;
  ta.value = text || '';
  if(hint) hint.textContent = 'Tip: If Copy fails, long-press inside → Select All → Copy.';
  modal.classList.remove('hidden');
  modal.setAttribute('aria-hidden', 'false');

  setTimeout(()=>{
    ta.focus();
    ta.select();
  }, 50);
}

async function copyModalNow(){
  const ta = $('#copyModalText');
  const hint = $('#copyModalHint');
  if(!ta) return;
  try{
    await navigator.clipboard.writeText(ta.value);
    if(hint) hint.textContent = 'Copied ✅';
  }catch(e){
    if(hint) hint.textContent = 'Copy failed. Long-press → Select All → Copy.';
  }
}

function closeCopyModal(){
  const modal = $('#copyModal');
  if(!modal) return;
  modal.classList.add('hidden');
  modal.setAttribute('aria-hidden', 'true');
}

document.addEventListener('click', (e)=>{
  const id = e.target?.id;
  if(id === 'copyModalClose') closeCopyModal();
  if(id === 'copyModalCopy') copyModalNow();
  if(id === 'copyModal') closeCopyModal(); // click outside box
});

/* ========= wiring ========= */
async function boot(){
  loadState();
    updateBackupBanner();

  // apply UI toggle from state
// sentence mode is controlled by the Sentence button now

  // Keep keyboard open on mobile: prevent buttons from stealing focus
  function refocusActiveInput(){
    const sentenceMode = !!state.sentenceMode;
    const el = sentenceMode ? $('#coreDeSent') : $('#coreDe');
    setTimeout(()=>{ el?.focus(); }, 0);
  }

  function bindNoFocusClick(btnSel, onClick){
    const btn = $(btnSel);
    if(!btn) return;

    // pointer/touch: prevent focus loss
    btn.addEventListener('pointerdown', (e)=>{ e.preventDefault(); }, {passive:false});
    btn.addEventListener('touchstart', (e)=>{ e.preventDefault(); }, {passive:false});
    btn.addEventListener('mousedown', (e)=>{ e.preventDefault(); });

    btn.addEventListener('click', ()=>{
      onClick();
      refocusActiveInput();
    });
  }

  bindNoFocusClick('#coreCheck', ()=>{
    const x = state.data.find(w => w.id === state.currentId);
    if(x) Core.check(x);
    state._enterStage = 1; // after clicking Check, next Enter should go Next
  });

  bindNoFocusClick('#coreNext', ()=>{
    nextCard();
    state._enterStage = 0;
  });
  
  // Sentence mode toggle button (replaces checkbox) — make global so Core/UI can use it
  window.syncSentenceBtnUI = function(){
    const b = $('#coreSentenceBtn');
    if(!b) return;
    const on = !!state.sentenceMode;
    b.classList.toggle('active', on);
    b.textContent = on ? 'Sentence ✓' : 'Sentence';
  };
  window.syncSentenceBtnUI();

  // Word tools UI (Super/Hide) — make global so Core/UI can use it
  window.syncWordToolsUI = function(){
    const id = state.currentId;
    const ov = id ? (state.overrides?.[id] || null) : null;

    const superBtn = $('#coreSuper');
    if(superBtn){
      const on = !!ov?.super;
      superBtn.classList.toggle('active', on);
      superBtn.textContent = on ? 'Super ✓' : 'Super';
    }

    const hideBtn = $('#coreHide');
    if(hideBtn){
      hideBtn.textContent = ov?.deleted ? 'Hidden ✓' : 'Hide';
    }
  };
  
  // Prevent losing keyboard focus when tapping Sentence button
  const sBtn = $('#coreSentenceBtn');
  if(sBtn){
    sBtn.addEventListener('pointerdown', (e)=>{ e.preventDefault(); }, {passive:false});
    sBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); }, {passive:false});
    sBtn.addEventListener('mousedown', (e)=>{ e.preventDefault(); });

    sBtn.addEventListener('click', ()=>{
      state.sentenceMode = !state.sentenceMode;
      state._enterStage = 0;
      saveState();
      syncSentenceBtnUI();
      nextCard(); // re-render in the new mode
    });
  }
  
    // Edit current word (local override, does not touch CSV)
  $('#coreEdit')?.addEventListener('click', ()=>{
    const id = state.currentId;
    if(!id) return;
    const base = state.data.find(w => w.id === id);
    if(!base) return;

    const ov = state.overrides[id] || {};

    const german  = window.prompt('German:',  ov.german  ?? base.german  ?? '');
    if(german === null) return;
    const english = window.prompt('English:', ov.english ?? base.english ?? '');
    if(english === null) return;
    const deSent  = window.prompt('German sentence:', ov.deSent ?? base.deSent ?? '');
    if(deSent === null) return;
    const enSent  = window.prompt('English sentence:', ov.enSent ?? base.enSent ?? '');
    if(enSent === null) return;
    const category= window.prompt('Category:', ov.category ?? base.category ?? '');
    if(category === null) return;
    const masri   = window.prompt('Masri:', ov.masri ?? base.masri ?? '');
    if(masri === null) return;

    state.overrides[id] = {
      ...ov,
      german, english, deSent, enSent, category, masri
    };

    saveState();
    nextCard();
  });

  // Hide current word (soft delete)
  $('#coreHide')?.addEventListener('click', ()=>{
    const id = state.currentId;
    if(!id) return;
    const ov = state.overrides[id] || {};
    const next = !ov.deleted;

    if(next && !confirm('Hide this word? (It will stop appearing, CSV unchanged)')) return;

    state.overrides[id] = { ...ov, deleted: next };
    saveState();
    nextCard();
  });

  // Super-master toggle (review only every N levels)
  $('#coreSuper')?.addEventListener('click', ()=>{
    const id = state.currentId;
    if(!id) return;
    const ov = state.overrides[id] || {};
    const on = !ov.super;

    const everyDefault = ov.superEvery ?? 3;
    let every = everyDefault;

    if(on){
      const v = window.prompt('Show this word every how many levels? (default 3)', String(everyDefault));
      if(v === null) return;
      const n = parseInt(v,10);
      if(Number.isFinite(n) && n >= 1) every = n;
    }

    const updated = {
      ...ov,
      super: on,
      superEvery: every
    };

    // schedule next due
    if(on){
      updated.superNext = state.level + every;
    } else {
      delete updated.superNext;
    }

    state.overrides[id] = updated;
    saveState();
    nextCard();
  });

  $('#coreReset').addEventListener('click', ()=>{
    if(!confirm('Reset 5k progress?')) return;
    state.level = 1;
    state.streaks = {};
    state.penalty = {};
    state.sentenceMode = false;
    state.currentId = null;
    saveState();
    location.reload();
  });

  $('#btnDump').addEventListener('click', ()=>{
    console.log('TOP5K STATE:', JSON.parse(JSON.stringify(state)));
    alert('Dumped to console.');
  });

  $('#btnHardSave').addEventListener('click', ()=>{
    saveState();
    alert('Saved.');
  });
  
  $('#btnRestoreBackup')?.addEventListener('click', ()=>{
  try{
    const BK = 'top5k_backups_v1';
    const raw = localStorage.getItem(BK);
    const arr = raw ? JSON.parse(raw) : [];
    if(!arr.length){ alert('No backups found.'); return; }

    const newest = arr[0];
    const when = new Date(newest.t).toLocaleString();
    if(!confirm(`Restore latest backup?\n${when}`)) return;

    localStorage.setItem(LS_KEY, JSON.stringify(newest.data));
    alert('Restored ✅ Reloading…');
    location.reload();
  }catch(e){
    alert('Restore failed.');
    console.error(e);
  }
});
  // Debug: check if old v1 storage still exists
// --- v1 tools (Home Screen recovery) ---
function getV1Raw(){
  return localStorage.getItem('top5k_state_v1');
}

// iOS-friendly copy helper
async function copyTextToClipboard(txt){
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(txt);
      alert('Copied ✅');
      return true;
    }
  }catch(e){}

  // Fallback: prompt (user can long-press select/copy)
  window.prompt('Copy this JSON:', txt);
  return false;
}

$('#btnCheckV1')?.addEventListener('click', ()=>{
  const raw = getV1Raw();
  if(!raw){
    alert('v1 key NOT found in this container.');
    return;
  }
  try{
    const obj = JSON.parse(raw);
    alert('v1 found. Level = ' + (obj.level ?? 'unknown'));
    console.log('V1 STATE:', obj);
  }catch(e){
    alert('v1 exists but JSON invalid');
    console.log('RAW V1:', raw);
  }
});

$('#btnCopyV1')?.addEventListener('click', ()=>{
  const raw = localStorage.getItem('top5k_state_v1');
  if(!raw){ alert('No v1 key found.'); return; }
  openCopyModal(raw, 'Export (v1 key)');
});

// This is the REAL fix: force-migrate v1 -> v2 and reload
$('#btnRestoreV1')?.addEventListener('click', ()=>{
  const raw = getV1Raw();
  if(!raw){ alert('No v1 key found.'); return; }

  if(!confirm('Restore Level 36 progress from v1 and make it the current state?')) return;

  // Copy v1 into v2
  localStorage.setItem(LS_KEY, raw);

  alert('Restored ✅ App will reload now.');
  location.reload();
});
  
    // Level selector + Import/Export
  $('#btnExport')?.addEventListener('click', ()=> UI.exportState());
  $('#btnImport')?.addEventListener('click', ()=> UI.importState());
  // Backup reminder buttons
$('#btnBackupNow')?.addEventListener('click', ()=>{
  UI.backupToFile();
});

$('#btnBackupDismiss')?.addEventListener('click', ()=>{
  sessionStorage.setItem(BACKUP_DISMISS_SESSION_KEY, '1');
  updateBackupBanner();
});

  await Core.load();
  nextCard();
}

function nextCard(){
  const x = Core.pick();
  if(!x){
    setText('#coreEn', 'No data / nothing to pick');
    return;
  }
  Core.render(x);
  saveState();
}

document.addEventListener('DOMContentLoaded', boot);
</script>
<!-- Copy Modal (for long JSON on iOS) -->
<div id="copyModal" class="modal hidden" aria-hidden="true">
  <div class="modalBox">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
      <strong id="copyModalTitle">Copy</strong>
      <button id="copyModalClose" class="muted">Close</button>
    </div>

    <textarea id="copyModalText" spellcheck="false"></textarea>

    <div class="actions" style="justify-content:flex-end;margin-top:10px;">
      <button id="copyModalCopy">Copy</button>
    </div>
    <div id="copyModalHint" class="muted small" style="margin-top:6px;"></div>
  </div>
</div>

</body>
</html>
