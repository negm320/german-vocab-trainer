<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<title>German 5K Trainer</title>
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b0e12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0e12; --card:#12161d; --text:#e9eef5; --muted:#9aacbf; --border:#243041;
  --accent:#6aa6ff; --good:#22c55e; --bad:#ef4444; --btn:#1a2230; --btn2:#1e2a3c; --hole:#0f141c;
}
*{box-sizing:border-box}
button,input,textarea,select{font-family:inherit;}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 'Lora',Georgia,serif;}
.wrap{max-width:720px;margin:0 auto;padding:14px}

/* top bar */
.topBar{display:flex;align-items:center;justify-content:space-between;margin:6px 0 10px;}
.pill{display:inline-block;border:1px solid var(--border);border-radius:999px;padding:4px 10px;font-size:13px;color:var(--muted)}

/* header bar */
.bar{display:flex;gap:8px;align-items:center;margin:0 0 8px;}

/* card */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 6px 20px rgba(0,0,0,.25);position:relative;overflow:hidden;}

/* hint row */
.hintRow{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.hintWord{font-size:13px;font-weight:700;}
.hintMasri{font-size:12px;color:var(--muted);}

/* cloze prompt */
.corePrompt{font-size:18px;line-height:1.7;margin:6px 0;word-break:break-word;}
#cardTop{display:flex;flex-direction:column;}
.cloze-blank{
  display:inline-block;border-bottom:2px solid #6aa6ff;min-width:58px;height:14px;
  margin:0 2px;vertical-align:bottom;background:rgba(106,166,255,0.08);border-radius:3px 3px 0 0;
}

/* divider */
.divider{border:none;border-top:1px solid var(--border);margin:10px 0;}

/* inputs */
input,textarea{
  width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;
  background:var(--hole);color:var(--text);font-size:16px;
}

/* action rows */
.actionRow{display:flex;gap:6px;margin-top:8px;}
.actionRow button{flex:1;background:var(--btn);border:1px solid var(--border);border-radius:10px;padding:10px 8px;color:var(--text);cursor:pointer;font-size:14px;}
.actionRow button:hover{background:var(--btn2)}
.actionRow.secondary button{font-size:12px;padding:8px 4px;}

/* generic button reset */
button{background:var(--btn);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);cursor:pointer;}
button:hover{background:var(--btn2)}

/* states */
.hidden{display:none!important}
.muted{color:var(--muted)}
.small{font-size:12px}
.good{color:var(--good)} .bad{color:var(--bad)}
.good-field{border-color:var(--good)!important;box-shadow:0 0 0 1px rgba(34,197,94,.45);}
.bad-field{border-color:var(--bad)!important;box-shadow:0 0 0 1px rgba(239,68,68,.45);}

/* toggle active */
.toggle.active{outline:1px solid rgba(34,197,94,.55);background:rgba(34,197,94,.14);color:#b8f5c8;}

/* ── CARD SLIDE (Next) ── */
@keyframes slideInRight{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOutLeft{from{transform:translateX(0);opacity:1}to{transform:translateX(-40px);opacity:0}}
.card-enter{animation:slideInRight .22s cubic-bezier(.25,.46,.45,.94) both;}
.card-exit{animation:slideOutLeft .18s ease both;}

/* ── FLASH OVERLAY (correct / wrong) ── */
.flash-overlay{position:absolute;inset:0;border-radius:14px;pointer-events:none;opacity:0;}
@keyframes flashAnim{0%{opacity:0}15%{opacity:1}100%{opacity:0}}
.flash-good{background:rgba(34,197,94,.12);border:1.5px solid rgba(34,197,94,.5);border-radius:14px;animation:flashAnim .65s ease both;}
.flash-bad{background:rgba(239,68,68,.10);border:1.5px solid rgba(239,68,68,.45);border-radius:14px;animation:flashAnim .65s ease both;}

/* ── INPUT SHAKE (wrong) ── */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.input-shake{animation:shake .35s ease both;}

/* ── BLANK PULSE (new card) ── */
@keyframes blankPulse{0%,100%{background:rgba(106,166,255,.08)}50%{background:rgba(106,166,255,.25)}}
.blank-pulse{animation:blankPulse 1.1s ease 2;}

/* ── STREAK DOTS ── */
.streakWrap{display:flex;align-items:center;gap:6px;margin-top:10px;}
.streakLabel{font-size:10px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;flex-shrink:0;}
.streakDots{display:flex;gap:5px;align-items:center;}
.streak-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid #2e3f55;background:transparent;transition:background .25s,border-color .25s;}
.streak-dot.filled{background:var(--accent);border-color:var(--accent);}
@keyframes dotPop{0%{transform:scale(1)}45%{transform:scale(1.5)}75%{transform:scale(.88)}100%{transform:scale(1)}}
.streak-dot.pop{animation:dotPop .3s cubic-bezier(.34,1.56,.64,1) both;}

/* ── MENU SLIDE ── */
@keyframes menuSlideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes menuSlideOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-10px)}}
.menu-enter{animation:menuSlideIn .2s cubic-bezier(.25,.46,.45,.94) both;}
.menu-exit{animation:menuSlideOut .16s ease both;}

/* ── FULLSCREEN LEVEL UP ── */
.lvlOverlay{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .2s;}
.lvlOverlay.show{pointer-events:all;}
.lvlBg{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(106,166,255,.18) 0%,rgba(11,14,18,.97) 70%);}
.lvlContent{position:relative;text-align:center;}
@keyframes lvlBgIn{0%{opacity:0}20%{opacity:1}75%{opacity:1}100%{opacity:0}}
@keyframes lvlNumIn{0%{transform:scale(.4);opacity:0}50%{transform:scale(1.1);opacity:1}70%{transform:scale(.97)}100%{transform:scale(1);opacity:1}}
@keyframes lvlTextIn{0%,30%{opacity:0;transform:translateY(10px)}60%,100%{opacity:1;transform:translateY(0)}}
.lvlOverlay.show{animation:lvlBgIn 2.2s ease both;}
.lvlOverlay.show .lvlNum{animation:lvlNumIn .6s cubic-bezier(.34,1.56,.64,1) .1s both;}
.lvlOverlay.show .lvlText{animation:lvlTextIn .5s ease both;}
.lvlOverlay.show .lvlSub{animation:lvlTextIn .5s ease .1s both;}
.lvlNum{font-size:80px;font-weight:600;color:var(--accent);line-height:1;letter-spacing:-2px;}
.lvlText{font-size:13px;color:var(--muted);margin-top:8px;letter-spacing:.12em;text-transform:uppercase;}
.lvlSub{font-size:12px;color:#4a6080;margin-top:4px;}

/* backup banner */
.banner{display:flex;gap:10px;align-items:center;justify-content:space-between;background:rgba(106,166,255,.10);border:1px solid rgba(106,166,255,.35);border-radius:12px;padding:10px 12px;margin:10px 0 12px;}
.banner .left{display:flex;flex-direction:column;gap:2px}
.banner .title{font-weight:700}
.banner .meta{font-size:12px;color:var(--muted)}
.banner .btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.banner .btns button{padding:8px 10px;border-radius:999px}

/* ⋯ menu panel */
.menuPanel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-top:10px;display:flex;flex-direction:column;gap:14px;}
.menuSection{display:flex;flex-direction:column;gap:8px;}
.menuLabel{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.modeRow{display:flex;gap:6px;}
.modeBtn{flex:1;padding:9px 6px;font-size:13px;border-radius:10px;}
.modeBtn.active{outline:1px solid rgba(34,197,94,.55);background:rgba(34,197,94,.14);color:#b8f5c8;}
.menuRow{display:flex;gap:6px;flex-wrap:wrap;}
.menuRow button{padding:9px 12px;font-size:13px;}
.danger-btn{color:var(--bad);border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.08);width:100%;padding:10px;}
.danger-btn:hover{background:rgba(239,68,68,.18);}

/* copy modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:16px;z-index:9999;}
.modal.hidden{display:none!important}
.modalBox{width:min(720px,100%);background:var(--card);border:1px solid var(--border);border-radius:16px;padding:12px;box-shadow:0 12px 40px rgba(0,0,0,.45);}
#copyModalText{width:100%;height:45vh;margin-top:10px;background:var(--hole);border:1px solid var(--border);border-radius:12px;padding:10px;color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;font-size:12px;}
</style>
</head>
<body>
<!-- Fullscreen level-up overlay -->
<div class="lvlOverlay" id="lvlOverlay" aria-hidden="true">
  <div class="lvlBg"></div>
  <div class="lvlContent">
    <div class="lvlNum" id="lvlOverlayNum">2</div>
    <div class="lvlText">Level unlocked</div>
    <div class="lvlSub">Keep going</div>
  </div>
</div>

<div class="wrap">

<div class="bar"><strong>5k Trainer</strong></div>

<!-- Backup reminder banner -->
<div id="backupBanner" class="banner hidden" aria-live="polite">
  <div class="left">
    <div class="title">Cloud backup overdue</div>
    <div id="backupMeta" class="meta"></div>
  </div>
  <div class="btns">
    <button id="btnBackupNow">Backup now</button>
    <button id="btnBackupDismiss" class="muted">Dismiss</button>
  </div>
</div>

<!-- Top bar: level pill + menu button -->
<div class="topBar">
  <div id="topLevelPill" class="pill">Level 1</div>
  <button id="btnMenu" style="padding:6px 14px;font-size:18px;letter-spacing:2px;border-radius:999px;">⋯</button>
</div>

<!-- Card -->
<section class="card">

  <div id="cardTop">
    <!-- Hint row: English word (gender-colored) + Masri -->
    <div class="hintRow" id="hintRow">
      <span id="coreEn" class="hintWord"></span>
      <span id="coreMasri" class="hintMasri"></span>
      <span id="coreEnLabel" class="hidden"></span>
    </div>

    <!-- Prompt: cloze sentence / english sentence context -->
    <div id="corePrompt" class="corePrompt muted"></div>
    <div id="corePrefixHint" class="muted small hidden" style="margin-top:2px;"></div>
    <div id="coreEnSentence" class="hidden"></div>
  </div>

  <hr class="divider">

  <!-- Input -->
  <input id="coreDe" type="text" autocomplete="off" spellcheck="false" placeholder="Type German…">
  <textarea id="coreDeSent" class="hidden" rows="3" style="margin-top:8px;resize:vertical" placeholder="Write the full German sentence..."></textarea>

  <!-- Feedback -->
  <div id="coreDiff" class="small" style="margin-top:6px;"></div>
  <div id="coreDeSentence" class="muted small" style="margin-top:4px;"></div>
  <div id="coreFeedback" class="small" style="margin-top:8px;"></div>

  <!-- Primary: Check + Next -->
  <div class="actionRow" style="margin-top:10px;">
    <button id="coreCheck">Check</button>
    <button id="coreNext">Next</button>
  </div>

  <!-- Secondary: Back, Typo, Hide, Edit -->
  <div class="actionRow secondary" style="margin-top:6px;">
    <button id="coreBack" class="muted">Back</button>
    <button id="coreTypo" class="muted">Typo</button>
    <button id="coreHide" class="muted">Hide</button>
    <button id="coreEdit" class="muted">Edit</button>
  </div>

  <!-- Flash overlay for correct/wrong -->
  <div class="flash-overlay" id="coreFlashOverlay"></div>

  <!-- Streak dots -->
  <div class="streakWrap" id="coreStreakWrap">
    <span class="streakLabel">Streak</span>
    <div class="streakDots" id="coreStreakDots"></div>
  </div>

  <!-- Progress bar -->
  <div id="coreProgressWrap" style="margin-top:10px">
    <div style="width:100%;height:6px;background:#1a2230;border-radius:4px;">
      <div id="coreProgBar" style="height:100%;width:0%;background:var(--accent);border-radius:4px;transition:width .3s;"></div>
    </div>
    <div id="coreProgText" class="small muted" style="margin-top:4px;text-align:right"></div>
  </div>

  <!-- Debug -->
  <div id="dbg" class="muted small" style="margin-top:6px;"></div>

  <!-- Debug tools -->
  <details id="toolsBox" style="margin-top:10px;">
    <summary class="muted small" style="cursor:pointer;user-select:none;">Tools</summary>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
      <button id="btnDump">Dump state</button>
      <button id="btnHardSave">Force save</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;">
      <button id="btnCheckV1">Check v1 Key</button>
      <button id="btnCopyV1" class="muted">Copy v1 JSON</button>
      <button id="btnRestoreV1" class="muted">Restore v1 → current</button>
      <button id="btnRestoreBackup" class="muted">Restore latest backup</button>
    </div>
  </details>

</section>

<!-- ⋯ Menu panel (shown below card) -->
<div id="menuPanel" class="menuPanel hidden">

  <!-- Mode -->
  <div class="menuSection">
    <div class="menuLabel">Mode</div>
    <div class="modeRow">
      <button id="btnModeWord" class="modeBtn">Word</button>
      <button id="btnModeCloze" class="modeBtn">Cloze</button>
      <button id="btnModeSentence" class="modeBtn">Sentence</button>
    </div>
  </div>

  <!-- Word tools -->
  <div class="menuSection">
    <div class="menuLabel">Word tools</div>
    <div class="menuRow">
      <button id="coreSuper">Super</button>
      <button id="coreOneStreak">1-Streak</button>
    </div>
  </div>

  <!-- App -->
  <div class="menuSection">
    <div class="menuLabel">App</div>
    <div class="menuRow">
      <button id="btnExport">Export</button>
      <button id="btnImport">Import</button>
    </div>
    <div style="margin-top:4px;">
      <label class="muted small" style="display:flex;gap:6px;align-items:center;">
        Level
        <select id="levelSelect" style="padding:8px;border-radius:10px;border:1px solid var(--border);background:var(--hole);color:var(--text);">
          <option value="1">1</option>
        </select>
      </label>
    </div>
  </div>

  <!-- Danger zone -->
  <div class="menuSection">
    <div class="menuLabel" style="color:var(--bad);">Danger zone</div>
    <button id="coreReset" class="danger-btn">Reset all progress</button>
  </div>

</div>

</div><!-- /wrap -->

<script>
/* ====== helpers ====== */
function $(sel){ return document.querySelector(sel); }
function setText(sel,t){ const el=$(sel); if(el) el.textContent=t; }
function setHTML(sel,h){ const el=$(sel); if(el) el.innerHTML=h; }
function norm(s){ return (s||'').trim().toLowerCase(); }
function normDe(s){ return (s||'').trim().toLowerCase()
  .replaceAll('ß','ss').replaceAll('ä','ae').replaceAll('ö','oe').replaceAll('ü','ue'); }
function pickRand(arr){ return arr&&arr.length ? arr[Math.floor(Math.random()*arr.length)] : null; }
function escapeHTML(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ====== gender color ====== */
function getGenderColor(x){
  const g = x.gender || '';
  if(g==='m') return '#6aa6ff';
  if(g==='f') return '#f472b6';
  if(g==='n') return '#4ade80';
  // No CSV gender — detect from sentence for capitalised words (nouns)
  const first = (x.german||'')[0] || '';
  if(first && first === first.toUpperCase() && first !== first.toLowerCase()){
    const sent = (x.deSent||'').toLowerCase();
    if(/\bder\b|\bden\b|\bdem\b|\bdes\b/.test(sent)) return '#6aa6ff';
    if(/\bdie\b|\beiner\b/.test(sent)) return '#f472b6';
    if(/\bdas\b|\bein\b/.test(sent)) return '#4ade80';
    return '#e9eef5';
  }
  return '#fb923c'; // verb / adjective / other
}

/* ====== cloze builder ====== */
const SEP_PREFIXES = ['durch','nach','über','fest','aus','auf','ein','mit','vor','weg','los','her','hin','an','ab','zu','um'];

function buildClozeResult(x){
  const searchTerm = (x.conjugated||'').trim() || (x.german||'').trim();
  const sentence   = (x.deSent||'').trim();
  if(!sentence || !searchTerm) return null;

  const idx = sentence.toLowerCase().indexOf(searchTerm.toLowerCase());
  if(idx === -1) return null;

  const before  = sentence.slice(0, idx);
  const after   = sentence.slice(idx + searchTerm.length);

  // Separable verb prefix detection
  let afterHTML  = escapeHTML(after);
  let prefixHint = null;
  const gLow = (x.german||'').toLowerCase();

  for(const p of SEP_PREFIXES){
    if(gLow.startsWith(p)){
      // Look for prefix at/near end of the "after" part
      const re = new RegExp('(\\b)(' + p + ')([.!?,\\s]*)$', 'i');
      const m  = after.match(re);
      if(m){
        const pi = after.lastIndexOf(m[2]); // start of prefix in after
        afterHTML = escapeHTML(after.slice(0, pi))
          + `<span style="color:var(--accent);font-weight:700">${escapeHTML(m[2])}</span>`
          + escapeHTML(after.slice(pi + m[2].length));
        prefixHint = '↑ prefix belongs to this verb';
        break;
      }
    }
  }

  return {
    html: escapeHTML(before) + '<span class="cloze-blank"></span>' + afterHTML,
    prefixHint,
    correctAnswer: x.german
  };
}

function fillClozeBlank(word, isCorrect){
  const promptEl=$('#corePrompt');
  if(!promptEl) return;
  const blank=promptEl.querySelector('.cloze-blank');
  if(!blank) return;
  const span=document.createElement('span');
  span.style.fontWeight='700';
  span.style.color=isCorrect?'var(--good)':'var(--bad)';
  span.textContent=word;
  blank.replaceWith(span);
}

/* ====== CSV parser ====== */
function parseCSV(txt){
  const head = (txt.split(/\r?\n/)[0]||'');
  const DELIM = (head.match(/;/g)||[]).length > (head.match(/,/g)||[]).length ? ';' : ',';
  const rows=[]; let row=[],cur='',q=false;
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(c==='"'){ if(q&&txt[i+1]==='"'){cur+='"';i++;} else q=!q; }
    else if(c===DELIM&&!q){ row.push(cur);cur=''; }
    else if((c==='\n'||c==='\r')&&!q){ if(cur!==''||row.length){row.push(cur);rows.push(row);row=[];cur='';} }
    else cur+=c;
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows;
}

/* ====== storage ====== */
const LS_KEY  = 'top5k_state_v2';
const LS_KEY_OLD = 'top5k_state_v1';
const LAST_CLOUD_BACKUP_KEY  = 'top5k_last_cloud_backup_v1';
const BACKUP_DISMISS_SESSION_KEY = 'top5k_backup_dismissed_v1';
const BACKUP_INTERVAL_MS = 48*60*60*1000;

function fmtWhen(ts){ if(!ts) return 'never'; try{return new Date(ts).toLocaleString();}catch(e){return 'never';} }
function setLastCloudBackupNow(){ localStorage.setItem(LAST_CLOUD_BACKUP_KEY,String(Date.now())); }

function updateBackupBanner(){
  const banner=$('#backupBanner'), meta=$('#backupMeta');
  if(!banner||!meta) return;
  if(sessionStorage.getItem(BACKUP_DISMISS_SESSION_KEY)==='1'){banner.classList.add('hidden');return;}
  const raw=localStorage.getItem(LAST_CLOUD_BACKUP_KEY);
  const last=raw?parseInt(raw,10):0;
  const age=Date.now()-(Number.isFinite(last)?last:0);
  const overdue=!last||age>=BACKUP_INTERVAL_MS;
  if(!overdue){banner.classList.add('hidden');return;}
  meta.textContent=`Last backup: ${fmtWhen(last)} • Recommended every 48h`;
  banner.classList.remove('hidden');
}

function buildStatePayload(){
  return {
    level:      state.level,
    streaks:    state.streaks||{},
    penalty:    state.penalty||{},
    reqSeen:    state.reqSeen||{},
    overrides:  state.overrides||{},
    activeMode: state.activeMode||'word',
    sentenceMode: state.activeMode==='sentence', // backward compat
    currentId:  state.currentId||null
  };
}

function saveState(){
  const payload=buildStatePayload();
  try{
    const BK='top5k_backups_v1';
    const arr=JSON.parse(localStorage.getItem(BK)||'[]');
    arr.unshift({t:Date.now(),data:payload});
    while(arr.length>15) arr.pop();
    localStorage.setItem(BK,JSON.stringify(arr));
    localStorage.setItem(LS_KEY,JSON.stringify(payload));
  }catch(e){
    alert('Save failed. Please tap Export NOW to back up your progress.');
    console.error('Save failed:',e);
  }
}

function loadState(){
  const rawV2=localStorage.getItem(LS_KEY);
  const rawV1=localStorage.getItem(LS_KEY_OLD);
  let obj=null;

  if(rawV2){ try{ const p=JSON.parse(rawV2); if(p&&typeof p==='object'&&p.level&&p.level>1) obj=p; }catch(e){} }
  if(!obj&&rawV1){ try{ const p=JSON.parse(rawV1); if(p&&typeof p==='object'){ obj=p; localStorage.setItem(LS_KEY,JSON.stringify(p)); } }catch(e){} }
  if(!obj) return;

  state.level    = obj.level||1;
  state.streaks  = obj.streaks||{};
  state.penalty  = obj.penalty||{};
  state.reqSeen  = obj.reqSeen||{};
  state.overrides= obj.overrides||{};
  // Migrate sentenceMode → activeMode
  if(obj.activeMode){ state.activeMode=obj.activeMode; }
  else if(obj.sentenceMode){ state.activeMode='sentence'; }
  else { state.activeMode='word'; }
}

/* ====== state ====== */
const APP={wordsPerLevel:25};

const state={
  rawRows:[], data:[],
  level:1, streaks:{}, penalty:{}, reqSeen:{},
  overrides:{},
  activeMode:'word',
  currentId:null,
  lastReview:null,
  _clozeCorrect:null,
  _enterStage:0
};

function cloneProgressState(){
  return JSON.parse(JSON.stringify({
    level:state.level, streaks:state.streaks||{}, penalty:state.penalty||{},
    reqSeen:state.reqSeen||{}, overrides:state.overrides||{}, activeMode:state.activeMode||'word'
  }));
}

function restoreProgressState(snap){
  if(!snap) return;
  state.level    = snap.level||1;
  state.streaks  = JSON.parse(JSON.stringify(snap.streaks||{}));
  state.penalty  = JSON.parse(JSON.stringify(snap.penalty||{}));
  state.reqSeen  = JSON.parse(JSON.stringify(snap.reqSeen||{}));
  state.overrides= JSON.parse(JSON.stringify(snap.overrides||{}));
  state.activeMode= snap.activeMode||'word';
  Core.rebuildData();
}

function captureReviewSnapshot(x,opts={}){
  const wordInp=$('#coreDe'), sentInp=$('#coreDeSent');
  state.lastReview={
    id:x.id,
    activeMode:state.activeMode||'word',
    beforeState:opts.beforeState?JSON.parse(JSON.stringify(opts.beforeState)):null,
    canTypo:!!opts.canTypo,
    wordValue:wordInp?wordInp.value:'',
    sentValue:sentInp?sentInp.value:'',
    wordClass:wordInp?(wordInp.className||''):'',
    sentClass:sentInp?(sentInp.className||''):'',
    feedbackHTML:$('#coreFeedback')?$('#coreFeedback').innerHTML:'',
    deSentenceText:$('#coreDeSentence')?$('#coreDeSentence').textContent:'',
    promptHTML:$('#corePrompt')?$('#corePrompt').innerHTML:''
  };
}

function restoreLastReviewUI(){
  const r=state.lastReview;
  if(!r) return false;
  const x=state.data.find(w=>w.id===r.id);
  if(!x) return false;
  state.activeMode=r.activeMode||'word';
  Core.render(x);
  const wordInp=$('#coreDe'), sentInp=$('#coreDeSent');
  if(wordInp){ wordInp.value=r.wordValue||''; wordInp.className=r.wordClass||''; }
  if(sentInp){ sentInp.value=r.sentValue||''; sentInp.className=r.sentClass||''; }
  setHTML('#coreFeedback',r.feedbackHTML||'');
  setText('#coreDeSentence',r.deSentenceText||'');
  if(r.activeMode==='cloze'&&r.promptHTML) setHTML('#corePrompt',r.promptHTML);
  state._enterStage=1;
  if(typeof window.syncWordToolsUI==='function') window.syncWordToolsUI();
  return true;
}

/* ====== Core ====== */
const Core={
  async load(){
    const res=await fetch('5k.csv',{cache:'no-store'});
    if(!res.ok) throw new Error('Could not fetch 5k.csv');
    const txt=await res.text();
    const rows=parseCSV(txt.trim());
    rows.shift(); // drop header
    state.rawRows=rows;
    this.rebuildData();
    UI.buildLevelSelector();
  },

  rebuildData(){
    const built=[];
    for(let idx=0;idx<state.rawRows.length;idx++){
      const r=state.rawRows[idx];
      const id=(r[0]||String(idx+1)).toString().trim();
      const base={
        id,
        german:   r[1]||'',
        english:  r[2]||'',
        deSent:   r[3]||'',
        enSent:   r[4]||'',
        category: r[5]||'',
        masri:    r[6]||'',
        gender:   r[7]||'',
        conjugated:(r[8]||'').trim()||null
      };
      const ov=state.overrides?.[id];
      if(ov&&ov.deleted) continue;
      let item=base;
      if(ov&&typeof ov==='object'){
        item={
          ...base,
          german:   (ov.german   ??base.german),
          english:  (ov.english  ??base.english),
          deSent:   (ov.deSent   ??base.deSent),
          enSent:   (ov.enSent   ??base.enSent),
          category: (ov.category ??base.category),
          masri:    (ov.masri    ??base.masri),
          gender:   (ov.gender   ??base.gender),
          conjugated:(ov.conjugated!==undefined?ov.conjugated:base.conjugated),
          super:!!ov.super,
          superEvery:ov.superEvery??3,
          superNext:ov.superNext??null
        };
      }
      built.push(item);
    }
    state.data=built.map((it,i)=>({...it,lvl:Math.floor(i/APP.wordsPerLevel)+1}));
    const maxLvl=Math.max(1,Math.ceil(state.data.length/APP.wordsPerLevel));
    if(state.level>maxLvl) state.level=maxLvl;
    UI.buildLevelSelector();
  },

  levelPool(){
    const target=state.level*APP.wordsPerLevel;
    const out=[];
    for(let i=0;i<state.data.length&&out.length<target;i++){
      const it=state.data[i];
      if(state.overrides?.[it.id]?.super) continue;
      out.push(it);
    }
    return out;
  },

  sentencePool(){
    return this.levelPool().filter(w=>(w.deSent||'').trim()&&(w.enSent||'').trim());
  },

  baseRequiredFor(item){
    const ov=state.overrides?.[item.id];
    if(ov?.easy1) return 1;
    const d=state.level-(item.lvl||1);
    if(d<=1) return 3;
    if(d===2) return 2;
    return 1;
  },

  requiredFor(item){
    const base=this.baseRequiredFor(item);
    const pen=state.penalty?.[item.id];
    const req=(pen&&state.level<=pen.untilLevel)?Math.max(base,pen.target):base;
    const id=item.id;
    const prev=state.reqSeen?.[id];
    if(prev===undefined){ state.reqSeen[id]=req; return req; }
    if(prev!==req){ state.streaks[id]=0; state.reqSeen[id]=req; }
    return req;
  },

  pick(){
    const mode=state.activeMode||'word';
    if(mode==='sentence') return pickRand(this.sentencePool());

    const learnPool=this.levelPool();
    if(!learnPool.length) return null;

    // Due super visitors
    const dueSuper=[];
    const maxUnlocked=state.level*APP.wordsPerLevel;
    for(let i=0;i<Math.min(state.data.length,maxUnlocked);i++){
      const it=state.data[i];
      const ov=state.overrides?.[it.id];
      if(!ov?.super) continue;
      const every=ov.superEvery??3;
      const nextDue=ov.superNext??(state.level+every);
      if(state.level>=nextDue) dueSuper.push(it);
    }
    if(dueSuper.length) return pickRand(dueSuper);

    const unmastered=learnPool.filter(it=>(state.streaks[it.id]||0)<this.requiredFor(it));
    return pickRand(unmastered.length?unmastered:learnPool);
  },

  render(x){
    state.currentId=x?.id||null;
    const mode=state.activeMode||'word';
    const isCloze   =mode==='cloze';
    const isSentence=mode==='sentence';

    // Gender color on English word
    const enEl=$('#coreEn');
    if(enEl){
      enEl.textContent = isSentence ? (x.enSent||'') : (x.english||'');
      enEl.style.color = getGenderColor(x);
    }

    // Masri
    setText('#coreMasri', x.masri ? '· '+x.masri : '');

    // Prompt area
    const promptEl=$('#corePrompt');
    const prefixEl=$('#corePrefixHint');

    if(isCloze){
      const result=buildClozeResult(x);
      if(result){
        setHTML('#corePrompt', result.html);
        state._clozeCorrect=result.correctAnswer;
        if(promptEl) promptEl.className='corePrompt';
        if(prefixEl){
          prefixEl.textContent=result.prefixHint||'';
          prefixEl.classList.toggle('hidden',!result.prefixHint);
        }
      } else {
        // Fallback: show english sentence as context (no blank available)
        if(promptEl){ promptEl.textContent=x.enSent||''; promptEl.className='corePrompt muted'; }
        if(prefixEl) prefixEl.classList.add('hidden');
        state._clozeCorrect=x.german;
      }
    } else if(isSentence){
      if(promptEl){ promptEl.textContent=''; promptEl.className='corePrompt'; }
      if(prefixEl) prefixEl.classList.add('hidden');
    } else {
      // Word mode: show English sentence as soft context
      if(promptEl){ promptEl.textContent=x.enSent||''; promptEl.className='corePrompt muted'; }
      if(prefixEl) prefixEl.classList.add('hidden');
    }

    // Swap order: in cloze mode, sentence goes above English hint
    const hintRowEl=$('#hintRow');
    if(hintRowEl) hintRowEl.style.order = isCloze ? '2' : '0';
    if(promptEl)  promptEl.style.order  = isCloze ? '0' : '2';
    if(prefixEl)  prefixEl.style.order  = isCloze ? '1' : '3';

    setText('#coreDeSentence','');
    setHTML('#coreFeedback','');
    setHTML('#coreDiff','');

    const wordInp=$('#coreDe'), sentInp=$('#coreDeSent');
    if(wordInp){
      wordInp.value='';
      wordInp.classList.remove('good-field','bad-field');
      wordInp.classList.toggle('hidden',isSentence);
    }
    if(sentInp){
      sentInp.value='';
      sentInp.classList.remove('good-field','bad-field');
      sentInp.classList.toggle('hidden',!isSentence);
    }

    $('#coreProgressWrap')?.classList.toggle('hidden',isSentence);

    setTimeout(()=>{ (isSentence?sentInp:wordInp)?.focus(); },0);

    state._enterStage=0;
    const activeInput=isSentence?sentInp:wordInp;
    if(activeInput){
      activeInput.onkeydown=(e)=>{
        if(e.key==='Enter'){
          e.preventDefault();
          if(state._enterStage===0){ $('#coreCheck')?.click(); state._enterStage=1; setTimeout(()=>activeInput.focus(),0); }
          else { $('#coreNext')?.click(); state._enterStage=0; }
        }
      };
    }

    const currentStreak=state.streaks[x?.id]||0;
    const needed=x?this.requiredFor(x):3;
    renderStreakDots(currentStreak,needed);
    if(state.activeMode==='cloze') setTimeout(triggerBlankPulse,50);
    this.updateProgress();
    this.updateDbg();
    if(typeof window.syncWordToolsUI==='function') window.syncWordToolsUI();
  },

  check(x){
    const mode=state.activeMode||'word';
    const isSentence=mode==='sentence';
    const showCorrectSentence=()=>setText('#coreDeSentence',x.deSent||'');

    if(isSentence){
      const inp=$('#coreDeSent');
      if(!inp) return;
      const beforeState=cloneProgressState();
      const userN=normDe((inp.value||'').replace(/[^\p{L}\p{N}\s]/gu,' ')).replace(/\s+/g,' ').trim();
      const expN =normDe((x.deSent||'').replace(/[^\p{L}\p{N}\s]/gu,' ')).replace(/\s+/g,' ').trim();
      inp.classList.remove('good-field','bad-field');
      if(userN&&userN===expN){ inp.classList.add('good-field'); setHTML('#coreFeedback','<span class="good">Correct!</span>'); }
      else { inp.classList.add('bad-field'); setHTML('#coreFeedback','<span class="bad">Wrong.</span>'); }
      showCorrectSentence();
      captureReviewSnapshot(x,{beforeState,canTypo:false});
      saveState(); this.updateDbg();
      if(typeof window.syncWordToolsUI==='function') window.syncWordToolsUI();
      return;
    }

    // Word or Cloze: both use #coreDe, correct answer = x.german
    const inp=$('#coreDe');
    if(!inp) return;
    const beforeState=cloneProgressState();
    const guess =normDe(inp.value);
    const target=normDe(x.german);
    const baseNeed=this.baseRequiredFor(x);
    const need   =this.requiredFor(x);

    inp.classList.remove('good-field','bad-field');

    const isCorrect=!!(guess&&guess===target);
    if(isCorrect){
      state.streaks[x.id]=(state.streaks[x.id]||0)+1;
      const ov=state.overrides?.[x.id];
      const nowMastered=(state.streaks[x.id]||0)>=need;
      if(ov?.super&&nowMastered){ ov.superNext=state.level+(ov.superEvery??3); state.overrides[x.id]=ov; }
      triggerFlash('good');
      const prevStreak=(state.streaks[x.id]||0)-1;
      renderStreakDots(state.streaks[x.id],need,prevStreak);
      inp.classList.add('good-field');
      setHTML('#coreFeedback',`<span class="good">Correct!</span> (${state.streaks[x.id]}/${need})`);
    } else {
      state.streaks[x.id]=0;
      const ov=state.overrides?.[x.id];
      if(ov?.super){ ov.super=false; delete ov.superNext; state.overrides[x.id]=ov; }
      const nextTarget=baseNeed>=2?3:2;
      const prev=state.penalty[x.id];
      const finalTarget=Math.max(prev?.target||0,nextTarget);
      state.penalty[x.id]={target:finalTarget,untilLevel:state.level+1};
      triggerFlash('bad');
      triggerInputShake();
      flashDotsRed(need);
      inp.value=x.german||'';
      inp.classList.add('bad-field');
      const correctHint=isCloze?'':` Correct: <b>${x.german||''}</b>`;
      setHTML('#coreFeedback',`<span class="bad">Wrong.</span>${correctHint} <span class="muted small">• now ${finalTarget}-streak (until level ${state.level+1})</span>`);
    }

    // In cloze mode: fill blank with typed word (green) or correct word (red)
    if(mode==='cloze') fillClozeBlank(isCorrect?(inp.value||x.german):x.german, isCorrect);

    showCorrectSentence();
    captureReviewSnapshot(x,{beforeState,canTypo:!(guess&&guess===target)});
    saveState();

    const pool=this.levelPool();
    const allMastered=pool.length&&pool.every(it=>(state.streaks[it.id]||0)>=this.requiredFor(it));
    if(allMastered&&state.level*APP.wordsPerLevel<state.data.length){
      state.level++; state.streaks={};
      triggerLevelUp(state.level);
      saveState();
    }
    this.updateProgress(); this.updateDbg();
    if(typeof syncWordToolsUI==='function') syncWordToolsUI();
  },

  updateProgress(){
    const pool=this.levelPool();
    if(!pool.length) return;
    const done=pool.filter(w=>(state.streaks[w.id]||0)>=this.requiredFor(w)).length;
    const pct=Math.round(100*done/pool.length);
    const progBar=$('#coreProgBar');
    if(progBar) progBar.style.width=pct+'%';
    setText('#coreProgText',`${done} / ${pool.length}`);
    setText('#topLevelPill',`Level ${state.level} · ${done}/${pool.length}`);
  },

  updateDbg(){
    const pool=this.levelPool();
    setText('#dbg',`unlocked=${pool.length} • lvl=${state.level} • current=${state.currentId||'-'} • mode=${state.activeMode||'word'}`);
  }
};

/* ====== UI ====== */
const UI={
  maxLevel(){ return Math.max(1,Math.ceil((state.data?.length||0)/APP.wordsPerLevel)); },

  buildLevelSelector(){
    const sel=$('#levelSelect');
    if(!sel) return;
    const maxL=this.maxLevel();
    sel.innerHTML='';
    for(let i=1;i<=maxL;i++){
      const opt=document.createElement('option');
      opt.value=String(i); opt.textContent=String(i);
      sel.appendChild(opt);
    }
    sel.value=String(state.level||1);
    sel.onchange=()=>{
      const v=parseInt(sel.value,10);
      if(!Number.isFinite(v)) return;
      state.level=Math.max(1,Math.min(v,maxL));
      state._enterStage=0;
      saveState(); nextCard();
    };
  },

  exportState(){
    const payload=buildStatePayload();
    openCopyModal(JSON.stringify(payload),'Export (current state)');
    setLastCloudBackupNow(); updateBackupBanner();
  },

  backupToFile(){
    const payload=buildStatePayload();
    const ts=new Date();
    const pad=n=>String(n).padStart(2,'0');
    const name=`top5k-backup-L${payload.level}-${ts.getFullYear()}-${pad(ts.getMonth()+1)}-${pad(ts.getDate())}_${pad(ts.getHours())}${pad(ts.getMinutes())}.json`;
    downloadJSONFile(payload,name);
    setLastCloudBackupNow(); updateBackupBanner();
  },

  importState(){
    const txt=window.prompt('Paste your progress JSON here:');
    if(!txt) return;
    try{
      const obj=JSON.parse(txt);
      if(obj&&typeof obj==='object'){
        if(typeof obj.level==='number')          state.level=obj.level;
        if(obj.streaks&&typeof obj.streaks==='object')   state.streaks=obj.streaks;
        if(obj.penalty&&typeof obj.penalty==='object')   state.penalty=obj.penalty;
        if(obj.reqSeen&&typeof obj.reqSeen==='object')   state.reqSeen=obj.reqSeen;
        if(obj.overrides&&typeof obj.overrides==='object') state.overrides=obj.overrides;
        // mode migration
        if(obj.activeMode) state.activeMode=obj.activeMode;
        else if(typeof obj.sentenceMode==='boolean') state.activeMode=obj.sentenceMode?'sentence':'word';
        const maxL=this.maxLevel();
        state.level=Math.max(1,Math.min(state.level||1,maxL));
        if(typeof window.syncMenuUI==='function') window.syncMenuUI();
        saveState(); this.buildLevelSelector(); nextCard();
        alert('Imported ✅');
      }
    }catch(e){ alert('Import failed: invalid JSON'); }
  }
};

function downloadJSONFile(obj,filename){
  const blob=new Blob([JSON.stringify(obj)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

/* ====== copy modal ====== */
function openCopyModal(text,title='Copy JSON'){
  const modal=$('#copyModal'),ta=$('#copyModalText'),ttl=$('#copyModalTitle'),hint=$('#copyModalHint');
  if(!modal||!ta||!ttl) return;
  ttl.textContent=title; ta.value=text||'';
  if(hint) hint.textContent='Tip: If Copy fails, long-press inside → Select All → Copy.';
  modal.classList.remove('hidden'); modal.setAttribute('aria-hidden','false');
  setTimeout(()=>{ ta.focus(); ta.select(); },50);
}
async function copyModalNow(){
  const ta=$('#copyModalText'),hint=$('#copyModalHint');
  if(!ta) return;
  try{ await navigator.clipboard.writeText(ta.value); if(hint) hint.textContent='Copied ✅'; }
  catch(e){ if(hint) hint.textContent='Copy failed. Long-press → Select All → Copy.'; }
}
function closeCopyModal(){
  const modal=$('#copyModal');
  if(!modal) return;
  modal.classList.add('hidden'); modal.setAttribute('aria-hidden','true');
}
document.addEventListener('click',(e)=>{
  const id=e.target?.id;
  if(id==='copyModalClose') closeCopyModal();
  if(id==='copyModalCopy') copyModalNow();
  if(id==='copyModal') closeCopyModal();
});

/* ====== animations ====== */
function triggerFlash(type){
  const el=$('#coreFlashOverlay');
  if(!el) return;
  el.className='flash-overlay';
  void el.offsetWidth;
  el.className='flash-overlay flash-'+type;
  setTimeout(()=>{ el.className='flash-overlay'; },700);
}

function triggerInputShake(){
  const inp=$('#coreDe');
  if(!inp) return;
  inp.classList.remove('input-shake');
  void inp.offsetWidth;
  inp.classList.add('input-shake');
  setTimeout(()=>inp.classList.remove('input-shake'),400);
}

function triggerCardSlide(callback){
  const card=document.querySelector('.card');
  if(!card){ callback(); return; }
  card.classList.remove('card-enter','card-exit');
  card.classList.add('card-exit');
  setTimeout(()=>{
    card.classList.remove('card-exit');
    callback();
    card.classList.add('card-enter');
    setTimeout(()=>card.classList.remove('card-enter'),300);
  },200);
}

function triggerBlankPulse(){
  const blank=document.querySelector('.cloze-blank');
  if(!blank) return;
  blank.classList.remove('blank-pulse');
  void blank.offsetWidth;
  blank.classList.add('blank-pulse');
  setTimeout(()=>blank.classList.remove('blank-pulse'),2600);
}

function renderStreakDots(current,required,animateIdx){
  const wrap=$('#coreStreakDots');
  if(!wrap) return;
  wrap.innerHTML='';
  for(let i=0;i<required;i++){
    const d=document.createElement('div');
    d.className='streak-dot'+(i<current?' filled':'');
    wrap.appendChild(d);
  }
  if(animateIdx!==undefined&&animateIdx>=0&&animateIdx<required){
    const dots=wrap.querySelectorAll('.streak-dot');
    if(dots[animateIdx]){
      dots[animateIdx].classList.remove('pop');
      void dots[animateIdx].offsetWidth;
      dots[animateIdx].classList.add('pop');
    }
  }
}

function flashDotsRed(required){
  const wrap=$('#coreStreakDots');
  if(!wrap) return;
  wrap.querySelectorAll('.streak-dot').forEach(d=>{
    d.style.background='var(--bad)'; d.style.borderColor='var(--bad)'; d.classList.add('filled');
  });
  setTimeout(()=>renderStreakDots(0,required),450);
}

function triggerLevelUp(newLevel){
  const overlay=$('#lvlOverlay'),numEl=$('#lvlOverlayNum');
  if(!overlay) return;
  if(numEl) numEl.textContent=String(newLevel);
  overlay.className='lvlOverlay show';
  overlay.setAttribute('aria-hidden','false');
  setTimeout(()=>{ overlay.className='lvlOverlay'; overlay.setAttribute('aria-hidden','true'); },2300);
}

function openMenu(){
  const panel=$('#menuPanel');
  if(!panel) return;
  panel.classList.remove('hidden','menu-exit');
  panel.classList.add('menu-enter');
  setTimeout(()=>panel.classList.remove('menu-enter'),250);
}

function closeMenu(){
  const panel=$('#menuPanel');
  if(!panel) return;
  panel.classList.remove('menu-enter');
  panel.classList.add('menu-exit');
  setTimeout(()=>{ panel.classList.add('hidden'); panel.classList.remove('menu-exit'); },200);
}

/* ====== boot ====== */
async function boot(){
  loadState();
  updateBackupBanner();

  function refocusActiveInput(){
    const isSentence=state.activeMode==='sentence';
    const el=isSentence?$('#coreDeSent'):$('#coreDe');
    setTimeout(()=>el?.focus(),0);
  }

  function bindBtn(btnSel,onClick){
    const btn=$(btnSel);
    if(!btn) return;
    btn.addEventListener('pointerdown',(e)=>e.preventDefault(),{passive:false});
    btn.addEventListener('touchstart',(e)=>e.preventDefault(),{passive:false});
    btn.addEventListener('mousedown',(e)=>e.preventDefault());
    btn.addEventListener('click',()=>{ onClick(); refocusActiveInput(); });
  }

  bindBtn('#coreCheck',()=>{
    const x=state.data.find(w=>w.id===state.currentId);
    if(x) Core.check(x);
    state._enterStage=1;
  });
  bindBtn('#coreNext',()=>{ nextCard(); state._enterStage=0; });

  // ---- syncWordToolsUI (global) ----
  window.syncWordToolsUI=function(){
    const id=state.currentId;
    const ov=id?(state.overrides?.[id]||null):null;

    const superBtn=$('#coreSuper');
    if(superBtn){ const on=!!ov?.super; superBtn.classList.toggle('active',on); superBtn.textContent='Super'; }

    const hideBtn=$('#coreHide');
    if(hideBtn){ hideBtn.textContent=ov?.deleted?'Hidden ✓':'Hide'; }

    const oneBtn=$('#coreOneStreak');
    if(oneBtn){ const on=!!ov?.easy1; oneBtn.classList.toggle('active',on); oneBtn.textContent='1-Streak'; }

    const typoBtn=$('#coreTypo');
    if(typoBtn){
      const canTypo=!!state.lastReview&&state.lastReview.id===state.currentId&&state.lastReview.canTypo===true;
      typoBtn.classList.toggle('active',canTypo);
      typoBtn.textContent=canTypo?'Typo ✓':'Typo';
    }
  };

  // ---- syncMenuUI (global) ----
  window.syncMenuUI=function(){
    const mode=state.activeMode||'word';
    ['word','cloze','sentence'].forEach(m=>{
      const b=$(`#btnMode${m.charAt(0).toUpperCase()+m.slice(1)}`);
      if(b) b.classList.toggle('active',mode===m);
    });
    syncWordToolsUI();
  };

  // ---- ⋯ menu toggle ----
  {
    const menuBtn=$('#btnMenu'), menuPanel=$('#menuPanel');
    if(menuBtn&&menuPanel){
      let lock=0;
      menuBtn.addEventListener('pointerdown',(e)=>{
        e.preventDefault();
        const now=Date.now(); if(now-lock<400) return; lock=now;
        const isHidden=menuPanel.classList.contains('hidden');
        if(isHidden){ openMenu(); syncMenuUI(); }
        else { closeMenu(); }
      },{passive:false});
      menuBtn.addEventListener('mousedown',(e)=>{
        e.preventDefault();
      });
    }
  }

  // ---- mode buttons ----
  function setMode(m){
    state.activeMode=m;
    state._enterStage=0;
    saveState();
    syncMenuUI();
    $('#menuPanel')?.classList.add('hidden');
    nextCard();
    refocusActiveInput();
  }

  ['Word','Cloze','Sentence'].forEach(mCap=>{
    const btn=$(`#btnMode${mCap}`);
    if(!btn) return;
    let lock=0;
    btn.addEventListener('pointerdown',(e)=>{
      e.preventDefault();
      const now=Date.now(); if(now-lock<400) return; lock=now;
      setMode(mCap.toLowerCase());
    },{passive:false});
    btn.addEventListener('mousedown',(e)=>e.preventDefault());
  });

  // ---- Typo ----
  {
    const typoBtn=$('#coreTypo');
    if(typoBtn){
      let lock=0;
      function doTypo(e){
        e.preventDefault();
        const now=Date.now(); if(now-lock<400) return; lock=now;
        const r=state.lastReview;
        if(!r||r.id!==state.currentId||!r.canTypo){ alert('Typo works only right after a wrong word check on the current card.'); return; }
        const x=state.data.find(w=>w.id===r.id);
        if(!x) return;
        restoreProgressState(r.beforeState);
        const inp=$('#coreDe');
        if(!inp) return;
        const need=Core.requiredFor(x);
        state.streaks[x.id]=(state.streaks[x.id]||0)+1;
        const ov=state.overrides?.[x.id];
        if(ov?.super&&(state.streaks[x.id]||0)>=need){ ov.superNext=state.level+(ov.superEvery??3); state.overrides[x.id]=ov; }
        inp.value=x.german||''; inp.classList.remove('bad-field'); inp.classList.add('good-field');
        setHTML('#coreFeedback',`<span class="good">Counted as correct (Typo).</span> (${state.streaks[x.id]}/${need})`);
        setText('#coreDeSentence',x.deSent||'');
        const pool=Core.levelPool();
        const allMastered=pool.length&&pool.every(it=>(state.streaks[it.id]||0)>=Core.requiredFor(it));
        if(allMastered&&state.level*APP.wordsPerLevel<state.data.length){ state.level++; state.streaks={}; }
        captureReviewSnapshot(x,{beforeState:cloneProgressState(),canTypo:false});
        saveState(); Core.updateProgress(); Core.updateDbg();
        if(typeof window.syncWordToolsUI==='function') window.syncWordToolsUI();
      }
      typoBtn.addEventListener('pointerdown',doTypo,{passive:false});
      typoBtn.addEventListener('mousedown',doTypo);
    }
  }

  // ---- Back ----
  $('#coreBack')?.addEventListener('click',()=>{ if(!restoreLastReviewUI()) alert('No previous checked card to restore.'); });

  // ---- Edit ----
  $('#coreEdit')?.addEventListener('click',()=>{
    const id=state.currentId; if(!id) return;
    const base=state.data.find(w=>w.id===id); if(!base) return;
    const ov=state.overrides[id]||{};
    const german =window.prompt('German:',  ov.german  ??base.german  ??''); if(german===null) return;
    const english=window.prompt('English:', ov.english ??base.english ??''); if(english===null) return;
    const deSent =window.prompt('German sentence:', ov.deSent ??base.deSent ??''); if(deSent===null) return;
    const enSent =window.prompt('English sentence:', ov.enSent ??base.enSent ??''); if(enSent===null) return;
    const category=window.prompt('Category:', ov.category??base.category??''); if(category===null) return;
    const masri  =window.prompt('Masri:', ov.masri ??base.masri ??''); if(masri===null) return;
    state.overrides[id]={...ov,german,english,deSent,enSent,category,masri};
    saveState(); nextCard();
  });

  // ---- Hide ----
  $('#coreHide')?.addEventListener('click',()=>{
    const id=state.currentId; if(!id) return;
    const ov=state.overrides[id]||{};
    const next=!ov.deleted;
    if(next&&!confirm('Hide this word? (It will stop appearing, CSV unchanged)')) return;
    state.overrides[id]={...ov,deleted:next};
    Core.rebuildData(); saveState(); nextCard();
  });

  // ---- 1-Streak ----
  $('#coreOneStreak')?.addEventListener('click',()=>{
    const id=state.currentId; if(!id) return;
    const ov=state.overrides[id]||{};
    const on=!ov.easy1;
    state.overrides[id]={...ov,easy1:on};
    if(on){ delete state.penalty[id]; delete state.reqSeen[id]; }
    Core.rebuildData(); saveState(); Core.updateProgress(); Core.updateDbg();
    if(typeof window.syncWordToolsUI==='function') window.syncWordToolsUI();
  });

  // ---- Super ----
  $('#coreSuper')?.addEventListener('click',()=>{
    const id=state.currentId; if(!id) return;
    const ov=state.overrides[id]||{};
    const on=!ov.super;
    let every=ov.superEvery??3;
    if(on){
      const v=window.prompt('Show this word every how many levels? (default 3)',String(every));
      if(v===null) return;
      const n=parseInt(v,10); if(Number.isFinite(n)&&n>=1) every=n;
    }
    const updated={...ov,super:on,superEvery:every};
    if(on){ updated.superNext=state.level+every; } else { delete updated.superNext; }
    state.overrides[id]=updated;
    Core.rebuildData(); saveState(); nextCard();
  });

  // ---- Reset ----
  $('#coreReset')?.addEventListener('click',()=>{
    if(!confirm('Reset 5k progress?')) return;
    state.level=1; state.streaks={}; state.penalty={}; state.activeMode='word';
    state.currentId=null; saveState(); location.reload();
  });

  // ---- Export / Import ----
  $('#btnExport')?.addEventListener('click',()=>UI.exportState());
  $('#btnImport')?.addEventListener('click',()=>UI.importState());

  // ---- Backup banner ----
  $('#btnBackupNow')?.addEventListener('click',()=>UI.backupToFile());
  $('#btnBackupDismiss')?.addEventListener('click',()=>{ sessionStorage.setItem(BACKUP_DISMISS_SESSION_KEY,'1'); updateBackupBanner(); });

  // ---- Debug tools ----
  $('#btnDump')?.addEventListener('click',()=>{ console.log('TOP5K STATE:',JSON.parse(JSON.stringify(state))); alert('Dumped to console.'); });
  $('#btnHardSave')?.addEventListener('click',()=>{ saveState(); alert('Saved.'); });
  $('#btnRestoreBackup')?.addEventListener('click',()=>{
    try{
      const arr=JSON.parse(localStorage.getItem('top5k_backups_v1')||'[]');
      if(!arr.length){ alert('No backups found.'); return; }
      const newest=arr[0];
      if(!confirm(`Restore latest backup?\n${new Date(newest.t).toLocaleString()}`)) return;
      localStorage.setItem(LS_KEY,JSON.stringify(newest.data));
      alert('Restored ✅ Reloading…'); location.reload();
    }catch(e){ alert('Restore failed.'); console.error(e); }
  });

  function getV1Raw(){ return localStorage.getItem('top5k_state_v1'); }
  async function copyTextToClipboard(txt){
    try{ if(navigator.clipboard?.writeText){ await navigator.clipboard.writeText(txt); alert('Copied ✅'); return true; } }catch(e){}
    window.prompt('Copy this JSON:',txt); return false;
  }

  $('#btnCheckV1')?.addEventListener('click',()=>{
    const raw=getV1Raw();
    if(!raw){ alert('v1 key NOT found in this container.'); return; }
    try{ const obj=JSON.parse(raw); alert('v1 found. Level = '+(obj.level??'unknown')); console.log('V1 STATE:',obj); }
    catch(e){ alert('v1 exists but JSON invalid'); }
  });
  $('#btnCopyV1')?.addEventListener('click',()=>{ const raw=localStorage.getItem('top5k_state_v1'); if(!raw){alert('No v1 key found.');return;} openCopyModal(raw,'Export (v1 key)'); });
  $('#btnRestoreV1')?.addEventListener('click',()=>{
    const raw=getV1Raw();
    if(!raw){ alert('No v1 key found.'); return; }
    if(!confirm('Restore progress from v1 and make it the current state?')) return;
    localStorage.setItem(LS_KEY,raw); alert('Restored ✅ App will reload now.'); location.reload();
  });

  await Core.load();
  syncMenuUI();
  nextCard();
}

function nextCard(){
  const x=Core.pick();
  if(!x){ setText('#coreEn','No data / nothing to pick'); return; }
  triggerCardSlide(()=>{ Core.render(x); saveState(); });
}

document.addEventListener('DOMContentLoaded',boot);
</script>

<!-- Copy Modal -->
<div id="copyModal" class="modal hidden" aria-hidden="true">
  <div class="modalBox">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
      <strong id="copyModalTitle">Copy</strong>
      <button id="copyModalClose" class="muted">Close</button>
    </div>
    <textarea id="copyModalText" spellcheck="false"></textarea>
    <div style="display:flex;justify-content:flex-end;margin-top:10px;">
      <button id="copyModalCopy">Copy</button>
    </div>
    <div id="copyModalHint" class="muted small" style="margin-top:6px;"></div>
  </div>
</div>

</body>
</html>
